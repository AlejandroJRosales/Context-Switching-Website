<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>gpuverse</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #05070a;
    overflow: hidden;
    font: 13px 'Courier New', monospace;
    color: #9aa5b1;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #c {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #hud {
    position: fixed;
    top: 8px;
    left: 10px;
    white-space: pre;
    pointer-events: none;
    text-shadow: 0 1px 2px #000;
  }

  #err {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    color: #f38ba8;
    padding: 24px;
    text-align: center;
  }

  #scale {
    position: fixed;
    top: 8px;
    right: 10px;
    left: auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    max-width: calc(100vw - 20px);
    pointer-events: auto;
  }

  #scale button {
    flex: none;
    box-sizing: border-box;
    background: #11161d;
    color: #9aa5b1;
    border: 1px solid #2a3340;
    border-radius: 4px;
    font: 14px/1 'Courier New', monospace;
    cursor: pointer;
  }

  #scale button:hover {
    background: #1a212b;
    color: #fff;
  }

  #scale span {
    min-width: 46px;
    text-align: center;
    text-shadow: 0 1px 2px #000;
  }

  #resetSeed,
  #rainBtn,
  #plantBtn {
    width: auto;
    height: 28px;
    padding: 0 10px;
    margin-left: 0;
    white-space: nowrap;
    line-height: 26px;
  }

  #settingsBtn {
    position: relative;
    width: 4em;
    height: 2em;
  }

  #settingsPanel {
    position: absolute;
    top: 34px;
    right: 0;
    display: none;
    flex-direction: column;
    gap: 6px;
    background: #0b0f14;
    border: 1px solid #2a3340;
    border-radius: 6px;
    padding: 8px;
    min-width: 140px;
    z-index: 10;
  }

  #settingsPanel.open {
    display: flex;
  }

  #settingsPanel button {
    width: 100%;
  }

  #settingsPanel #scaleRow button {
    width: 28px;
    flex: none;
  }

  #settingsPanel #timeRow button {
    width: 38px;
    flex: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="scale">
  <button id="settingsBtn" title="Settings">=</button>
  <div id="settingsPanel">
    <div id="scaleRow" style="display:flex;align-items:center;gap:6px;justify-content:center">
      <button id="scaleDown" title="Scale down (-)">-</button>
      <span id="scaleLabel">1.0</span>
      <button id="scaleUp" title="Scale up (+)">+</button>
    </div>
    <button id="rainBtn" title="Cycle rain: auto / on / off (R)">RAIN: AUTO</button>
    <button id="plantBtn" title="Toggle plants on / off (P)">PLANTS: ON</button>
    <div id="timeRow" style="display:flex;align-items:center;gap:6px;justify-content:center">
      <button id="timeBack" title="Rewind 2 hours">-2h</button>
      <span id="timeLabel">TIME</span>
      <button id="timeFwd" title="Advance 2 hours">+2h</button>
    </div>
    <button id="resetSeed" title="Roll a new seed and rebuild the world">RESET</button>
  </div>
</div>
<div id="err"></div>
<script type="module">
import { createRenderer, createPlants, createCat, ortho, lookAt, mul } from "./renderer.js";
import { createPlayer } from "./player.js";
import { createSky, createRain } from "./sky.js";
import { createGrid, SENSE, MOVE, INIT } from "./world.js";


const canvas = document.getElementById("c");
const hud = document.getElementById("hud");
const errEl = document.getElementById("err");
const fail = (m)=>{errEl.style.display="grid";errEl.textContent=m;throw new Error(m);};

const adapter = await navigator.gpu?.requestAdapter();
const device  = await adapter?.requestDevice();
if(!device) fail("WebGPU unavailable: use Chrome/Edge 113+ or Safari 18+ over https/localhost.");

const ctx = canvas.getContext("webgpu");
const format = navigator.gpu.getPreferredCanvasFormat();
ctx.configure({ device, format, alphaMode:"opaque" });

// mulberry32: tiny deterministic PRNG. Same seed -> same float stream -> reproducible
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// Seeds are plain ints (HUD/URL readable), hashed into 32-bit state so sequential
function seedToState(seed) {
  let h = 1779033703 ^ seed;
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}
// The GPU stores the seed in an f32
function seedToGpuFloat(seed) {
  const s = seedToState(seed);
  return (s >>> 8) / 16777216 * 1000;
}

const params = new URLSearchParams(location.search);
let seed = params.has("seed") ? (parseInt(params.get("seed"), 10) || 0) : 7;

// world config (base values; actual N/world/amplitude scale with the +/- control)
const BASE_N = 1000;
const BASE_WORLD = [10000, 10000];
const BASE_AMPLITUDE = 500;
const worldMin = [0,0,0];

const SCALE_STEPS = [0.5,1,2,3,3.5];
let scaleIdx = SCALE_STEPS.indexOf(2);

const DAY_LENGTH = 500;
// Start the sky clock at midday: timeOfDay 0=midnight, 0.5
let skyTimeOffset = DAY_LENGTH * 0.5;
const HOUR_SECONDS = DAY_LENGTH / 24;
const sky = createSky({ dayLengthSeconds: DAY_LENGTH });

let N, worldMax, amplitude, positions, moveParams, moveBGL, moveBG, movePipe, renderer, player;
let speciesHeading;
let rain;
let plants, plantGrid;
let nibbler;
// Entity uniform grid (neighbor search over `positions`) + its downstream sensing pass.
// Rebuilt each buildWorld because N and the world bounds change with scale.
let entityGrid, senseParamsBuf, senseOut, senseBG, sensePipe;
// How far the cat sinks below the water surface when floating (world units). Small because
// the cat mesh's paws are at local y=0 with no body lift, unlike the creatures (FLOAT_DEPTH).
const CAT_FLOAT_DEPTH = 2.0;
let curShadowRes = 2048;   // mirrors renderer's shadowRes; updated in buildWorld, read by fitLightMatrix

function buildWorld(scale){
  N = Math.max(1, Math.round(BASE_N * scale));
  worldMax = [BASE_WORLD[0]*scale, 0, BASE_WORLD[1]*scale];
  amplitude = BASE_AMPLITUDE * scale;

  // Entity state buffers. No longer COPY_DST-seeded from the CPU: a one-time GPU INIT pass
  // (below) scatters positions, assigns species/heading, and sets starting energy. This
  // removes the per-scale-change stall where we allocated N*16 + N*8 bytes on the CPU,
  // filled them in a loop, and blocked on two writeBuffers. .w of positions carries energy.
  positions = device.createBuffer({
    size: N*16, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX });
  // Per-instance (species, heading): (~55% deer / 45% wolf), seeded on the GPU so the
  // scatter is still reproducible from `seed` alone.
  speciesHeading = device.createBuffer({
    size: N*8, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX });

  // GPU position init (2.1): hash(index, seed) -> pos/species/heading/energy, dispatched
  // once. InitParams (std140): vec2 worldMin, vec2 worldMax, f32 amplitude, f32 seed,
  // u32 N, f32 deerFrac = 32 bytes.
  {
    const initParams = device.createBuffer({ size: 32,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
    const ipf = new Float32Array(8), ipu = new Uint32Array(ipf.buffer);
    ipf[0]=worldMin[0]; ipf[1]=worldMin[2];       // worldMin.xz
    ipf[2]=worldMax[0]; ipf[3]=worldMax[2];       // worldMax.xz
    ipf[4]=amplitude;   ipf[5]=seedToGpuFloat(seed);
    ipu[6]=N;           ipf[7]=0.55;              // deerFrac
    device.queue.writeBuffer(initParams, 0, ipf);

    const initBGL = device.createBindGroupLayout({ entries:[
      {binding:0,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
      {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
      {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
    ]});
    const initBG = device.createBindGroup({ layout:initBGL, entries:[
      {binding:0,resource:{buffer:initParams}},
      {binding:1,resource:{buffer:positions}},
      {binding:2,resource:{buffer:speciesHeading}},
    ]});
    const initPipe = device.createComputePipeline({
      layout: device.createPipelineLayout({ bindGroupLayouts:[initBGL] }),
      compute:{ module: device.createShaderModule({ code:INIT }), entryPoint:"main" },
    });
    const enc = device.createCommandEncoder();
    const p = enc.beginComputePass();
    p.setPipeline(initPipe); p.setBindGroup(0, initBG);
    p.dispatchWorkgroups(Math.ceil(N/64));
    p.end();
    device.queue.submit([enc.finish()]);
  }

  // Shadow map shrinks as the world grows: a fixed texel budget over a bigger
  // visible region would just blur, so trade resolution for coverage at high scale.
  const shadowRes = curShadowRes;

  renderer = createRenderer(device, ctx, format, {
    worldMin, worldMax, gridN:256, amplitude, seed:seedToGpuFloat(seed), creatureRadius:8.0,
    shadowResolution: shadowRes });

  // Cat companion (single CPU follower, drawn in the renderer's main pass)
  const prevCatPos = nibbler ? nibbler.position : null;
  // distances a fraction of the world span so it trails naturally at any scale.
  const worldSpan = Math.min(worldMax[0], worldMax[2]);
  nibbler = createCat(device, format, {
    camBuf: renderer.camBuf, skyBuf: renderer.skyBuf, fogBuf: renderer.fogBuf,
    terrain: null,                                  // supplied by the readHeights callback below
    worldWidth: worldMax[0], worldHeight: worldMax[2],
    scale: .4,                                     // ~20-unit nibbler; tune to taste
    followDist:  Math.max(60,  worldSpan * 0.012),
    catchUpDist: Math.max(300, worldSpan * 0.06),
    backAwayDist: 12,
    // Float on water like the creatures. The cat's feet are at local y=0 (no body lift), so it
    waterLevel: renderer.waterLevel,
    floatDepth: CAT_FLOAT_DEPTH,
  });
  if (prevCatPos) nibbler.placeBehindPlayer(prevCatPos.x, prevCatPos.z, player ? player.yaw : 0);

  // Weather. The particle column tracks world scale: spawn band well above the tallest
  // terrain, floor at the water level, radius a fraction of the world so a fixed pool
  // stays dense around the player. Reuses the renderer's Camera + Sky uniforms read-only.
  rain = createRain(device, format, {
    camBuf: renderer.camBuf, skyBuf: renderer.skyBuf,
    count: 4096,
    radius: Math.max(300, Math.min(worldMax[0], worldMax[2]) * 0.06),
    top: amplitude * 2.2,
    fall: amplitude * 1.2,
    floorY: renderer.waterLevel - 20,
    fallSpeed: Math.max(400, amplitude * 2.5),
    wind: [amplitude * 0.08, 0, amplitude * 0.04],
    width: 0.003, len: amplitude * 0.03 + 6,
    seed,
  });

  // Plants: a second entity system. Fixed population for now
  const plantCount = Math.max(1, Math.round(50000 * scale));
  plants = createPlants(device, format, {
    camBuf: renderer.camBuf, skyBuf: renderer.skyBuf, fogBuf: renderer.fogBuf,
    worldMin, worldMax,
    count: plantCount,
    clusters: Math.max(10, Math.round(50 * scale)),
    clusterRadius: Math.max(120, Math.min(worldMax[0], worldMax[2]) * 0.03),
    height: 5,
    width:  .5,
    sway:   1,
    seed,
  });

  // A dedicated uniform grid over the plant buffer, so sensing/eating can find plants
  // without a new neighbor search (reuses grid.js)
  plantGrid = createGrid(device, {
    N: plantCount,
    positions: plants.buffers.plants,
    worldMin, worldMax,
    cellSize: Math.max(150, Math.min(worldMax[0], worldMax[2]) * 0.02),
    flat2D: true,
  });

  // player walks the SAME baked heightfield the renderer draws. Read it back once
  // (async) and hand it to the player; this matches the rendered ground exactly,
  // unlike recomputing fp32 GPU noise on the fp64 CPU.
  const plantsForThisBuild = plants;
  const catForThisBuild = nibbler;
  renderer.readHeights().then(({data, gridN})=>{
    const tp = { heights:data, gridN,
      worldMin:[worldMin[0], worldMin[2]], worldMax:[worldMax[0], worldMax[2]] };
    if (player) player.setTerrain(tp);
    // Same heightfield to the nibbler, so it stands on the exact rendered ground. Guard against
    // a stale readback resolving after a fast rebuild replaced the nibbler.
    if (catForThisBuild === nibbler) nibbler.setTerrain(tp);

    // Bilinear sampler over the baked heightfield (row-major heights[z*gridN + x]),
    const wx0 = worldMin[0], wz0 = worldMin[2];
    const sx = (gridN - 1) / (worldMax[0] - worldMin[0]);
    const sz = (gridN - 1) / (worldMax[2] - worldMin[2]);
    const sampleHeight = (x, z) => {
      let fx = (x - wx0) * sx, fz = (z - wz0) * sz;
      fx = Math.min(gridN - 1, Math.max(0, fx));
      fz = Math.min(gridN - 1, Math.max(0, fz));
      const x0 = Math.floor(fx), z0 = Math.floor(fz);
      const x1 = Math.min(gridN - 1, x0 + 1), z1 = Math.min(gridN - 1, z0 + 1);
      const tx = fx - x0, tz = fz - z0;
      const h00 = data[z0 * gridN + x0], h10 = data[z0 * gridN + x1];
      const h01 = data[z1 * gridN + x0], h11 = data[z1 * gridN + x1];
      const a = h00 + (h10 - h00) * tx, b = h01 + (h11 - h01) * tx;
      return a + (b - a) * tz;
    };
    // Only place if this build's plant system is still the live one.
    if (plantsForThisBuild === plants) plantsForThisBuild.place(sampleHeight);
  });

  moveParams = device.createBuffer({ size:32, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  // MOVE now also reads senseOut (binding 4, read-only) so movement can react to the sensing
  // pass recorded just before it. senseOut is created below alongside the grid, so the move
  // bind group is assembled after that; see the sensing block.
  moveBGL = device.createBindGroupLayout({entries:[
    {binding:0,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
    {binding:3,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
    {binding:4,visibility:GPUShaderStage.COMPUTE,buffer:{type:"read-only-storage"}},
  ]});
  movePipe = device.createComputePipeline({
    layout: device.createPipelineLayout({bindGroupLayouts:[moveBGL]}),
    compute:{module:device.createShaderModule({code:MOVE}),entryPoint:"main"},
  });

  // ---- 2.2 sensing: uniform grid over the entity positions + a per-entity sense pass ----
  // The grid substrate (createGrid + SENSE) was already complete; this is the orchestration
  // that was missing. buildFrame() records clear/count/scan/scatter; the SENSE pass then
  // reads the sorted grid to produce per-entity {count, nearest, nearestD2}. Both run each
  // frame BEFORE the MOVE pass so movement can react to fresh neighbor data.
  //
  // cellSize is chosen so the sense radius spans ~1 cell (SENSE scans an R-cell halo, with R
  // = ceil(senseRadius/cellSize)); a coarser cell keeps totalCells within the single-level
  // scan bound (SCAN_BLOCK^2) as the world grows.
  const SENSE_RADIUS = Math.max(120, Math.min(worldMax[0], worldMax[2]) * 0.02);
  entityGrid = createGrid(device, {
    N,
    positions,
    worldMin, worldMax,
    cellSize: SENSE_RADIUS,
    flat2D: true,                       // entities live on a 2D plane; y collapses to one cell
    allowReadback: false,
  });

  // SenseParams (std140): f32 senseRadius + 3 pad = 16 bytes.
  senseParamsBuf = device.createBuffer({ size:16, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(senseParamsBuf, 0, new Float32Array([SENSE_RADIUS, 0, 0, 0]));

  // SenseResult is 16 bytes (u32 count, u32 nearest, f32 nearestD2, u32 pad) per entity.
  senseOut = device.createBuffer({ size: N*16,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

  // SENSE bindings (see grid.js): 0 grid Params, 1 SenseParams, 2 positions,
  // 3 cellStart, 4 cellCount (bound here as a read-only, non-atomic view), 5 sortedIdx,
  // 6 senseOut. cellCount is the SAME buffer the grid writes atomically; WGSL forbids
  // aliasing it as atomic and non-atomic in one shader, but SENSE is a separate module that
  // only ever reads it, so a plain read-only-storage binding is valid.
  const senseBGL = device.createBindGroupLayout({ entries:[
    {binding:0,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:"read-only-storage"}},
    {binding:3,visibility:GPUShaderStage.COMPUTE,buffer:{type:"read-only-storage"}},
    {binding:4,visibility:GPUShaderStage.COMPUTE,buffer:{type:"read-only-storage"}},
    {binding:5,visibility:GPUShaderStage.COMPUTE,buffer:{type:"read-only-storage"}},
    {binding:6,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
  ]});
  senseBG = device.createBindGroup({ layout:senseBGL, entries:[
    {binding:0,resource:{buffer:entityGrid.buffers.params}},
    {binding:1,resource:{buffer:senseParamsBuf}},
    {binding:2,resource:{buffer:positions}},
    {binding:3,resource:{buffer:entityGrid.buffers.cellStart}},
    {binding:4,resource:{buffer:entityGrid.buffers.cellCount}},
    {binding:5,resource:{buffer:entityGrid.buffers.sortedIdx}},
    {binding:6,resource:{buffer:senseOut}},
  ]});
  sensePipe = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts:[senseBGL] }),
    compute:{ module: device.createShaderModule({ code:SENSE }), entryPoint:"main" },
  });

  // MOVE bind group, assembled now that senseOut exists (binding 4). moveBGL/movePipe were
  // created above so the pipeline layout was ready; only the resource binding waited.
  moveBG = device.createBindGroup({layout:moveBGL,entries:[
    {binding:0,resource:{buffer:moveParams}},
    {binding:1,resource:{buffer:renderer.terrainParams}},
    {binding:2,resource:{buffer:positions}},
    {binding:3,resource:{buffer:speciesHeading}},
    {binding:4,resource:{buffer:senseOut}},
  ]});

  // buildWorld makes a fresh rain (mode resets to auto); resync the button label if it
  // exists yet (it doesn't on the very first buildWorld, which runs before the wiring).
  const rb = document.getElementById("rainBtn");
  if (rb) rb.textContent = "RAIN: " + rain.state.mode.toUpperCase();
  const pb = document.getElementById("plantBtn");
  if (pb) pb.textContent = "PLANTS: " + (plants.enabled ? "ON" : "OFF");
}

// player: WASD+space (keyboard) and on-screen joystick+jump (touch), both always on
// Created before the first buildWorld so the first heightfield readback finds it.
// Terrain (the baked heightfield) is supplied asynchronously by buildWorld via setTerrain.
player = createPlayer(canvas, {
  eyeHeight: 10, moveSpeed: 300, jumpSpeed: 125, gravity: 300, flySpeed: 300
});

buildWorld(SCALE_STEPS[scaleIdx]);

const scaleLabel = document.getElementById("scaleLabel");
function updateScaleLabel(){ scaleLabel.textContent = `${SCALE_STEPS[scaleIdx]}x`; }
updateScaleLabel();

function setScale(newIdx){
  newIdx = Math.max(0, Math.min(SCALE_STEPS.length-1, newIdx));
  if(newIdx === scaleIdx) return;
  scaleIdx = newIdx;
  updateScaleLabel();
  buildWorld(SCALE_STEPS[scaleIdx]);
}
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
settingsBtn.addEventListener("click", (e)=>{
  e.stopPropagation();
  settingsPanel.classList.toggle("open");
});
document.addEventListener("click", (e)=>{
  if(!settingsPanel.contains(e.target) && e.target!==settingsBtn){
    settingsPanel.classList.remove("open");
  }
});

document.getElementById("scaleUp").addEventListener("click", ()=>setScale(scaleIdx+1));
document.getElementById("scaleDown").addEventListener("click", ()=>setScale(scaleIdx-1));

// Shift the sky clock by whole hours. Clamped at 0 so `time + skyTimeOffset` never goes
// negative: sky.js does `(simTime / dayLen) % 1` and JS `%` keeps the sign, and the HUD's
// day/year counters floor the same sum.
function shiftTime(hours){
  skyTimeOffset = Math.max(0, skyTimeOffset + hours * HOUR_SECONDS);
}
document.getElementById("timeFwd").addEventListener("click", ()=>shiftTime(2));
document.getElementById("timeBack").addEventListener("click", ()=>shiftTime(-2));

// rain mode toggle: button + R key both route through here so the label stays in sync.
const rainBtn = document.getElementById("rainBtn");
function cycleRain(){
  const mode = rain.cycleMode();
  rainBtn.textContent = "RAIN: " + mode.toUpperCase();
}
rainBtn.addEventListener("click", cycleRain);

// plant toggle: button + P key both route through here so the label stays in sync.
const plantBtn = document.getElementById("plantBtn");
function togglePlants(){
  const on = plants.setEnabled(!plants.enabled);
  plantBtn.textContent = "PLANTS: " + (on ? "ON" : "OFF");
}
plantBtn.addEventListener("click", togglePlants);

addEventListener("keydown", e=>{
  if(e.key==="+"||e.key==="=") setScale(scaleIdx+1);
  if(e.key==="-"||e.key==="_") setScale(scaleIdx-1);
  if(e.key==="r"||e.key==="R") cycleRain();
  if(e.key==="p"||e.key==="P") togglePlants();
});

// new seed and rebuild (terrain, biomes, scatter, water all re-derive).
document.getElementById("resetSeed").addEventListener("click", ()=>{
  seed = Math.floor(Math.random()*1e9);
  const url = new URL(location.href);
  url.searchParams.set("seed", seed);
  history.replaceState(null, "", url);
  buildWorld(SCALE_STEPS[scaleIdx]);
});

// Build a sun-view orthographic viewProj that tightly covers the region the player
// can see, then texel-snap it so shadow edges don't crawl while walking.
//
// Strategy: take a sphere of radius `coverage` centered a bit ahead of the camera.
// A sphere bound makes the ortho extents rotation-invariant, so as you turn, the box
// size is constant and ONLY its center moves -> texel-snapping fully kills shimmer.
const SHADOW_UP_FALLBACK = [0, 0, 1];   // if sun is near-vertical, lookAt up must not be parallel
function fitLightMatrix(sunDir, camEye, camForward, coverage, depthRange) {
  const fwd = [camForward[0], 0, camForward[2]];
  const fl = Math.hypot(fwd[0], fwd[2]) || 1;
  const center = [
    camEye[0] + fwd[0] / fl * coverage * 0.5,
    camEye[1],
    camEye[2] + fwd[2] / fl * coverage * 0.5,
  ];

  // light "position": back off from center along the sun direction far enough to
  // bound all terrain depth within [near,far].
  const D = depthRange;
  const lightPos = [
    center[0] + sunDir[0] * D,
    center[1] + sunDir[1] * D,
    center[2] + sunDir[2] * D,
  ];
  const up = Math.abs(sunDir[1]) > 0.99 ? SHADOW_UP_FALLBACK : [0, 1, 0];
  const lightView = lookAt(lightPos, center, up);

  const r = coverage;
  const lp = [
    lightView[0]*center[0] + lightView[4]*center[1] + lightView[8]*center[2]  + lightView[12],
    lightView[1]*center[0] + lightView[5]*center[1] + lightView[9]*center[2]  + lightView[13],
  ];
  const texelWorld = (2 * r) / curShadowRes;
  const snappedX = Math.round(lp[0] / texelWorld) * texelWorld;
  const snappedY = Math.round(lp[1] / texelWorld) * texelWorld;
  // shift the ortho bounds by the snap delta so the frozen grid aligns to texels
  const dx = lp[0] - snappedX, dy = lp[1] - snappedY;

  const proj = ortho(-r + dx, r + dx, -r + dy, r + dy, 0.1, 2 * D);
  return mul(proj, lightView);
}

// camera is driven by the player (player.js): drag to look, WASD/joystick to move
function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr);
}
addEventListener("resize",resize); resize();

function handleHud(time, dt, lastHud) {
  const skyState = sky.update(time + skyTimeOffset);
  renderer.setSky(skyState);
  const fogDist = Math.max(worldMax[0], worldMax[2]) * 0.55;
  renderer.setFog(skyState.fogColor, fogDist);

  const cam0 = player.getCamera(canvas.width/canvas.height);

  // weather: ease intensity / roll auto, then advance particles on the GPU (no-op when clear).
  rain.resolve(dt, time);

  const enc=device.createCommandEncoder();

  // 2.2: neighbor grid + sensing BEFORE movement. buildFrame() records the
  // clear->count->scan->scatter chain (its own compute pass); the sense pass then reads the
  // sorted grid into senseOut. Recorded ahead of MOVE so entities can react to fresh sensing.
  if (entityGrid) {
    entityGrid.buildFrame(enc);
    const sp = enc.beginComputePass();
    sp.setPipeline(sensePipe); sp.setBindGroup(0, senseBG);
    sp.dispatchWorkgroups(Math.ceil(N/64));
    sp.end();
  }

  { const p=enc.beginComputePass(); p.setPipeline(movePipe); p.setBindGroup(0,moveBG);
    p.dispatchWorkgroups(Math.ceil(N/64)); p.end(); }
  rain.buildFrame(enc, cam0.eye, dt);
  if (plantGrid) plantGrid.buildFrame(enc);
  {
    const cam = player.getCamera(canvas.width/canvas.height);
    const fwd = [cam.target[0]-cam.eye[0], cam.target[1]-cam.eye[1], cam.target[2]-cam.eye[2]];
    const coverage = Math.min(fogDist * 0.6, Math.max(worldMax[0], worldMax[2]) * 0.5);
    const depthRange = coverage + amplitude * 2;
    const lightVP = fitLightMatrix(skyState.sunDir, cam.eye, fwd, coverage, depthRange);
    renderer.setShadow(lightVP, { pcfRadius: 2.0, bias: 0.003, strength: 0.85 });
  }
  renderer.bakeShadow(enc);

  renderer.render(enc, positions, N, speciesHeading, canvas.width, canvas.height, time, rain, skyState, plants, nibbler);
  device.queue.submit([enc.finish()]);

  facc+=dt; frames++; frameCount++;
  if(facc>=0.5){ fps=Math.round(frames/facc); frames=0; facc=0; }

  // Touch the DOM only every HUD_EVERY frames and only when text changed
  if(frameCount%HUD_EVERY===0){
    const todHoursTotal = skyState.timeOfDay * 24;
    const todH = Math.floor(todHoursTotal) % 24;
    const todM = Math.floor((todHoursTotal - Math.floor(todHoursTotal)) * 60);
    const tod = `${String(todH).padStart(2,"0")}:${String(todM).padStart(2,"0")}`;
    // Day/year counters derived from total elapsed sim seconds (same clock the sky
    // module runs on), so they stay in sync with the HH:MM readout. Day 1 / Year 1 at start.
    const totalDays = Math.floor((time + skyTimeOffset) / DAY_LENGTH);
    const DAYS_PER_YEAR = 365;
    const year = Math.floor(totalDays / DAYS_PER_YEAR) + 1;
    const dayOfYear = (totalDays % DAYS_PER_YEAR) + 1;
    const rainStr = rain.state.mode.toUpperCase() + (rain.state.on ? ` ${(rain.state.intensity*100)|0}%` : "");
    const plantStr = plants.enabled ? `${plants.count.toLocaleString()}` : `off`;
    const hudText=`3.0.0  seed ${seed}  fps ${fps}\nentities ${N.toLocaleString()}\nplants ${plantStr}\nworld ${Math.round(worldMax[0])}x${Math.round(worldMax[2])}\ntime ${tod}  day ${dayOfYear}  year ${year}\nflying: ${player.flying?"TRUE":"FALSE"}\nrain ${rainStr}\n`;
    if(hudText!==lastHud){ hud.textContent=hudText; lastHud=hudText; }
  }
  return lastHud;
}

// Reused per-frame scratch (avoids per-frame typed-array allocation). Float fields and the
// u32 N share one ArrayBuffer so the 32-byte MoveParams uploads in one writeBuffer.
// Layout: [0]time [1]dt [2]speed [3]N(u32) [4]waterLevel [5]floatDepth [6,7]pad.
const moveScratch = new Float32Array(8);
const moveScratchU = new Uint32Array(moveScratch.buffer);
// How far below the surface a floating body rests, so it reads as sitting ON the water.
const FLOAT_DEPTH = 6.5;
let t0 = performance.now(), last = t0, frames = 0, fps = 0, facc = 0, frameCount = 0;
let lastHud = "";
const HUD_EVERY = 60;

// Render is capped to ~30fps: on this device class a full 60Hz frame can't finish
// compositing within one vsync, so half the frames came back PRESENTED_PARTIAL
const RENDER_FPS = 30;
const RENDER_PERIOD = 1000 / RENDER_FPS;
let renderAcc = 0;
let dtRenderAcc = 0;

function frame(now){
  const dtMs = now - last;
  const dt = Math.min(0.05, dtMs/1000);
  last = now;
  const time = (now-t0)/1000;

  player.update(dt);
  dtRenderAcc += dt;

  renderAcc += dtMs;
  if(renderAcc >= RENDER_PERIOD){
    // Guard against spiral-of-death after a tab stall: cap catch-up to one frame.
    renderAcc = renderAcc % RENDER_PERIOD;

    // Feed the move compute pass the accumulated sim time so entities advance the
    // full 1/30s (not just the last 1/60s tick) on the frame we render.
    moveScratch[0]=time; moveScratch[1]=dtRenderAcc; moveScratch[2]=18.0; moveScratchU[3]=N;
    moveScratch[4]=renderer.waterLevel; moveScratch[5]=FLOAT_DEPTH;
    device.queue.writeBuffer(moveParams,0,moveScratch);

    // Cat follows the player on the rendered timestep (same accumulated dt the move pass
    // uses), so its motion stays in step with the entities.
    if (nibbler) nibbler.update(dtRenderAcc, player.position, player.yaw);
    dtRenderAcc = 0;

    renderer.setCamera(player.getCamera(canvas.width/canvas.height));
    lastHud = handleHud(time, dt, lastHud);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
