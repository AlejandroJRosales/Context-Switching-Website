<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<style>
*{margin:0;padding:0;user-select:none}
html,body{height:100dvh;overflow:hidden;background:#000;font-family:'Courier New',monospace;font-size:12px}
#gl{display:block;width:100%;height:100%;touch-action:none}
#hud{position:absolute;inset:0;pointer-events:none}
#look{position:absolute;inset:0;pointer-events:auto;z-index:1}
.pad{position:absolute;bottom:24px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);pointer-events:auto;z-index:3}
#joy{left:24px}
#jump{right:24px;width:90px;height:90px;bottom:39px;display:flex;align-items:center;justify-content:center}
#joy .nub{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.25)}
#info{position:absolute;top:8px;left:8px;color:#fff;line-height:1.5;white-space:pre;z-index:4}
#gear{position:absolute;top:8px;right:8px;z-index:5;pointer-events:auto;background:rgba(0,0,0,.5);color:#fff;border-radius:4px;padding:6px 10px;font-size:16px;line-height:1}
#btns{position:absolute;top:44px;right:8px;display:none;flex-direction:column;gap:6px;z-index:4;background:rgba(0,0,0,.55);padding:8px;border-radius:6px}
#btns.open{display:flex}
#scaleWrap,#timeWrap{display:flex;gap:6px}
#scaleWrap .btn,#timeWrap .btn{flex:1 1 0;min-width:0}
.btn{pointer-events:auto;background:rgba(0,0,0,.5);color:#fff;padding:6px 10px;text-align:center}
</style>
</head>
