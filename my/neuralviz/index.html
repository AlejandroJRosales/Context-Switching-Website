<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050810;
    --panel: rgba(10, 14, 28, 0.92);
    --border: rgba(80, 160, 255, 0.18);
    --accent: #3af;
    --accent2: #a06fff;
    --accent3: #ff6fa0;
    --text: #c8d8f0;
    --dim: #5a7090;
    --node-active: #3af;
    --node-inactive: #1a3050;
    --edge: rgba(60, 180, 255, 0.18);
    /* touch-friendly minimum tap target */
    --tap: 44px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body.dragging { cursor: grabbing; }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  canvas { display: block; }

  /* TITLE */
  #title {
    position: fixed;
    top: 16px;
    left: 16px;
    pointer-events: none;
    z-index: 10;
  }
  #title h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }
  #title p {
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    color: var(--accent);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* HINT */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    animation: pulse 3s ease-in-out infinite;
    z-index: 10;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

  /* CAM (top-right corner on mobile) */
  #cam-container {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 72px;
    height: 72px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    z-index: 20;
  }
  #cam-canvas {
    display: block;
    width: 72px;
    height: 72px;
    image-rendering: pixelated;
  }
  #cam-label {
    position: absolute;
    bottom: 3px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.4rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.7;
  }
  #cam-prompt {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 72px;
    height: 72px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 20;
  }
  #cam-prompt:active { background: rgba(60,170,255,0.15); }
  #cam-prompt-icon { font-size: 1.4rem; line-height: 1; }
  #cam-prompt-text {
    font-size: 0.38rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    text-align: center;
    line-height: 1.5;
  }

  /* PANEL TOGGLE BUTTON (mobile fab) */
  #panel-toggle {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 30;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    transition: background 0.2s, box-shadow 0.2s;
    font-size: 1.2rem;
  }
  #panel-toggle:active { background: rgba(60,170,255,0.15); }

  /* BOTTOM SHEET (mobile default) */
  #panel {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 0 20px 32px;
    backdrop-filter: blur(20px);
    z-index: 25;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 72dvh;
    overflow-y: auto;
    overscroll-behavior: contain;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  #panel.open {
    transform: translateY(0);
  }

  /* Drag handle */
  #panel-handle {
    width: 40px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 12px auto 4px;
    flex-shrink: 0;
  }

  /* CONTROLS */
  .ctrl-group label {
    display: block;
    font-size: 0.52rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .layer-inputs {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: var(--tap);
  }
  .layer-row span {
    font-size: 0.6rem;
    color: var(--dim);
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Larger thumb for touch */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: linear-gradient(to right, var(--accent), var(--accent2));
    border-radius: 2px;
    outline: none;
    min-height: var(--tap);
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px var(--accent);
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .val-badge {
    font-size: 0.62rem;
    color: #fff;
    width: 24px;
    text-align: left;
    flex-shrink: 0;
  }

  /* Buttons */
  button {
    width: 100%;
    min-height: var(--tap);
    padding: 10px 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(60, 170, 255, 0.08);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active {
    background: rgba(60, 170, 255, 0.2);
    box-shadow: 0 0 14px rgba(60,170,255,0.25);
  }
  button.danger {
    border-color: rgba(255, 100, 100, 0.3);
    color: #ff6fa0;
    background: rgba(255, 100, 160, 0.06);
  }
  button.danger:active { background: rgba(255, 100, 160, 0.18); }

  #stats {
    font-size: 0.55rem;
    color: var(--dim);
    line-height: 2;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  #stats span { color: var(--text); }

  /* DESKTOP OVERRIDES (640px) */
  @media (min-width: 640px) {
    #title { top: 28px; left: 36px; }
    #title h1 { font-size: 1.45rem; }
    #title p  { font-size: 0.6rem; }

    #hint {
      top: auto;
      bottom: 28px;
      font-size: 0.58rem;
    }

    #cam-container, #cam-prompt {
      top: auto;
      right: auto;
      bottom: 28px;
      left: 28px;
      width: 100px;
      height: 100px;
      border-radius: 6px;
    }
    #cam-canvas { width: 100px; height: 100px; }

    #panel-toggle { display: none; }

    /* Restore side panel on desktop */
    #panel {
      position: fixed;
      top: 50%;
      right: 28px;
      left: auto;
      bottom: auto;
      transform: translateY(-50%) !important;
      border-radius: 12px;
      border-bottom: 1px solid var(--border);
      padding: 20px 18px;
      width: 200px;
      max-height: none;
      overflow-y: visible;
      transition: none;
    }

    #panel-handle { display: none; }

    input[type=range] { min-height: unset; height: 2px; }
    input[type=range]::-webkit-slider-thumb { width: 12px; height: 12px; }
    input[type=range]::-moz-range-thumb { width: 12px; height: 12px; }

    button { min-height: unset; padding: 9px 0; border-radius: 7px; }
    .layer-row { min-height: unset; }
  }

</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>NeuralViz</h1>
  <p>3D Network Explorer</p>
</div>

<div id="hint">drag to rotate &nbsp;·&nbsp; pinch to zoom</div>

<!-- Mobile panel toggle FAB -->
<button id="panel-toggle" aria-label="Toggle controls">⚙</button>

<!-- Camera prompt button -->
<div id="cam-prompt" title="Enable camera">
  <div id="cam-prompt-text">Enable<br>Camera</div>
</div>

<!-- Live B&W feed (hidden until camera granted) -->
<div id="cam-container" style="display:none;">
  <canvas id="cam-canvas" width="10" height="10"></canvas>
</div>
<video id="cam-video" style="display:none;" playsinline autoplay muted></video>

<div id="panel">
  <div id="panel-handle"></div>
  <div class="ctrl-group">
    <label>Input Resolution</label>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="btn-res-dec" style="flex:1;padding:7px 0;">-</button>
      <div id="res-badge" style="flex:2;text-align:center;font-size:0.58rem;color:#fff;white-space:nowrap;">10×10</div>
      <button id="btn-res-inc" style="flex:1;padding:7px 0;">+</button>
    </div>
  </div>

  <div class="ctrl-group">
    <label>Layer Neurons</label>
    <div class="layer-inputs" id="layer-inputs"></div>
  </div>

  <div class="ctrl-group">
    <label>Layers</label>
    <div style="display:flex;gap:5px;">
      <button id="btn-add-layer">+ Add</button>
      <button id="btn-rem-layer" class="danger">- Remove</button>
    </div>
  </div>

  <button id="btn-rebuild" style="margin-top:2px;">↺ Rebuild</button>
  <button id="btn-pause-rotate">⏸ Rotation</button>

  <div id="stats">
    Layers: <span id="st-layers">-</span><br>
    Neurons: <span id="st-neurons">-</span><br>
    Connections: <span id="st-conns">-</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const DEFAULT_LAYERS = [100, 16, 8, 4]; // layerSizes[0] overridden by camRes (max 25×25=625)
const MAX_LAYERS = 9;
const MIN_LAYERS = 2;
const MAX_NEURONS = 100;
const MIN_NEURONS = 1;

const LAYER_SPACING = 2.5;
const NODE_RADIUS   = 0.22;
const ORBIT_RADIUS  = 28;

// ═══════════════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.FogExp2(0x050810, 0.022);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 0, ORBIT_RADIUS);

// Lights
const ambLight = new THREE.AmbientLight(0x1a2840, 1.8);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0x3aaeff, 3.5);
dirLight.position.set(5, 8, 10);
scene.add(dirLight);

const pointA = new THREE.PointLight(0x6040ff, 6, 60);
pointA.position.set(-10, 6, 0);
scene.add(pointA);

const pointB = new THREE.PointLight(0xff4090, 4, 50);
pointB.position.set(10, -5, 0);
scene.add(pointB);

// State
let layerSizes = [...DEFAULT_LAYERS];
let networkGroup = null;
let animSpeed = 1;
let camRes = 10; // current camera/input resolution (side length)
let inputNodeMeshes = [];
let pixelValues = new Float32Array(camRes * camRes);

// Forward-pass state
let weights     = [];  // weights[l] = Float32Array of size layerSizes[l] * layerSizes[l+1]
let biases      = [];  // biases[l]  = Float32Array of size layerSizes[l+1]
let activations = [];  // activations[l] = Float32Array of size layerSizes[l]
let nodeMeshes  = [];  // nodeMeshes[l][n] = THREE.Mesh
let edgeMats    = [];  // edgeMats[l] = array of { mat, srcNi, dstNi }

// Shared geometries & materials
const nodeGeo = new THREE.SphereGeometry(NODE_RADIUS, 20, 20);

// ═══════════════════════════════════════════════════════
//  NETWORK BUILDER
// ═══════════════════════════════════════════════════════
function buildNetwork() {
  if (networkGroup) {
    scene.remove(networkGroup);
    networkGroup.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
  }

  networkGroup = new THREE.Group();
  scene.add(networkGroup);
  inputNodeMeshes = [];
  pixelValues = new Float32Array(camRes * camRes);
  nodeMeshes  = [];
  edgeMats    = [];
  activations = [];
  smoothActs  = null; // force reinit so new layer sizes get correctly-sized arrays

  // Generate random weights & biases (Xavier-ish init)
  weights = [];
  biases  = [];
  for (let l = 0; l < layerSizes.length - 1; l++) {
    const fanIn  = layerSizes[l];
    const fanOut = layerSizes[l + 1];
    const scale  = Math.sqrt(2.0 / fanIn);
    const w = new Float32Array(fanIn * fanOut);
    for (let i = 0; i < w.length; i++) w[i] = (Math.random() * 2 - 1) * scale;
    weights.push(w);
    const b = new Float32Array(fanOut);
    biases.push(b);
  }

  const L = layerSizes.length;
  const totalWidth = (L - 1) * LAYER_SPACING;

  // Palette per layer (gradient from cyan -> purple -> pink)
  function layerColor(i) {
    const t = i / Math.max(L - 1, 1);
    const r = Math.round(lerp(0x33, 0xcc, t));
    const g = Math.round(lerp(0xaa, 0x44, t));
    const b = Math.round(lerp(0xff, 0xff, t));
    return new THREE.Color(r / 255, g / 255, b / 255);
  }

  const nodePositions = []; // [layer][neuron] = Vector3

  // Nodes
  for (let li = 0; li < L; li++) {
    const n = layerSizes[li];
    const x = li * LAYER_SPACING - totalWidth / 2;
    const col = layerColor(li);
    const layerNodes = [];
    const layerMeshes = [];

    for (let ni = 0; ni < n; ni++) {
      // Input layer (li=0): arrange as camRes×camRes grid matching camera pixels
      let y, z;
      if (li === 0 && n === camRes * camRes) {
        const col10 = ni % camRes;
        const row10 = Math.floor(ni / camRes);
        const half  = (camRes - 1) / 2;
        // const spacing = Math.min(0.55, 5.0 / camRes); // shrink spacing at high res
        const spacing = 0.55;
        y = (half - row10) * spacing;
        z = (col10 - half) * spacing;
      } else if (n <= 6) {
        // Linear column: spacing grows slightly with count
        const spacing = 0.9 + n * 0.04;
        y = (ni - (n - 1) / 2) * spacing;
        z = 0;
      } else {
        // Circular ring: radius scales with node count so nodes never crowd
        const angle = (ni / n) * Math.PI * 2;
        // Enough arc-length per node: circumference = n * minArc, so r = n * minArc / (2π)
        const minArcPerNode = 0.55; // minimum gap (world units) between adjacent nodes
        const r = Math.max(n * minArcPerNode / (Math.PI * 2), 1.2);
        y = Math.cos(angle) * r;
        z = Math.sin(angle) * r;
      }

      const pos = new THREE.Vector3(x, y, z);
      layerNodes.push(pos);

      // Core sphere
      const mat = new THREE.MeshPhongMaterial({
        color: col,
        emissive: col,
        emissiveIntensity: 0.35,
        shininess: 120,
        transparent: true,
        opacity: 0.95,
      });
      const mesh = new THREE.Mesh(nodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { type: 'node', li, ni, baseMat: mat, color: col };
      networkGroup.add(mesh);
      layerMeshes.push(mesh);
      if (li === 0) inputNodeMeshes[ni] = mesh;

      // Glow halo
      const haloGeo = new THREE.SphereGeometry(NODE_RADIUS * 2.2, 12, 12);
      const haloMat = new THREE.MeshBasicMaterial({
        color: col, transparent: true, opacity: 0.07, side: THREE.BackSide
      });
      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.position.copy(pos);
      networkGroup.add(halo);
    }
    nodePositions.push(layerNodes);
    nodeMeshes.push(layerMeshes);
    activations.push(new Float32Array(n));
  }

  // Edges
  let connCount = 0;
  for (let li = 0; li < L - 1; li++) {
    const src = nodePositions[li];
    const dst = nodePositions[li + 1];
    const colA = layerColor(li);
    const colB = layerColor(li + 1);

    // Draw a visual sample of edges (too many to draw all)
    const maxEdges = 150;
    const pairs = [];
    for (let a = 0; a < src.length; a++)
      for (let b = 0; b < dst.length; b++)
        pairs.push([a, b]);

    shuffleArray(pairs);
    const drawn = pairs.slice(0, maxEdges);

    const layerEdgeMats = [];
    for (const [a, b] of drawn) {
      const pts = [src[a], dst[b]];
      const geo = new THREE.BufferGeometry().setFromPoints(pts);

      const colors = new Float32Array([
        colA.r, colA.g, colA.b,
        colB.r, colB.g, colB.b,
      ]);
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const mat = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.08,
      });
      const line = new THREE.Line(geo, mat);
      line.userData = { type: 'edge', li, a, b, mat };
      networkGroup.add(line);
      layerEdgeMats.push({ mat, srcNi: a, dstNi: b });
      connCount++;
    }
    edgeMats.push(layerEdgeMats);
  }

  // Update stats
  document.getElementById('st-layers').textContent  = L;
  document.getElementById('st-neurons').textContent = layerSizes.reduce((s,v) => s + v, 0);
  document.getElementById('st-conns').textContent   = connCount;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ═══════════════════════════════════════════════════════
//  FORWARD PASS
// ═══════════════════════════════════════════════════════
function relu(x) { return x > 0 ? x : 0; }

// Smooth exponential moving average for activations (prevents flickering)
const ACT_SMOOTH = 0.15;
let smoothActs = null; // lazily initialised

function forwardPass() {
  if (!activations.length) return;

  const L = layerSizes.length;

  // Layer 0: pixel values are the input activations
  const inputN = camRes * camRes;
  for (let ni = 0; ni < Math.min(layerSizes[0], inputN); ni++) {
    activations[0][ni] = pixelValues[ni] || 0;
  }

  // Forward through each layer: act[l+1][j] = relu( sum_i( w[i*fanOut+j] * act[l][i] ) + b[j] )
  for (let l = 0; l < L - 1; l++) {
    const fanIn  = layerSizes[l];
    const fanOut = layerSizes[l + 1];
    const W = weights[l];
    const B = biases[l];
    const srcAct = activations[l];
    const dstAct = activations[l + 1];

    for (let j = 0; j < fanOut; j++) {
      let sum = B[j];
      for (let i = 0; i < fanIn; i++) {
        sum += W[i * fanOut + j] * srcAct[i];
      }
      dstAct[j] = relu(sum);
    }
  }

  // Lazy init smoothed activations — reinit if layer count or any layer size changed
  if (!smoothActs || smoothActs.length !== L ||
      smoothActs.some((sa, l) => sa.length !== layerSizes[l])) {
    smoothActs = activations.map(a => new Float32Array(a.length));
  }

  // Smooth + find per-layer max for normalisation
  for (let l = 0; l < L; l++) {
    let maxV = 0.001;
    for (let ni = 0; ni < layerSizes[l]; ni++) {
      smoothActs[l][ni] += (activations[l][ni] - smoothActs[l][ni]) * ACT_SMOOTH;
      if (smoothActs[l][ni] > maxV) maxV = smoothActs[l][ni];
    }
    // Store max on the array for use below
    smoothActs[l]._max = maxV;
  }
}

function animateNetwork(dt) {
  if (!networkGroup) return;

  forwardPass();

  const L = layerSizes.length;

  // Update node brightness
  for (let l = 0; l < L; l++) {
    const maxV = smoothActs && smoothActs[l] ? (smoothActs[l]._max || 0.001) : 0.001;
    const meshes = nodeMeshes[l];
    if (!meshes) continue;
    for (let ni = 0; ni < meshes.length; ni++) {
      const mesh = meshes[ni];
      if (!mesh) continue;
      const { baseMat } = mesh.userData;
      const raw = smoothActs && smoothActs[l] ? smoothActs[l][ni] : 0;
      const v = Math.min(raw / maxV, 1.0); // normalised 0..1
      baseMat.emissiveIntensity = 0.04 + v * 1.4;
      baseMat.opacity           = 0.25 + v * 0.73;
    }
  }

  // Update edge opacity based on src activation × |weight|
  for (let l = 0; l < L - 1; l++) {
    const layerEdges = edgeMats[l];
    if (!layerEdges) continue;
    const srcMax = smoothActs && smoothActs[l] ? (smoothActs[l]._max || 0.001) : 0.001;
    const fanOut = layerSizes[l + 1];

    for (const { mat, srcNi, dstNi } of layerEdges) {
      const srcV   = smoothActs && smoothActs[l] ? smoothActs[l][srcNi] / srcMax : 0;
      const wIdx   = srcNi * fanOut + dstNi;
      const wAbs   = weights[l] ? Math.abs(weights[l][wIdx]) : 0;
      // Edge glow = how active is the source × how large is the weight
      const signal = Math.min(srcV * wAbs * 3.0, 1.0);
      mat.opacity  = 0.02 + signal * 0.55;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  ORBIT CONTROLS (manual, no import needed)
// ═══════════════════════════════════════════════════════
let isDragging = false;
let autoRotate  = true;
let lastMouse  = { x: 0, y: 0 };
let spherical  = { theta: 0, phi: Math.PI / 2 };
let targetSph  = { theta: 0, phi: Math.PI / 2 };
let zoomDist   = ORBIT_RADIUS;
let targetZoom = ORBIT_RADIUS;

const canvas = renderer.domElement;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('dragging');
});
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

window.addEventListener('mouseup',   () => { isDragging = false; document.body.classList.remove('dragging'); });
window.addEventListener('touchend',  () => { isDragging = false; });

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = { x: e.clientX, y: e.clientY };
  targetSph.theta -= dx * 0.008;
  targetSph.phi    = Math.max(0.15, Math.min(Math.PI - 0.15, targetSph.phi - dy * 0.008));
});
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  targetSph.theta -= dx * 0.008;
  targetSph.phi    = Math.max(0.15, Math.min(Math.PI - 0.15, targetSph.phi - dy * 0.008));
}, { passive: true });

canvas.addEventListener('wheel', e => {
  targetZoom = Math.max(6, Math.min(60, targetZoom + e.deltaY * 0.04));
}, { passive: true });

function updateCamera() {
  // Smooth damp
  spherical.theta += (targetSph.theta - spherical.theta) * 0.1;
  spherical.phi   += (targetSph.phi   - spherical.phi)   * 0.1;
  zoomDist        += (targetZoom      - zoomDist)         * 0.1;

  camera.position.x = zoomDist * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = zoomDist * Math.cos(spherical.phi);
  camera.position.z = zoomDist * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════
let lastTime = 0;
function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Slow auto-rotate when idle
  if (!isDragging && autoRotate) targetSph.theta += dt * 0.08;

  updateCamera();
  animateNetwork(dt);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function buildLayerInputs() {
  const container = document.getElementById('layer-inputs');
  container.innerHTML = '';
  layerSizes.forEach((v, i) => {
    const row = document.createElement('div');
    row.className = 'layer-row';

    const lbl = document.createElement('span');
    lbl.textContent = i + 1;

    if (i === 0) {
      // Input layer is locked to camera pixels
      const badge = document.createElement('div');
      badge.className = 'val-badge';
      badge.style.cssText = 'width:auto;font-size:0.5rem;color:var(--accent);opacity:0.7;white-space:nowrap;';
      badge.textContent = camRes + 'x' + camRes + ' · cam';
      badge.id = 'cam-res-badge';
      row.appendChild(lbl);
      row.appendChild(badge);
      container.appendChild(row);
      return;
    }

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min  = MIN_NEURONS;
    slider.max  = MAX_NEURONS;
    slider.value = v;

    const badge = document.createElement('div');
    badge.className = 'val-badge';
    badge.textContent = v;

    slider.addEventListener('input', () => {
      layerSizes[i] = parseInt(slider.value);
      badge.textContent = slider.value;
      buildNetwork();
    });

    row.appendChild(lbl);
    row.appendChild(slider);
    row.appendChild(badge);
    container.appendChild(row);
  });
}

document.getElementById('btn-add-layer').addEventListener('click', () => {
  if (layerSizes.length >= MAX_LAYERS) return;
  layerSizes.push(4);
  layerSizes[0] = camRes * camRes;
  buildLayerInputs();
  buildNetwork();
});

document.getElementById('btn-rem-layer').addEventListener('click', () => {
  if (layerSizes.length <= MIN_LAYERS) return;
  layerSizes.pop();
  buildLayerInputs();
  buildNetwork();
});

document.getElementById('btn-pause-rotate').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.textContent = autoRotate ? '⏸ Rotation' : '▶ Rotation';
});

document.getElementById('btn-rebuild').addEventListener('click', () => {
  // Randomize sizes for fun
  layerSizes = layerSizes.map((v, i) => i === 0 ? camRes * camRes : Math.floor(Math.random() * 14) + 2);
  buildLayerInputs();
  buildNetwork();
});

// ═══════════════════════════════════════════════════════
//  CAMERA B&W FEED
// ═══════════════════════════════════════════════════════
const camPrompt    = document.getElementById('cam-prompt');
const camContainer = document.getElementById('cam-container');
const camCanvas    = document.getElementById('cam-canvas');
const camVideo     = document.getElementById('cam-video');
const camCtx       = camCanvas.getContext('2d');

camPrompt.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    camVideo.srcObject = stream;
    await camVideo.play();
    camPrompt.style.display    = 'none';
    camContainer.style.display = 'block';
    drawBW();
  } catch (err) {
    const txt = document.getElementById('cam-prompt-text');
    txt.textContent = err.name === 'NotAllowedError' ? 'Access Denied' : 'Not Available';
  }
});

function drawBW() {
  if (camVideo.readyState >= 2) {
    const r = camRes;
    camCtx.drawImage(camVideo, 0, 0, r, r);
    const img = camCtx.getImageData(0, 0, r, r);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = grey;
      pixelValues[i >> 2] = grey / 255;
    }
    camCtx.putImageData(img, 0, 0);
  }
  requestAnimationFrame(drawBW);
}

// ═══════════════════════════════════════════════════════
//  RESOLUTION BUTTONS
// ═══════════════════════════════════════════════════════
(function() {
  const badge  = document.getElementById('res-badge');
  const btnDec = document.getElementById('btn-res-dec');
  const btnInc = document.getElementById('btn-res-inc');
  const MIN_RES = 10, MAX_RES = 25, STEP = 5;

  function applyRes() {
    const total = camRes * camRes;
    badge.textContent = camRes + '×' + camRes;
    btnDec.disabled = camRes <= MIN_RES;
    btnInc.disabled = camRes >= MAX_RES;

    camCanvas.width  = camRes;
    camCanvas.height = camRes;
    pixelValues = new Float32Array(total);
    layerSizes[0] = total;
    smoothActs = null;
    buildLayerInputs();
    buildNetwork();
  }

  btnDec.addEventListener('click', () => { if (camRes > MIN_RES) { camRes -= STEP; applyRes(); } });
  btnInc.addEventListener('click', () => { if (camRes < MAX_RES) { camRes += STEP; applyRes(); } });

  // Set initial button states without rebuilding (network already built at init)
  badge.textContent = camRes + '×' + camRes;
  btnDec.disabled = camRes <= MIN_RES;
  btnInc.disabled = camRes >= MAX_RES;
})();

// ═══════════════════════════════════════════════════════
//  PINCH-TO-ZOOM (mobile)
// ═══════════════════════════════════════════════════════
let pinchStartDist = null;
let pinchStartZoom = null;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.hypot(dx, dy);
    pinchStartZoom = targetZoom;
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStartDist !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = pinchStartDist / dist;
    targetZoom = Math.max(6, Math.min(60, pinchStartZoom * scale));
  }
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchStartDist = null;
}, { passive: true });

// ═══════════════════════════════════════════════════════
//  MOBILE PANEL TOGGLE
// ═══════════════════════════════════════════════════════
const panelToggleBtn = document.getElementById('panel-toggle');
const panelEl = document.getElementById('panel');

panelToggleBtn.addEventListener('click', () => {
  panelEl.classList.toggle('open');
});

// Close panel when tapping the canvas (mobile)
canvas.addEventListener('touchstart', () => {
  if (window.innerWidth < 640) panelEl.classList.remove('open');
}, { passive: true });


buildLayerInputs();
buildNetwork();
animate(0);
</script>
</body>
</html>
