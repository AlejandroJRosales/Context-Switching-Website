<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT - Brain Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #04060f;
    --panel:   rgba(6, 10, 22, 0.93);
    --border:  rgba(80, 200, 160, 0.15);
    --accent:  #2fffa0;
    --accent2: #a06fff;
    --accent3: #ff6fa0;
    --warn:    #ffaa33;
    --text:    #b8d8c8;
    --dim:     #406050;
    --tap:     44px;

    /* Lobe palette */
    --col-prefrontal:  #2fffa0;
    --col-motor:       #ff6fa0;
    --col-occipital:   #56b4e9;
    --col-temporal:    #e6a020;
    --col-parietal:    #a06fff;
    --col-thalamus:    #ffffff;
    --col-brainstem:   #ff4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body.dragging { cursor: grabbing; }

  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }

  /* TITLE */
  #title {
    position: fixed;
    top: 20px; left: 20px;
    pointer-events: none;
    z-index: 10;
  }
  #title h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }
  #title h1 span { color: var(--accent); }
  #title p {
    font-size: 0.48rem;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* GEN/TICK LABEL */
  #gen-label {
    position: fixed;
    top: 20px; right: 20px;
    font-size: 0.44rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
  }

  /* CAMERA FEED */
  #cam-prompt {
    width: 100%;
    padding: 9px 0;
    border: 1px solid rgba(86,180,233,0.3);
    border-radius: 8px;
    background: rgba(86,180,233,0.06);
    color: #56b4e9;
    font-family: 'Space Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #cam-prompt:active { background: rgba(86,180,233,0.18); }
  #cam-prompt-icon { font-size: 0.85rem; line-height: 1; }
  #cam-container {
    position: fixed;
    bottom: 86px; right: 20px;
    width: 68px; height: 68px;
    border: 1px solid rgba(86,180,233,0.4);
    border-radius: 10px; overflow: hidden;
    background: #000; z-index: 20; display: none;
  }
  #cam-canvas {
    display: none; width: 68px; height: 68px;
    image-rendering: pixelated;
  }
  #cam-label {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center; font-size: 0.36rem;
    letter-spacing: 0.1em; color: #56b4e9;
    text-transform: uppercase; pointer-events: none; opacity: 0.7;
  }
  #cam-active-dot {
    position: absolute; top: 5px; right: 5px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #56b4e9;
    box-shadow: 0 0 6px #56b4e9;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  @media (min-width: 640px) {
    #cam-container {
      bottom: auto; top: 80px; right: 32px;
      width: 80px; height: 80px;
    }
    #cam-canvas { width: 80px; height: 80px; }
  }

  /* PANEL TOGGLE */
  #panel-toggle {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 30;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    font-size: 1.2rem;
    pointer-events: all;
  }
  @media (min-width: 640px) { #panel-toggle { display: none; } }

  /* SIDE PANEL */
  #panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 0 20px 32px;
    backdrop-filter: blur(20px);
    z-index: 25;
    display: flex; flex-direction: column; gap: 14px;
    max-height: 75dvh; overflow-y: auto;
    overscroll-behavior: contain;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }
  #panel.open { transform: translateY(0); }

  #panel-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border);
    margin: 12px auto 4px;
    flex-shrink: 0;
  }

  @media (min-width: 640px) {
    #title { top: 28px; left: 32px; }
    #title h1 { font-size: 1.8rem; }
    #gen-label { top: 28px; right: 32px; }
    #panel {
      position: fixed;
      top: 50%; right: 28px;
      left: auto; bottom: auto;
      transform: translateY(-50%) !important;
      border-radius: 14px;
      border-bottom: 1px solid var(--border);
      padding: 22px 18px;
      width: 210px;
      max-height: none; overflow-y: visible;
      transition: none;
    }
    #panel-handle { display: none; }
  }

  /* PANEL INTERNALS */
  .section-label {
    font-size: 0.46rem;
    letter-spacing: 0.26em;
    color: var(--accent);
    text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Lobe legend */
  #lobe-legend { display: flex; flex-direction: column; gap: 7px; }
  .lobe-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.5rem; color: var(--text);
    cursor: pointer;
  }
  .lobe-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .lobe-row .lobe-count { margin-left: auto; color: var(--dim); font-size: 0.44rem; }

  /* Controls */
  .ctrl-row {
    display: flex; align-items: center; gap: 8px;
    min-height: 36px;
  }
  .ctrl-label {
    font-size: 0.46rem; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.14em;
    flex: 1;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 2px;
    background: linear-gradient(to right, var(--accent), var(--accent2));
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .val-badge { font-size: 0.52rem; color: #fff; width: 28px; text-align: right; }

  button {
    width: 100%;
    padding: 9px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(47,255,160,0.06);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:active { background: rgba(47,255,160,0.18); }
  button.danger {
    border-color: rgba(255,100,100,0.25);
    color: var(--accent3);
    background: rgba(255,100,160,0.04);
  }
  button.danger:active { background: rgba(255,100,160,0.15); }

  #stats {
    font-size: 0.5rem; color: var(--dim);
    line-height: 2.1;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  #stats span { color: var(--text); }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.5rem;
    line-height: 1.9;
    color: var(--text);
    backdrop-filter: blur(12px);
    z-index: 50;
    display: none;
    white-space: nowrap;
  }
  #tooltip .tt-title { color: #fff; font-size: 0.55rem; margin-bottom: 3px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>MAT</h1>
  <p>Modular-Network of Adaptive Topologies</p>
  <p>Proto-Brain - v0-opt</p>
</div>

<div id="gen-label">Tick <span id="tick-num">0</span></div>

<!-- Live B&W feed -->
<div id="cam-container">
  <canvas id="cam-canvas" width="10" height="10"></canvas>
  <div id="cam-label">occipital</div>
  <div id="cam-active-dot"></div>
</div>
<video id="cam-video" style="display:none;" playsinline autoplay muted></video>

<button id="panel-toggle" aria-label="Toggle controls">⚙</button>

<div id="panel">
  <div id="panel-handle"></div>

  <div id="lobe-legend"></div>

  <div class="ctrl-row">
    <span class="ctrl-label">Speed</span>
    <input type="range" id="sl-speed" min="1" max="20" value="5">
    <span class="val-badge" id="vb-speed">5</span>
  </div>

  <div class="ctrl-row">
    <span class="ctrl-label">Fire Thresh</span>
    <input type="range" id="sl-thresh" min="10" max="90" value="50">
    <span class="val-badge" id="vb-thresh">0.50</span>
  </div>

  <div class="ctrl-row">
    <span class="ctrl-label">Bio Noise</span>
    <input type="range" id="sl-noise" min="0" max="100" value="25">
    <span class="val-badge" id="vb-noise">25</span>
  </div>

  <button id="btn-pause">Pause Rotation</button>
  <button id="btn-reset">Reset Brain</button>
  <div id="cam-prompt" title="Toggle camera vision -> feeds Occipital lobe">
    <span id="cam-prompt-text">Enable Vision</span>
  </div>

  <div class="ctrl-row">
    <span class="ctrl-label">Resolution</span>
    <div style="display:flex;gap:5px;flex:1;justify-content:flex-end;align-items:center;">
      <button id="btn-res-dec" style="width:28px;padding:5px 0;font-size:0.7rem;">-</button>
      <span id="res-badge" style="font-size:0.5rem;color:#fff;white-space:nowrap;min-width:52px;text-align:center;">10 by 10</span>
      <button id="btn-res-inc" style="width:28px;padding:5px 0;font-size:0.7rem;">+</button>
    </div>
  </div>

  <div id="stats">
    Lobes: <span id="st-lobes">-</span><br>
    Neurons: <span id="st-neurons">-</span><br>
    Synapses: <span id="st-conns">-</span><br>
    Active: <span id="st-active">-</span><br>
    Firings/tick: <span id="st-fires">-</span>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title">-</div>
  <div id="tt-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  MAT BRAIN CONFIG mirrors yaml structure
// ═══════════════════════════════════════════════════════════════
const LOBE_DEFS = [
  { name: 'prefrontal',  label: 'Prefrontal Cortex',   task: 'planning / decision',      neurons: 18, connP: 0.25, crossP: 0.12, color: '#2fffa0', pos: [ 0,       1.7955,  0      ] },
  { name: 'motor',       label: 'Motor Cortex',         task: 'action control',           neurons: 14, connP: 0.20, crossP: 0.10, color: '#ff6fa0', pos: [-2.1945,  0.7980,  0.7980 ] },
  { name: 'occipital',   label: 'Occipital',   task: 'visual processing',        neurons: 16, connP: 0.22, crossP: 0.08, color: '#56b4e9', pos: [ 2.1945,  0.7980, -0.7980 ] },
  { name: 'temporal',    label: 'Temporal/Parietal',    task: 'sensory integration',      neurons: 14, connP: 0.20, crossP: 0.10, color: '#e6a020', pos: [ 2.1945, -0.7980,  0.7980 ] },
  { name: 'parietal',    label: 'Parietal',    task: 'memory routing',           neurons: 12, connP: 0.18, crossP: 0.09, color: '#a06fff', pos: [-2.1945, -0.7980, -0.7980 ] },
  { name: 'thalamus',    label: 'Thalamus',    task: 'inter-lobe routing',       neurons:  8, connP: 0.30, crossP: 0.25, color: '#e8e8e8', pos: [ 0,       0,       0      ] },
  { name: 'brainstem',   label: 'Brainstem', task: 'reflex / survival drives', neurons:  6, connP: 0.35, crossP: 0.18, color: '#ff4444', pos: [ 0,      -1.9950,  0      ] },
];

const LOBE_SPREAD = 0.5;   // how far neurons scatter inside a lobe cluster
const ORBIT_RADIUS = 10;
const NODE_R = 0.09;
const MAX_CROSS_EDGES_DRAWN = 50;
const MAX_INTRA_EDGES_DRAWN = 50;

// ═══════════════════════════════════════════════════════════════
//  SCENE
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x04060f);
scene.fog = new THREE.FogExp2(0x04060f, 0.018);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 0, ORBIT_RADIUS);

// Lights
scene.add(new THREE.AmbientLight(0x0a2020, 2.5));
const dirL = new THREE.DirectionalLight(0x20ffaa, 2.0);
dirL.position.set(4, 8, 6);
scene.add(dirL);
const ptA = new THREE.PointLight(0x6040ff, 5, 55);
ptA.position.set(-8, 5, 0);
scene.add(ptA);
const ptB = new THREE.PointLight(0xff3060, 3, 45);
ptB.position.set(8, -4, 0);
scene.add(ptB);

// Shared geometries
const nodeGeo  = new THREE.SphereGeometry(NODE_R, 16, 16);

// ═══════════════════════════════════════════════════════════════
//  SIMULATION STATE
// ═══════════════════════════════════════════════════════════════
let simRunning = true;
let simSpeed   = 5;
let fireThresh = 0.50;
let tickCount  = 0;
let firesThisTick = 0;

// Biological noise parameters
let noiseLevel = 0.25; // 0..1, controlled by slider
// Derived noise constants (recomputed when noiseLevel changes)
let NOISE_MEMBRANE   = 0;  // std-dev of per-tick Gaussian membrane noise
let NOISE_SPONT_P    = 0;  // probability of spontaneous spike per neuron per tick
let NOISE_SYN_FAIL_P = 0;  // probability a synapse silently fails to transmit
const REFRACTORY_TICKS = 2; // ticks a neuron cannot fire after spiking

function applyNoiseLevel(v) {
  noiseLevel       = v;
  NOISE_MEMBRANE   = v * 0.12;         // 0 .. 0.12 std-dev
  NOISE_SPONT_P    = v * v * 0.018;   // 0 .. ~0.018 (quadratic: stays low at low noise)
  NOISE_SYN_FAIL_P = v * 0.35;        // 0 .. 0.35 failure rate
}
applyNoiseLevel(noiseLevel);

// Box-Muller Gaussian sample (mean 0, std 1)
function randGauss() {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// Camera / vision input
const CAM_RES_MIN  = 10;
const CAM_RES_MAX  = 50;
const CAM_RES_STEP = 5;
let camRes         = 20; // current resolution (side length); grid = camRes by camRes nodes
let pixelValues    = new Float32Array(camRes * camRes); // greyscale 0..1
let camActive      = false;
let occipitalIdxs  = []; // filled by buildBrain, used by simTick

// Neurons: flat array of objects
let neurons = [];
// networkGroup holds all Three.js objects
let networkGroup = null;
// Raycaster for click inspection
const raycaster  = new THREE.Raycaster();
const mouse2d    = new THREE.Vector2();

// ═══════════════════════════════════════════════════════════════
//  BUILD BRAIN
// ═══════════════════════════════════════════════════════════════
function buildBrain() {
  if (networkGroup) {
    scene.remove(networkGroup);
    networkGroup.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
      }
    });
  }
  networkGroup = new THREE.Group();
  scene.add(networkGroup);
  neurons = [];

  // Spawn neurons per lobe
  const lobeNeuronMap = {}; // lobeName -> array of neuron indices

  for (const lobe of LOBE_DEFS) {
    const lobeCenter = new THREE.Vector3(...lobe.pos);
    const idxs = [];
    for (let i = 0; i < lobe.neurons; i++) {
      // Scatter inside sphere of radius LOBE_SPREAD
      const r = LOBE_SPREAD * Math.cbrt(Math.random());
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const offset = new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
      const pos = lobeCenter.clone().add(offset);
      const nid = neurons.length;
      const col = new THREE.Color(lobe.color);

      // Core mesh
      const mat = new THREE.MeshPhongMaterial({
        color: col, emissive: col,
        emissiveIntensity: 0.2,
        shininess: 100,
        transparent: true, opacity: 0.5
      });
      const mesh = new THREE.Mesh(nodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { neuronIdx: nid };
      networkGroup.add(mesh);

      neurons.push({
        id: `${lobe.name}_${i}`,
        lobe: lobe.name,
        lobeColor: lobe.color,
        task: lobe.task,
        inputSum: 0,       // weighted sum of inputs this tick
        smoothInput: 0,    // EMA for visuals
        threshold: fireThresh + (Math.random() - 0.5) * 0.1,
        neurotransmitter: lobe.name === 'brainstem' ? 'norepinephrine' : lobe.name === 'thalamus' ? 'acetylcholine' : 'glutamate',
        connections: [],   // indices of target neurons
        weights: [],       // corresponding synaptic weights
        camWeight: lobe.name === 'occipital' ? (Math.random() * 0.6 + 0.2) : 0,
        refractoryLeft: 0,  // ticks remaining in absolute refractory period
        mesh,
        mat,
        pos,
        fired: false,
      });
      idxs.push(nid);
    }
    lobeNeuronMap[lobe.name] = idxs;
  }

  // Intra-lobe connections
  let totalConns = 0;
  for (const lobe of LOBE_DEFS) {
    const idxs = lobeNeuronMap[lobe.name];
    for (const src of idxs) {
      for (const tgt of idxs) {
        if (src !== tgt && Math.random() < lobe.connP) {
          const w = (Math.random() * 0.5 + 0.05);
          neurons[src].connections.push(tgt);
          neurons[src].weights.push(w);
          totalConns++;
        }
      }
    }
  }

  // Cross-lobe connections (thalamus gets priority)
  for (const lobe of LOBE_DEFS) {
    const srcIdxs = lobeNeuronMap[lobe.name];
    const otherLobes = LOBE_DEFS.filter(l => l.name !== lobe.name);
    for (const src of srcIdxs) {
      if (Math.random() < lobe.crossP) {
        const targetLobe = otherLobes[Math.floor(Math.random() * otherLobes.length)];
        const targetIdxs = lobeNeuronMap[targetLobe.name];
        const tgt = targetIdxs[Math.floor(Math.random() * targetIdxs.length)];
        const w = (Math.random() * 0.5 + 0.05);
        neurons[src].connections.push(tgt);
        neurons[src].weights.push(w);
        totalConns++;
      }
    }
  }

  // Draw intra-lobe edges
  for (const lobe of LOBE_DEFS) {
    const col = new THREE.Color(lobe.color);
    const idxs = lobeNeuronMap[lobe.name];
    let drawn = 0;
    for (const src of idxs) {
      for (let ci = 0; ci < neurons[src].connections.length; ci++) {
        const tgt = neurons[src].connections[ci];
        if (!lobeNeuronMap[lobe.name].includes(tgt)) continue;
        if (drawn >= MAX_INTRA_EDGES_DRAWN) break;
        addEdgeLine(neurons[src].pos, neurons[tgt].pos, col, col, 0.06);
        drawn++;
      }
    }
  }

  // Draw cross-lobe edges (sampled)
  const crossEdges = [];
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    for (let ci = 0; ci < n.connections.length; ci++) {
      const tgt = n.connections[ci];
      if (neurons[tgt].lobe !== n.lobe) {
        crossEdges.push({ src: ni, tgt, w: n.weights[ci] });
      }
    }
  }
  shuffle(crossEdges);
  for (let i = 0; i < Math.min(crossEdges.length, MAX_CROSS_EDGES_DRAWN); i++) {
    const e = crossEdges[i];
    const cA = new THREE.Color(neurons[e.src].lobeColor);
    const cB = new THREE.Color(neurons[e.tgt].lobeColor);
    addEdgeLine(neurons[e.src].pos, neurons[e.tgt].pos, cA, cB, 0.04);
  }

  // Stats
  document.getElementById('st-lobes').textContent   = LOBE_DEFS.length;
  document.getElementById('st-neurons').textContent = neurons.length;
  document.getElementById('st-conns').textContent   = totalConns;

  buildLobeLegend(lobeNeuronMap);

  // Store occipital indices for camera injection
  occipitalIdxs = lobeNeuronMap['occipital'] || [];

  // Camera input layer: 10 by 10 grid of input nodes wired to occipital
  buildCamInputLayer(lobeNeuronMap['occipital']);
}

function addEdgeLine(pA, pB, colA, colB, baseOpacity) {
  const geo = new THREE.BufferGeometry().setFromPoints([pA, pB]);
  const colors = new Float32Array([colA.r, colA.g, colA.b, colB.r, colB.g, colB.b]);
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: baseOpacity });
  const line = new THREE.Line(geo, mat);
  line.userData.isEdge = true;
  line.userData.baseMat = mat;
  networkGroup.add(line);
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA INPUT LAYER  (camRes by camRes pixel nodes -> occipital lobe)
// ═══════════════════════════════════════════════════════════════
const CAM_NODE_R   = 0.09;
const camNodeGeo   = new THREE.SphereGeometry(CAM_NODE_R, 8, 8);
let   camNodeMeshes = [];
let   camEdgeLines  = [];

function buildCamInputLayer(occIdxs) {
  camNodeMeshes = [];
  camEdgeLines  = [];

  const GRID_ORIGIN = new THREE.Vector3(4.8, 0.8, -0.8);
  const SPACING = 0.22;
  const half = (camRes - 1) / 2;
  const camColor = new THREE.Color('#56b4e9');

  const gridPositions = [];

  for (let row = 0; row < camRes; row++) {
    for (let col = 0; col < camRes; col++) {
      const idx = row * camRes + col;
      const pos = new THREE.Vector3(
        GRID_ORIGIN.x,
        GRID_ORIGIN.y + (half - row) * SPACING,
        GRID_ORIGIN.z + (col - half) * SPACING
      );
      gridPositions.push(pos);

      const mat = new THREE.MeshBasicMaterial({
        color: camColor, transparent: true, opacity: 0.25
      });
      const mesh = new THREE.Mesh(camNodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { isCamNode: true, pixelIdx: idx };
      networkGroup.add(mesh);
      camNodeMeshes.push({ mesh, mat });
    }
  }

  const occCount = occIdxs.length;
  for (let pi = 0; pi < camRes * camRes; pi++) {
    const targA = occIdxs[pi % occCount];
    const targB = occIdxs[(pi + Math.floor(occCount / 2)) % occCount];
    const targets = [targA];
    if (targA !== targB) targets.push(targB);

    for (const tgt of targets) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        gridPositions[pi], neurons[tgt].pos
      ]);
      const colors = new Float32Array([
        camColor.r, camColor.g, camColor.b,
        camColor.r * 0.5, camColor.g * 0.5, camColor.b * 0.5
      ]);
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.LineBasicMaterial({
        vertexColors: true, transparent: true, opacity: 0.04
      });
      const line = new THREE.Line(geo, mat);
      line.userData.isCamEdge = true;
      networkGroup.add(line);
      camEdgeLines.push({ mat, pixelIdx: pi, tgtNeuronIdx: tgt });
    }
  }
}

function updateCamInputVisuals() {
  // Update pixel node brightness and edge glow based on pixelValues
  for (let pi = 0; pi < camNodeMeshes.length; pi++) {
    const v = camActive ? pixelValues[pi] : 0;
    const { mat } = camNodeMeshes[pi];
    mat.color.setRGB(
      0.34 * (0.2 + v * 0.8),
      0.71 * (0.2 + v * 0.8),
      0.91 * (0.2 + v * 0.8)
    );
    mat.opacity = camActive ? 0.15 + v * 0.85 : 0.15;
  }
  for (const e of camEdgeLines) {
    const v = camActive ? pixelValues[e.pixelIdx] : 0;
    e.mat.opacity = 0.02 + v * 0.25;
  }
}
// ═══════════════════════════════════════════════════════════════
function buildLobeLegend(lobeNeuronMap) {
  const el = document.getElementById('lobe-legend');
  el.innerHTML = '';
  for (const lobe of LOBE_DEFS) {
    const row = document.createElement('div');
    row.className = 'lobe-row';
    row.innerHTML = `
      <div class="lobe-dot" style="background:${lobe.color};color:${lobe.color}"></div>
      <span>${lobe.label}</span>
      <span class="lobe-count">${lobe.neurons}n</span>
    `;
    row.title = lobe.task;
    el.appendChild(row);
  }
}

// ═══════════════════════════════════════════════════════════════
//  SIMULATION TICK
// ═══════════════════════════════════════════════════════════════
function simTick() {
  firesThisTick = 0;

  // Phase 1: reset inputSum, tick down refractory counters
  for (let ni = 0; ni < neurons.length; ni++) {
    neurons[ni].inputSum = 0;
    if (neurons[ni].refractoryLeft > 0) neurons[ni].refractoryLeft--;
  }

  // Camera injection: camWeight * pixel brightness -> occipital inputSum
  if (camActive) {
    const occCount = occipitalIdxs.length;
    const pixCount = camRes * camRes;
    for (let i = 0; i < occCount; i++) {
      const ni = occipitalIdxs[i];
      const pi = i % pixCount;
      neurons[ni].inputSum += neurons[ni].camWeight * pixelValues[pi];
    }
  }

  // Membrane noise: Gaussian thermal fluctuation on every neuron's inputSum
  if (NOISE_MEMBRANE > 0) {
    for (let ni = 0; ni < neurons.length; ni++) {
      neurons[ni].inputSum += randGauss() * NOISE_MEMBRANE;
    }
  }

  // Spontaneous firing: rare depolarisation without synaptic input
  if (NOISE_SPONT_P > 0) {
    for (let ni = 0; ni < neurons.length; ni++) {
      if (neurons[ni].refractoryLeft === 0 && Math.random() < NOISE_SPONT_P) {
        neurons[ni].inputSum += neurons[ni].threshold * 1.05; // just over threshold
      }
    }
  }

  // Phase 2: fire if inputSum meets threshold and not refractory
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (n.refractoryLeft > 0) {
      n.fired = false;
      continue;
    }
    n.fired = n.inputSum >= n.threshold;
    if (n.fired) {
      firesThisTick++;
      n.refractoryLeft = REFRACTORY_TICKS;
    }
  }

  // Phase 3: propagate fired outputs; synaptic release failure applied here
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (!n.fired) continue;
    for (let ci = 0; ci < n.connections.length; ci++) {
      // Synaptic vesicle release failure (probabilistic)
      if (NOISE_SYN_FAIL_P > 0 && Math.random() < NOISE_SYN_FAIL_P) continue;
      neurons[n.connections[ci]].inputSum += n.weights[ci];
    }
  }

  tickCount++;

  // Update stats
  document.getElementById('tick-num').textContent  = tickCount;
  document.getElementById('st-active').textContent =
    neurons.filter(n => n.inputSum > 0).length;
  document.getElementById('st-fires').textContent  = firesThisTick;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER UPDATE
// ═══════════════════════════════════════════════════════════════
function updateVisuals(dt) {
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    // Smooth inputSum for display so visuals don't strobe every tick
    n.smoothInput += (n.inputSum - n.smoothInput) * 0.25;
    const v = Math.min(n.smoothInput / n.threshold, 1.0);
    const fired = n.fired;

    // Emissive intensity: dim -> bright
    n.mat.emissiveIntensity = fired ? 2.2 : 0.08 + v * 1.2;
    n.mat.opacity           = fired ? 1.0 : 0.2 + v * 0.75;

    // Scale pulse on fire
    const s = fired ? 1.5 : 1.0 + v * 0.15;
    n.mesh.scale.setScalar(s);
  }

  updateCamInputVisuals();
}

// ═══════════════════════════════════════════════════════════════
//  ORBIT CAMERA
// ═══════════════════════════════════════════════════════════════
let isDragging = false, autoRotate = true;
let lastMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 2 };
let targetSph = { theta: 0, phi: Math.PI / 2 };

// Compute initial zoom so the entire brain + input layer fits in view,
// scaled proportionally to screen pixel count.
// Scene bounding radius: brain lobes reach ~3.2 units from origin,
// input layer sits at x≈4.8 with half-extent ≈ camRes/2 * 0.22.
// We use the camera's vertical FOV and the aspect ratio to fit both axes.
function computeInitialZoom() {
  const sceneHalfW = 4.8 + (camRes / 2) * 0.22 + 0.5; // rightmost extent
  const sceneHalfH = 3.2;                               // vertical extent
  const fovRad = camera.fov * Math.PI / 180;
  const aspect  = window.innerWidth / window.innerHeight;
  // Distance needed to fit height
  const distForH = sceneHalfH / Math.tan(fovRad / 2);
  // Distance needed to fit width (accounting for aspect)
  const distForW = sceneHalfW / (Math.tan(fovRad / 2) * aspect);
  // Use whichever is larger (more zoomed out), then add a small padding factor
  const baseDist = Math.max(distForH, distForW) * 1.15;
  // Scale by pixel density: larger screens get proportionally more zoom-out
  // so relative scene size stays consistent. Reference is 1920x1080.
  const refPixels = 1920 * 1080;
  const curPixels = window.innerWidth * window.innerHeight;
  const densityScale = Math.sqrt(curPixels / refPixels);
  return Math.max(8, Math.min(110, baseDist * densityScale * 2));
}

let zoomDist  = computeInitialZoom();
let targetZoom = zoomDist;

const cv = renderer.domElement;

cv.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = { x: e.clientX, y: e.clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
});
cv.addEventListener('wheel', e => {
  targetZoom = Math.max(5, Math.min(110, targetZoom + e.deltaY * 0.04));
}, { passive: true });

// Touch orbit
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
window.addEventListener('touchend', () => { isDragging = false; });
window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
}, { passive: true });

// Pinch zoom
let pinchStart = null, pinchZoomStart = null;
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStart = Math.hypot(dx, dy);
    pinchZoomStart = targetZoom;
  }
}, { passive: true });
cv.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStart) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    targetZoom = Math.max(5, Math.min(110, pinchZoomStart * (pinchStart / dist)));
  }
}, { passive: true });
cv.addEventListener('touchend', e => { if (e.touches.length < 2) pinchStart = null; }, { passive: true });

function updateCamera() {
  spherical.theta += (targetSph.theta - spherical.theta) * 0.1;
  spherical.phi   += (targetSph.phi   - spherical.phi  ) * 0.1;
  zoomDist        += (targetZoom      - zoomDist        ) * 0.1;
  camera.position.set(
    zoomDist * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    zoomDist * Math.cos(spherical.phi),
    zoomDist * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  CLICK -> TOOLTIP
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
cv.addEventListener('click', e => {
  mouse2d.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse2d.y = (e.clientY / window.innerHeight) * -2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(networkGroup.children);
  let found = null;
  for (const h of hits) {
    const idx = h.object.userData.neuronIdx;
    if (idx !== undefined) { found = idx; break; }
  }
  if (found !== null) {
    const n = neurons[found];
    const lobeDef = LOBE_DEFS.find(l => l.name === n.lobe);
    document.getElementById('tt-title').textContent = n.id;
    document.getElementById('tt-body').innerHTML =
      `Lobe: <span style="color:${n.lobeColor}">${lobeDef.label}</span><br>` +
      `Task: ${n.task}<br>` +
      `NT: ${n.neurotransmitter}<br>` +
      `Input sum: ${n.inputSum.toFixed(3)}<br>` +
      `Threshold: ${n.threshold.toFixed(3)}<br>` +
      `Synapses: ${n.connections.length}` +
      (n.camWeight > 0 ? `<br>Cam weight: ${n.camWeight.toFixed(3)}` : '');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.style.display = 'block';
  } else {
    tooltip.style.display = 'none';
  }
});

// ═══════════════════════════════════════════════════════════════
//  CAMERA B&W FEED -> OCCIPITAL INPUT
// ═══════════════════════════════════════════════════════════════
const camPromptEl  = document.getElementById('cam-prompt');
const camContainer = document.getElementById('cam-container');
const camCanvas    = document.getElementById('cam-canvas');
const camVideo     = document.getElementById('cam-video');
const camCtx       = camCanvas.getContext('2d');

camCanvas.width  = camRes;
camCanvas.height = camRes;

camPromptEl.addEventListener('click', async () => {
  const txt = document.getElementById('cam-prompt-text');

  // If camera is active, toggle it off
  if (camActive) {
    camActive = false;
    // Stop all tracks to release the hardware camera
    if (camVideo.srcObject) {
      camVideo.srcObject.getTracks().forEach(t => t.stop());
      camVideo.srcObject = null;
    }
    pixelValues.fill(0);
    camContainer.style.display = 'none';
    txt.textContent = 'Enable Vision';
    camPromptEl.style.borderColor   = 'rgba(86,180,233,0.3)';
    camPromptEl.style.background    = 'rgba(86,180,233,0.06)';
    return;
  }

  // Otherwise, request camera and turn on
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    camVideo.srcObject = stream;
    await camVideo.play();
    camActive = true;
    camContainer.style.display = 'block';
    txt.textContent = 'Disable Vision';
    camPromptEl.style.borderColor = 'rgba(86,180,233,0.7)';
    camPromptEl.style.background  = 'rgba(86,180,233,0.15)';
    drawBW();
  } catch (err) {
    txt.textContent = err.name === 'NotAllowedError' ? 'Denied' : 'N/A';
  }
});

function drawBW() {
  if (!camActive) return;
  if (camVideo.readyState >= 2) {
    camCtx.drawImage(camVideo, 0, 0, camRes, camRes);
    const img = camCtx.getImageData(0, 0, camRes, camRes);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = grey;
      pixelValues[i >> 2] = grey / 255;
    }
    camCtx.putImageData(img, 0, 0);
  }
  requestAnimationFrame(drawBW);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════
let lastTime = 0;
let simTickMs = 0;
const SIM_INTERVAL_MS = 60; // base tick interval

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (!isDragging && autoRotate) targetSph.theta += dt * 0.06;
  updateCamera();

  // Sim ticks gated by speed
  if (simRunning) {
    simTickMs += dt * 1000 * simSpeed;
    while (simTickMs >= SIM_INTERVAL_MS) {
      simTick();
      simTickMs -= SIM_INTERVAL_MS;
    }
  }

  updateVisuals(dt);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
//  UI BINDINGS
// ═══════════════════════════════════════════════════════════════
document.getElementById('sl-speed').addEventListener('input', function() {
  simSpeed = parseInt(this.value);
  document.getElementById('vb-speed').textContent = simSpeed;
});
document.getElementById('sl-thresh').addEventListener('input', function() {
  fireThresh = parseInt(this.value) / 100;
  document.getElementById('vb-thresh').textContent = fireThresh.toFixed(2);
  neurons.forEach(n => { n.threshold = fireThresh + (Math.random() - 0.5) * 0.1; });
});
document.getElementById('sl-noise').addEventListener('input', function() {
  applyNoiseLevel(parseInt(this.value) / 100);
  document.getElementById('vb-noise').textContent = parseInt(this.value);
});

document.getElementById('btn-pause').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.textContent = autoRotate ? 'Pause Rotation' : 'Resume Rotation';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  tickCount = 0;
  pixelValues = new Float32Array(camRes * camRes);
  buildBrain();
  const newZoom = computeInitialZoom();
  zoomDist = newZoom;
  targetZoom = newZoom;
  animate(0);
});
// Input resolution buttons
function applyResolution() {
  pixelValues = new Float32Array(camRes * camRes);
  camCanvas.width  = camRes;
  camCanvas.height = camRes;
  document.getElementById('res-badge').textContent = `${camRes} by ${camRes}`;
  document.getElementById('btn-res-dec').disabled = camRes <= CAM_RES_MIN;
  document.getElementById('btn-res-inc').disabled = camRes >= CAM_RES_MAX;

  // Remove old cam nodes and edges by tag, then rebuild
  const toRemove = networkGroup.children.filter(
    o => o.userData && (o.userData.isCamNode || o.userData.isCamEdge)
  );
  toRemove.forEach(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) o.material.dispose();
    networkGroup.remove(o);
  });

  buildCamInputLayer(occipitalIdxs);
}

document.getElementById('btn-res-dec').addEventListener('click', () => {
  if (camRes > CAM_RES_MIN) { camRes -= CAM_RES_STEP; applyResolution(); }
});
document.getElementById('btn-res-inc').addEventListener('click', () => {
  if (camRes < CAM_RES_MAX) { camRes += CAM_RES_STEP; applyResolution(); }
});

// Set initial button states
document.getElementById('res-badge').textContent = `${camRes} by ${camRes}`;
document.getElementById('btn-res-dec').disabled = camRes <= CAM_RES_MIN;
document.getElementById('btn-res-inc').disabled = camRes >= CAM_RES_MAX;

document.getElementById('panel-toggle').addEventListener('click', () => {
  document.getElementById('panel').classList.toggle('open');
});
cv.addEventListener('touchstart', () => {
  if (window.innerWidth < 640) document.getElementById('panel').classList.remove('open');
}, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // Refit zoom to new screen size
  const newZoom = computeInitialZoom();
  zoomDist  = newZoom;
  targetZoom = newZoom;
});

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildBrain();
animate(0);
</script>
