<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT - Brain Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #04060f;
    --panel:   rgba(6, 10, 22, 0.93);
    --border:  rgba(80, 200, 160, 0.15);
    --accent:  #2fffa0;
    --accent2: #a06fff;
    --accent3: #ff6fa0;
    --warn:    #ffaa33;
    --text:    #b8d8c8;
    --dim:     #406050;
    --tap:     44px;
    --col-prefrontal:  #2fffa0;
    --col-motor:       #ff6fa0;
    --col-occipital:   #56b4e9;
    --col-temporal:    #e6a020;
    --col-parietal:    #a06fff;
    --col-thalamus:    #ffffff;
    --col-brainstem:   #ff4444;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body.dragging { cursor: grabbing; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }
  #title {
    position: fixed;
    top: 20px; left: 20px;
    pointer-events: none;
    z-index: 10;
  }
  #title h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }
  #title h1 span { color: var(--accent); }
  #title p {
    font-size: 0.48rem;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-top: 5px;
    text-transform: uppercase;
  }
  #gen-label {
    position: fixed;
    top: 20px; right: 20px;
    font-size: 0.44rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
  }
  #cam-container {
    position: fixed;
    bottom: 86px; right: 20px;
    width: 68px; height: 68px;
    border: 1px solid rgba(86,180,233,0.4);
    border-radius: 10px; overflow: hidden;
    background: #000; z-index: 20; display: none;
  }
  #cam-canvas {
    display: none; width: 68px; height: 68px;
    image-rendering: pixelated;
  }
  #cam-label {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center; font-size: 0.36rem;
    letter-spacing: 0.1em; color: #56b4e9;
    text-transform: uppercase; pointer-events: none; opacity: 0.7;
  }
  #cam-active-dot {
    position: absolute; top: 5px; right: 5px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #56b4e9;
    box-shadow: 0 0 6px #56b4e9;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @media (min-width: 640px) {
    #cam-container {
      bottom: auto; top: 80px; right: 32px;
      width: 80px; height: 80px;
    }
    #cam-canvas { width: 80px; height: 80px; }
  }
  @media (min-width: 640px) {
    #title { top: 28px; left: 32px; }
    #title h1 { font-size: 1.8rem; }
    #gen-label { top: 28px; right: 32px; }
  }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.5rem;
    line-height: 1.9;
    color: var(--text);
    backdrop-filter: blur(12px);
    z-index: 50;
    display: none;
    white-space: nowrap;
  }
  #tooltip .tt-title { color: #fff; font-size: 0.55rem; margin-bottom: 3px; }
  #panel-toggle {
    position: fixed;
    top: 14px; right: 14px;
    z-index: 100;
    width: 36px; height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }
  #panel-toggle:hover { border-color: var(--accent); }
  #panel-toggle.panel-open { color: var(--accent3); border-color: var(--accent3); }
  #panel {
    position: fixed;
    top: 58px; right: 14px;
    z-index: 99;
    width: 200px;
    max-height: calc(100dvh - 72px);
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    backdrop-filter: blur(16px);
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }
  #panel::-webkit-scrollbar { width: 3px; }
  #panel::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
  #lobe-legend strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 0.48rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 7px;
  }
  #lobe-legend div {
    font-size: 0.47rem;
    letter-spacing: 0.05em;
    line-height: 1.9;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-divider {
    height: 1px;
    background: var(--border);
    margin: 10px -12px;
  }
  #panel button,
  #cam-prompt {
    width: 100%;
    padding: 7px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.44rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    margin-bottom: 6px;
  }
  #panel button:hover,
  #cam-prompt:hover {
    border-color: var(--accent);
    background: rgba(47, 255, 160, 0.07);
  }
  #panel button:last-child { margin-bottom: 0; }
  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 0;
  }
  .btn-row button {
    flex: 1;
    margin-bottom: 0;
  }
  .btn-row button:hover {
    border-color: var(--accent2);
    background: rgba(160, 111, 255, 0.07);
    color: var(--accent2);
  }
  .slider-group { display: flex; flex-direction: column; gap: 8px; }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }
  .slider-name {
    font-size: 0.42rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .slider-val {
    font-size: 0.46rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    min-width: 28px;
    text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(80, 200, 160, 0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 6px var(--accent);
    transition: box-shadow 0.15s;
  }
  input[type=range]::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 6px var(--accent);
  }
  input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 10px var(--accent); }
  #stats { display: flex; flex-direction: column; gap: 3px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .stat-key {
    font-size: 0.41rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .stat-val {
    font-size: 0.46rem;
    color: var(--text);
    letter-spacing: 0.06em;
  }
  #gen-label { font-size: 0.48rem; }
  @media (max-width: 639px) {
    #panel { width: 180px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>MAT</h1>
  <p>Modular-Network of Adaptive Topologies</p>
  <p>Proto-Brain - v0-opt</p>
</div>

<div id="gen-label">Tick <span id="tick-num">0</span></div>

<div id="cam-container">
  <canvas id="cam-canvas" width="10" height="10"></canvas>
  <div id="cam-label">eye</div>
  <div id="cam-active-dot"></div>
</div>
<video id="cam-video" playsinline autoplay muted></video>

<button id="panel-toggle" aria-label="Toggle controls" onclick="var p=document.getElementById('panel');p.hidden=!p.hidden;this.classList.toggle('panel-open',!p.hidden)">&#9776;</button>

<div id="panel">
  <div id="lobe-legend"></div>

  <div class="panel-divider"></div>

  <button id="cam-prompt" title="Toggle camera vision -> feeds Occipital lobe">
    <span id="cam-prompt-text">Enable Vision</span>
  </button>

  <div class="btn-row">
    <button id="btn-pause">Pause</button>
    <button id="btn-reset">Reset</button>
  </div>

  <div class="panel-divider"></div>

  <div class="slider-group">
    <label class="slider-label">
      <span class="slider-name">Speed</span>
      <span class="slider-val" id="vb-speed">5</span>
    </label>
    <input type="range" id="sl-speed" min="1" max="20" value="5">

    <label class="slider-label">
      <span class="slider-name">Fire Thresh</span>
      <span class="slider-val" id="vb-thresh">0.20</span>
    </label>
    <input type="range" id="sl-thresh" min="10" max="90" value="20">

    <label class="slider-label">
      <span class="slider-name">Bio Noise</span>
      <span class="slider-val" id="vb-noise">20</span>
    </label>
    <input type="range" id="sl-noise" min="0" max="100" value="20">

    <label class="slider-label">
      <span class="slider-name">Scale</span>
      <span class="slider-val" id="vb-scale">1</span>
    </label>
    <input type="range" id="sl-scale" min="1" max="5" step="1" value="1">

    <label class="slider-label">
      <span class="slider-name">Resolution</span>
      <span class="slider-val" id="vb-res">20</span>
    </label>
    <input type="range" id="sl-res" min="10" max="50" step="5" value="20">
  </div>

  <div class="panel-divider"></div>

  <div id="stats">
    <div class="stat-row"><span class="stat-key">Lobes</span><span class="stat-val" id="st-lobes">-</span></div>
    <div class="stat-row"><span class="stat-key">Neurons</span><span class="stat-val" id="st-neurons">-</span></div>
    <div class="stat-row"><span class="stat-key">Synapses</span><span class="stat-val" id="st-conns">-</span></div>
    <div class="stat-row"><span class="stat-key">Active</span><span class="stat-val" id="st-active">-</span></div>
    <div class="stat-row"><span class="stat-key">Firings/tick</span><span class="stat-val" id="st-fires">-</span></div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title">-</div>
  <div id="tt-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  MAT BRAIN CONFIG mirrors yaml structure
// ═══════════════════════════════════════════════════════════════
const LOBE_DEFS = [
  { name: 'prefrontal',  label: 'Prefrontal Cortex',   task: 'planning / decision',      neurons: 18, connP: 0.25, crossP: 0.12, color: '#2fffa0', pos: [ 0,    1.8,  0   ] },
  { name: 'motor',       label: 'Motor Cortex',         task: 'action control',           neurons: 14, connP: 0.20, crossP: 0.10, color: '#ff6fa0', pos: [-2.0,  0.8, -0.5 ] },
  { name: 'occipital',   label: 'Occipital',            task: 'visual processing',        neurons: 16, connP: 0.22, crossP: 0.08, color: '#56b4e9', pos: [ 0.0,  0.5,  1.8 ] },
  { name: 'temporal',    label: 'Temporal/Parietal',    task: 'sensory integration',      neurons: 14, connP: 0.20, crossP: 0.10, color: '#e6a020', pos: [ 2.0, -0.5, -0.5 ] },
  { name: 'parietal',    label: 'Parietal',             task: 'memory routing',           neurons: 12, connP: 0.18, crossP: 0.09, color: '#a06fff', pos: [-2.0, -0.5, -0.5 ] },
  { name: 'thalamus',    label: 'Thalamus',             task: 'inter-lobe routing',       neurons:  8, connP: 0.30, crossP: 0.25, color: '#e8e8e8', pos: [ 0,    0,    0   ] },
  { name: 'brainstem',   label: 'Brainstem',            task: 'reflex / survival drives', neurons:  6, connP: 0.35, crossP: 0.18, color: '#ff4444', pos: [ 0,   -2.0,  0   ] },
];

const LOBE_BASE_NEURONS = Object.fromEntries(LOBE_DEFS.map(l => [l.name, l.neurons]));
let neuronScale = 1.0;

const LOBE_SPREAD_BASE = 0.75;
let LOBE_SPREAD = LOBE_SPREAD_BASE;

function applyNeuronScale(scale) {
  neuronScale = scale;
  LOBE_SPREAD = LOBE_SPREAD_BASE * Math.cbrt(scale);
  for (const lobe of LOBE_DEFS) {
    lobe.neurons = Math.max(1, Math.round(LOBE_BASE_NEURONS[lobe.name] * scale));
  }
}
const ORBIT_RADIUS = 10;
const NODE_R = 0.09;
const MAX_CROSS_EDGES_DRAWN = 50;
const MAX_INTRA_EDGES_DRAWN = 50;

const INHIB_FRACTION = 0.20;

const NT_PROFILES = {
  glutamate: {
    gain: 1.00,
    refractoryMod: 0,
    spontBoost: 0.000,
    color: '#2fffa0',
    inhibitory: false,
  },
  GABA: {
    gain: 1.10,
    refractoryMod: 1,
    spontBoost: 0.000,
    color: '#ff6fa0',
    inhibitory: true,
  },
  acetylcholine: {
    gain: 0.75,
    refractoryMod: 1,
    spontBoost: 0.002,
    color: '#e6a020',
    inhibitory: false,
  },
  dopamine: {
    gain: 0.55,
    refractoryMod: 2,
    spontBoost: 0.004,
    color: '#c084fc',
    inhibitory: false,
  },
  serotonin: {
    gain: 0.45,
    refractoryMod: 3,
    spontBoost: 0.003,
    color: '#f97316',
    inhibitory: false,
  },
  norepinephrine: {
    gain: 0.65,
    refractoryMod: 2,
    spontBoost: 0.005,
    color: '#ff4444',
    inhibitory: false,
  },
};

const LOBE_NT_DIST = {
  prefrontal: [
    { nt: 'glutamate',      frac: 0.82 },
    { nt: 'dopamine',       frac: 0.10 },
    { nt: 'serotonin',      frac: 0.08 },
  ],
  motor: [
    { nt: 'glutamate',      frac: 0.88 },
    { nt: 'dopamine',       frac: 0.08 },
    { nt: 'norepinephrine', frac: 0.04 },
  ],
  occipital: [
    { nt: 'glutamate',      frac: 0.92 },
    { nt: 'serotonin',      frac: 0.05 },
    { nt: 'norepinephrine', frac: 0.03 },
  ],
  temporal: [
    { nt: 'glutamate',      frac: 0.84 },
    { nt: 'serotonin',      frac: 0.10 },
    { nt: 'dopamine',       frac: 0.06 },
  ],
  parietal: [
    { nt: 'glutamate',      frac: 0.86 },
    { nt: 'serotonin',      frac: 0.08 },
    { nt: 'acetylcholine',  frac: 0.06 },
  ],
  thalamus: [
    { nt: 'acetylcholine',  frac: 0.60 },
    { nt: 'glutamate',      frac: 0.30 },
    { nt: 'norepinephrine', frac: 0.10 },
  ],
  brainstem: [
    { nt: 'norepinephrine', frac: 0.50 },
    { nt: 'serotonin',      frac: 0.30 },
    { nt: 'dopamine',       frac: 0.10 },
    { nt: 'acetylcholine',  frac: 0.10 },
  ],
};

function pickNT(lobeName) {
  const dist = LOBE_NT_DIST[lobeName] || [{ nt: 'glutamate', frac: 1.0 }];
  const r = Math.random();
  let cum = 0;
  for (const { nt, frac } of dist) {
    cum += frac;
    if (r < cum) return nt;
  }
  return dist[dist.length - 1].nt;
}

// ═══════════════════════════════════════════════════════════════
//  SCENE
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x04060f);
scene.fog = new THREE.FogExp2(0x04060f, 0.009);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 0, ORBIT_RADIUS);

scene.add(new THREE.AmbientLight(0x0a2020, 2.5));
const dirL = new THREE.DirectionalLight(0x20ffaa, 2.0);
dirL.position.set(4, 8, 6);
scene.add(dirL);
const ptA = new THREE.PointLight(0x6040ff, 5, 55);
ptA.position.set(-8, 5, 0);
scene.add(ptA);
const ptB = new THREE.PointLight(0xff3060, 3, 45);
ptB.position.set(8, -4, 0);
scene.add(ptB);

// ═══════════════════════════════════════════════════════════════
//  CAT SILHOUETTE  (semi-transparent, behind the neural network)
// ═══════════════════════════════════════════════════════════════
(function buildCatSilhouette() {
  const catGroup = new THREE.Group();

  function catMat(col, opacity) {
    return new THREE.MeshPhongMaterial({
      color: col, emissive: col, emissiveIntensity: 0.15,
      shininess: 25, transparent: true, opacity: opacity,
      side: THREE.DoubleSide, depthWrite: false,
    });
  }

  const bodyCol = 0x7adcb8;
  const earCol  = 0xa06fff;


  const HEAD_R = 3.2;
  const HEAD_CX = 0,  HEAD_CY = -0.1, HEAD_CZ = 0;

  const headMesh = new THREE.Mesh(
    new THREE.SphereGeometry(HEAD_R, 40, 40),
    catMat(bodyCol, 0.11)
  );
  headMesh.scale.set(1.0, 0.95, 0.88);
  headMesh.position.set(HEAD_CX, HEAD_CY, HEAD_CZ);
  catGroup.add(headMesh);

  function makeEar(side) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.ConeGeometry(0.72, 1.8, 4), catMat(bodyCol, 0.14)));
    const inner = new THREE.Mesh(new THREE.ConeGeometry(0.36, 1.2, 4), catMat(earCol, 0.22));
    inner.position.y = 0.05;
    g.add(inner);
    g.position.set(side * 1.85, HEAD_CY + 2.8, HEAD_CZ + 0.4);
    g.rotation.z = side * -0.20;
    return g;
  }
  catGroup.add(makeEar(-1));
  catGroup.add(makeEar( 1));

  const neckMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.42, 0.58, 1.8, 14),
    catMat(bodyCol, 0.10)
  );
  neckMesh.rotation.x = 0.5;
  neckMesh.position.set(0, HEAD_CY - HEAD_R * 0.75, -2.0);
  catGroup.add(neckMesh);

  const BODY_CX = 0, BODY_CY = -3.5, BODY_CZ = -6.0;

  const bodyMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 36, 28),
    catMat(bodyCol, 0.12)
  );
  bodyMesh.scale.set(1.9, 1.4, 3.5);
  bodyMesh.position.set(BODY_CX, BODY_CY, BODY_CZ);
  catGroup.add(bodyMesh);

  const LEG_H   = 2.4;
  const LEG_TOP = BODY_CY - 1.3;
  const LEG_MID = LEG_TOP - LEG_H / 2;
  const PAW_Y   = LEG_TOP - LEG_H - 0.1;

  [
    { x: -1.1, z: BODY_CZ + 2.0 },
    { x:  1.1, z: BODY_CZ + 2.0 },
    { x: -1.1, z: BODY_CZ - 2.0 },
    { x:  1.1, z: BODY_CZ - 2.0 },
  ].forEach(({ x, z }) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.24, LEG_H, 10), catMat(bodyCol, 0.13));
    leg.position.set(x, LEG_MID, z);
    catGroup.add(leg);
    const paw = new THREE.Mesh(new THREE.SphereGeometry(0.38, 10, 10), catMat(bodyCol, 0.16));
    paw.scale.set(1.3, 0.46, 1.1);
    paw.position.set(x, PAW_Y, z);
    catGroup.add(paw);
  });

  const RUMP_Y = BODY_CY + 0.5, RUMP_Z = BODY_CZ - 3.3;
  for (let i = 0; i < 18; i++) {
    const t = i / 17;
    const a = t * Math.PI * 1.1;
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(Math.max(0.30 - t * 0.20, 0.07), 8, 8),
      catMat(bodyCol, Math.max(0.13 - t * 0.05, 0.03))
    );
    seg.position.set(-1.3, RUMP_Y + 2.8 * Math.sin(a), RUMP_Z - 1.8 * Math.cos(a));
    catGroup.add(seg);
  }

  scene.add(catGroup);
})();

const nodeGeo  = new THREE.SphereGeometry(NODE_R, 16, 16);

// ═══════════════════════════════════════════════════════════════
//  SIMULATION STATE
// ═══════════════════════════════════════════════════════════════
let simRunning = true;
let simSpeed   = 5;
let fireThresh = 0.50;
let tickCount  = 0;
let firesThisTick = 0;

let noiseLevel = 0.20;
let NOISE_MEMBRANE   = 0;
let NOISE_SPONT_P    = 0;
let NOISE_SYN_FAIL_P = 0;
const REFRACTORY_TICKS = 2;

function applyNoiseLevel(v) {
  noiseLevel       = v;
  NOISE_MEMBRANE   = v * 0.12;
  NOISE_SPONT_P    = v * v * 0.018;
  NOISE_SYN_FAIL_P = v * 0.35;
}
applyNoiseLevel(noiseLevel);

function randGauss() {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

const CAM_RES_MIN  = 10;
const CAM_RES_MAX  = 50;
const CAM_RES_STEP = 5;
let camRes         = 20;
let pixelValues    = new Float32Array(camRes * camRes);
let camActive      = false;
let occipitalIdxs  = [];

let neurons = [];
let networkGroup = null;
const raycaster  = new THREE.Raycaster();
const mouse2d    = new THREE.Vector2();

// ═══════════════════════════════════════════════════════════════
//  BUILD BRAIN
// ═══════════════════════════════════════════════════════════════
function buildBrain() {
  if (networkGroup) {
    scene.remove(networkGroup);
    networkGroup.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
      }
    });
  }
  networkGroup = new THREE.Group();
  scene.add(networkGroup);
  neurons = [];
  edgeLines = [];

  const lobeNeuronMap = {};

  for (const lobe of LOBE_DEFS) {
    const lobeCenter = new THREE.Vector3(...lobe.pos);
    const idxs = [];
    for (let i = 0; i < lobe.neurons; i++) {
      const r = LOBE_SPREAD * Math.cbrt(Math.random());
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const offset = new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
      const pos = lobeCenter.clone().add(offset);

      const HEAD_CLAMP = 2.85;
      if (pos.length() > HEAD_CLAMP) pos.setLength(HEAD_CLAMP);
      const nid = neurons.length;

      const inhibFrac = (lobe.name === 'brainstem' || lobe.name === 'thalamus') ? 0.10 : INHIB_FRACTION;
      const isInhibitory = Math.random() < inhibFrac;

      const nt = isInhibitory ? 'GABA' : pickNT(lobe.name);
      const ntProfile = NT_PROFILES[nt];

      const baseCol = new THREE.Color(lobe.color);
      let col;
      if (isInhibitory) {
        col = new THREE.Color().setHSL(0.02, 0.55, 0.38);
      } else if (nt === 'glutamate') {
        col = baseCol.clone();
      } else {
        col = new THREE.Color(ntProfile.color).lerp(baseCol, 0.25);
      }

      const mat = new THREE.MeshPhongMaterial({
        color: col, emissive: col,
        emissiveIntensity: isInhibitory ? 0.35 : 0.2,
        shininess: isInhibitory ? 60 : 100,
        transparent: true, opacity: isInhibitory ? 0.65 : 0.5
      });
      const mesh = new THREE.Mesh(nodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { neuronIdx: nid };
      networkGroup.add(mesh);

      const ntRefractory = REFRACTORY_TICKS + ntProfile.refractoryMod;

      neurons.push({
        id: `${lobe.name}_${i}`,
        lobe: lobe.name,
        lobeColor: lobe.color,
        inhibColor: '#ff4422',
        task: lobe.task,
        inputSum: 0,
        smoothInput: 0,
        threshold: fireThresh + (Math.random() - 0.5) * 0.1,
        neurotransmitter: nt,
        ntGain: ntProfile.gain,
        ntRefractory,
        ntSpontBoost: ntProfile.spontBoost,
        inhibitory: isInhibitory,
        connections: [],
        weights: [],
        camWeight: lobe.name === 'occipital' ? (Math.random() * 0.6 + 0.2) : 0,
        refractoryLeft: 0,
        mesh,
        mat,
        pos,
        fired: false,
      });
      idxs.push(nid);
    }
    lobeNeuronMap[lobe.name] = idxs;
  }

  let totalConns = 0;
  for (const lobe of LOBE_DEFS) {
    const idxs = lobeNeuronMap[lobe.name];
    for (const src of idxs) {
      for (const tgt of idxs) {
        if (src !== tgt && Math.random() < lobe.connP) {
          const sign = neurons[src].inhibitory ? -1 : 1;
          const w = sign * (Math.random() * 0.5 + 0.05);
          neurons[src].connections.push(tgt);
          neurons[src].weights.push(w);
          totalConns++;
        }
      }
    }
  }

  const MIN_CROSS_PER_PAIR = 20;
  for (const lobe of LOBE_DEFS) {
    const srcIdxs = lobeNeuronMap[lobe.name];
    const otherLobes = LOBE_DEFS.filter(l => l.name !== lobe.name);
    for (const targetLobe of otherLobes) {
      const targetIdxs = lobeNeuronMap[targetLobe.name];
      let pairConns = 0;
      for (const src of srcIdxs) {
        if (Math.random() < lobe.crossP) {
          const tgt = targetIdxs[Math.floor(Math.random() * targetIdxs.length)];
          const sign = neurons[src].inhibitory ? -1 : 1;
          const w = sign * (Math.random() * 0.5 + 0.05);
          neurons[src].connections.push(tgt);
          neurons[src].weights.push(w);
          totalConns++;
          pairConns++;
        }
      }
      while (pairConns < MIN_CROSS_PER_PAIR) {
        const src = srcIdxs[Math.floor(Math.random() * srcIdxs.length)];
        const tgt = targetIdxs[Math.floor(Math.random() * targetIdxs.length)];
        const sign = neurons[src].inhibitory ? -1 : 1;
        const w = sign * (Math.random() * 0.5 + 0.05);
        neurons[src].connections.push(tgt);
        neurons[src].weights.push(w);
        totalConns++;
        pairConns++;
      }
    }
  }

  for (const lobe of LOBE_DEFS) {
    const col = new THREE.Color(lobe.color);
    const inhibCol = new THREE.Color('#ff3311');
    const idxs = lobeNeuronMap[lobe.name];
    let drawn = 0;
    for (const src of idxs) {
      for (let ci = 0; ci < neurons[src].connections.length; ci++) {
        const tgt = neurons[src].connections[ci];
        if (!lobeNeuronMap[lobe.name].includes(tgt)) continue;
        if (drawn >= MAX_INTRA_EDGES_DRAWN) break;
        const srcCol = neurons[src].inhibitory ? inhibCol : col;
        addEdgeLine(neurons[src].pos, neurons[tgt].pos, srcCol, col, neurons[src].inhibitory ? 0.09 : 0.06, src, tgt);
        drawn++;
      }
    }
  }

  const inhibCrossCol = new THREE.Color('#ff3311');
  const MAX_CROSS_PER_LOBE = Math.ceil(MAX_CROSS_EDGES_DRAWN / LOBE_DEFS.length);
  for (const lobe of LOBE_DEFS) {
    const lobeCrossEdges = [];
    for (const ni of lobeNeuronMap[lobe.name]) {
      const n = neurons[ni];
      for (let ci = 0; ci < n.connections.length; ci++) {
        const tgt = n.connections[ci];
        if (neurons[tgt].lobe !== n.lobe) {
          lobeCrossEdges.push({ src: ni, tgt, w: n.weights[ci], inhib: n.inhibitory });
        }
      }
    }
    shuffle(lobeCrossEdges);
    for (let i = 0; i < Math.min(lobeCrossEdges.length, MAX_CROSS_PER_LOBE); i++) {
      const e = lobeCrossEdges[i];
      const cA = e.inhib ? inhibCrossCol.clone() : new THREE.Color(neurons[e.src].lobeColor);
      const cB = new THREE.Color(neurons[e.tgt].lobeColor);
      addEdgeLine(neurons[e.src].pos, neurons[e.tgt].pos, cA, cB, e.inhib ? 0.07 : 0.04, e.src, e.tgt);
    }
  }

  document.getElementById('st-lobes').textContent   = LOBE_DEFS.length;
  document.getElementById('st-neurons').textContent = neurons.length;
  document.getElementById('st-conns').textContent   = totalConns;

  buildLobeLegend(lobeNeuronMap);

  occipitalIdxs = lobeNeuronMap['occipital'] || [];

  buildCamInputLayer(lobeNeuronMap['occipital']);
}

let edgeLines = [];

function addEdgeLine(pA, pB, colA, colB, baseOpacity, srcIdx, tgtIdx) {
  const geo = new THREE.BufferGeometry().setFromPoints([pA, pB]);
  const colors = new Float32Array([colA.r, colA.g, colA.b, colB.r, colB.g, colB.b]);
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: baseOpacity });
  const line = new THREE.Line(geo, mat);
  line.userData.isEdge = true;
  networkGroup.add(line);
  edgeLines.push({ mat, srcIdx, tgtIdx, baseOpacity, colA: colA.clone(), colB: colB.clone(), geo });
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA INPUT LAYER  (camRes by camRes pixel nodes feed to occipital lobe)
// ═══════════════════════════════════════════════════════════════
const CAM_NODE_R   = 0.09;
const camNodeGeo   = new THREE.SphereGeometry(CAM_NODE_R, 8, 8);
let   camNodeMeshes = [];
let   camEdgeLines  = [];

function buildCamInputLayer(occIdxs) {
  camNodeMeshes = [];
  camEdgeLines  = [];

  const GRID_ORIGIN = new THREE.Vector3(0, 0.5, 5.5);
  const SPACING = 0.22;
  const half = (camRes - 1) / 2;
  const camColor = new THREE.Color('#56b4e9');

  const gridPositions = [];

  for (let row = 0; row < camRes; row++) {
    for (let col = 0; col < camRes; col++) {
      const idx = row * camRes + col;
      const pos = new THREE.Vector3(
        GRID_ORIGIN.x + (col - half) * SPACING,
        GRID_ORIGIN.y + (half - row) * SPACING,
        GRID_ORIGIN.z
      );
      gridPositions.push(pos);

      const mat = new THREE.MeshBasicMaterial({
        color: camColor, transparent: true, opacity: 0.25
      });
      const mesh = new THREE.Mesh(camNodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { isCamNode: true, pixelIdx: idx };
      networkGroup.add(mesh);
      camNodeMeshes.push({ mesh, mat });
    }
  }

  const occCount = occIdxs.length;
  for (let pi = 0; pi < camRes * camRes; pi++) {
    const targA = occIdxs[pi % occCount];
    const targB = occIdxs[(pi + Math.floor(occCount / 2)) % occCount];
    const targets = [targA];
    if (targA !== targB) targets.push(targB);

    for (const tgt of targets) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        gridPositions[pi], neurons[tgt].pos
      ]);
      const colors = new Float32Array([
        camColor.r, camColor.g, camColor.b,
        camColor.r * 0.5, camColor.g * 0.5, camColor.b * 0.5
      ]);
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.LineBasicMaterial({
        vertexColors: true, transparent: true, opacity: 0.04
      });
      const line = new THREE.Line(geo, mat);
      line.userData.isCamEdge = true;
      networkGroup.add(line);
      camEdgeLines.push({ mat, pixelIdx: pi, tgtNeuronIdx: tgt });
    }
  }
}

function updateCamInputVisuals() {
  for (let pi = 0; pi < camNodeMeshes.length; pi++) {
    const v = camActive ? pixelValues[pi] : 0;
    const { mat } = camNodeMeshes[pi];
    mat.color.setRGB(
      0.34 * (0.2 + v * 0.8),
      0.71 * (0.2 + v * 0.8),
      0.91 * (0.2 + v * 0.8)
    );
    mat.opacity = camActive ? 0.15 + v * 0.85 : 0.15;
  }
  for (const e of camEdgeLines) {
    const v = camActive ? pixelValues[e.pixelIdx] : 0;
    e.mat.opacity = 0.02 + v * 0.25;
  }
}
// ═══════════════════════════════════════════════════════════════
function buildLobeLegend(lobeNeuronMap) {
  const el = document.getElementById('lobe-legend');
  el.innerHTML = '<strong>Lobes</strong><br>';
  for (const lobe of LOBE_DEFS) {
    const idxs = lobeNeuronMap[lobe.name] || [];
    const inhibCount = idxs.filter(i => neurons[i].inhibitory).length;
    const row = document.createElement('div');
    row.title = lobe.task;
    row.innerHTML = `&#9679; <span style="color:${lobe.color}">${lobe.label}</span> ${lobe.neurons}n, ${inhibCount}i`;
    el.appendChild(row);
  }

  const NT_DISPLAY_ORDER = ['glutamate','GABA','acetylcholine','dopamine','serotonin','norepinephrine'];

  const ntTotals = {};
  for (const n of neurons) {
    ntTotals[n.neurotransmitter] = (ntTotals[n.neurotransmitter] || 0) + 1;
  }
  const total = neurons.length;

  const divider = document.createElement('div');
  divider.style.cssText = 'height:1px;background:rgba(80,200,160,0.15);margin:8px -12px 8px';
  el.appendChild(divider);

  const header = document.createElement('strong');
  header.style.cssText = 'display:block;font-family:Syne,sans-serif;font-size:0.48rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);margin-bottom:7px';
  header.textContent = 'Neurotransmitters';
  el.appendChild(header);

  for (const nt of NT_DISPLAY_ORDER) {
    const count = ntTotals[nt] || 0;
    if (count === 0) continue;
    const pct = ((count / total) * 100).toFixed(1);
    const color = NT_PROFILES[nt]?.color || 'var(--text)';
    const row = document.createElement('div');
    row.style.cssText = 'font-size:0.47rem;letter-spacing:0.05em;line-height:1.9;display:flex;justify-content:space-between;align-items:baseline;gap:4px';
    row.innerHTML = `<span>&#9679; <span style="color:${color}">${nt}</span></span><span style="color:var(--accent);font-size:0.43rem">${count} <span style="color:var(--dim)">(${pct}%)</span></span>`;
    el.appendChild(row);
  }
}

// ═══════════════════════════════════════════════════════════════
//  SIMULATION TICK
// ═══════════════════════════════════════════════════════════════
function simTick() {
  firesThisTick = 0;

  for (let ni = 0; ni < neurons.length; ni++) {
    neurons[ni].inputSum = 0;
    if (neurons[ni].refractoryLeft > 0) neurons[ni].refractoryLeft--;
  }

  if (camActive) {
    const occCount = occipitalIdxs.length;
    const pixCount = camRes * camRes;
    for (let i = 0; i < occCount; i++) {
      const ni = occipitalIdxs[i];
      const pi = i % pixCount;
      neurons[ni].inputSum += neurons[ni].camWeight * pixelValues[pi];
    }
  }

  if (NOISE_MEMBRANE > 0) {
    for (let ni = 0; ni < neurons.length; ni++) {
      neurons[ni].inputSum += randGauss() * NOISE_MEMBRANE;
    }
  }

  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (n.refractoryLeft > 0) continue;
    const p = NOISE_SPONT_P + n.ntSpontBoost * noiseLevel;
    if (p > 0 && Math.random() < p) {
      n.inputSum += n.threshold * 1.05;
    }
  }

  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (n.refractoryLeft > 0) {
      n.fired = false;
      continue;
    }
    n.fired = n.inputSum >= n.threshold;
    if (n.fired) {
      firesThisTick++;
      n.refractoryLeft = n.ntRefractory;
    }
  }

  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (!n.fired) continue;
    for (let ci = 0; ci < n.connections.length; ci++) {
      if (NOISE_SYN_FAIL_P > 0 && Math.random() < NOISE_SYN_FAIL_P) continue;
      neurons[n.connections[ci]].inputSum += n.weights[ci] * n.ntGain;
    }
  }

  tickCount++;

  document.getElementById('tick-num').textContent  = tickCount;
  document.getElementById('st-active').textContent =
    neurons.filter(n => n.inputSum > 0).length;
  document.getElementById('st-fires').textContent  = firesThisTick;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER UPDATE
// ═══════════════════════════════════════════════════════════════
function updateVisuals(dt) {
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    n.smoothInput += (n.inputSum - n.smoothInput) * 0.25;
    const v = Math.min(Math.abs(n.smoothInput) / n.threshold, 1.0);
    const fired = n.fired;

    if (n.inhibitory) {
      n.mat.emissiveIntensity = fired ? 1.4 : 0.10 + v * 0.6;
      n.mat.opacity           = fired ? 0.85 : 0.30 + v * 0.45;
    } else {
      n.mat.emissiveIntensity = fired ? 2.2 : 0.08 + v * 1.2;
      n.mat.opacity           = fired ? 1.0 : 0.2 + v * 0.75;
    }

    const s = fired ? 1.5 : 1.0 + v * 0.15;
    n.mesh.scale.setScalar(s);
  }

  for (let ei = 0; ei < edgeLines.length; ei++) {
    const e = edgeLines[ei];
    const nSrc = neurons[e.srcIdx];
    const nTgt = neurons[e.tgtIdx];
    const srcFired = nSrc && nSrc.fired;
    const tgtFired = nTgt && nTgt.fired;
    const srcV = nSrc ? Math.min(nSrc.smoothInput / nSrc.threshold, 1.0) : 0;
    const tgtV = nTgt ? Math.min(nTgt.smoothInput / nTgt.threshold, 1.0) : 0;
    const activity = Math.max(srcV, tgtV);
    const anyFired = srcFired || tgtFired;

    e.mat.opacity = anyFired
      ? Math.min(e.baseOpacity * 10, 0.95)
      : e.baseOpacity + activity * (e.baseOpacity * 5);

    if (anyFired || activity > 0.1) {
      const boost = anyFired ? 1.0 : activity;
      const colArr = e.geo.attributes.color.array;
      colArr[0] = Math.min(e.colA.r + boost * (1.0 - e.colA.r) * 0.9, 1);
      colArr[1] = Math.min(e.colA.g + boost * (1.0 - e.colA.g) * 0.9, 1);
      colArr[2] = Math.min(e.colA.b + boost * (1.0 - e.colA.b) * 0.9, 1);
      colArr[3] = Math.min(e.colB.r + boost * (1.0 - e.colB.r) * 0.9, 1);
      colArr[4] = Math.min(e.colB.g + boost * (1.0 - e.colB.g) * 0.9, 1);
      colArr[5] = Math.min(e.colB.b + boost * (1.0 - e.colB.b) * 0.9, 1);
      e.geo.attributes.color.needsUpdate = true;
    } else {
      const colArr = e.geo.attributes.color.array;
      colArr[0] = e.colA.r; colArr[1] = e.colA.g; colArr[2] = e.colA.b;
      colArr[3] = e.colB.r; colArr[4] = e.colB.g; colArr[5] = e.colB.b;
      e.geo.attributes.color.needsUpdate = true;
    }
  }

  updateCamInputVisuals();
}

// ═══════════════════════════════════════════════════════════════
//  ORBIT CAMERA
// ═══════════════════════════════════════════════════════════════
let isDragging = false, autoRotate = true;
let lastMouse = { x: 0, y: 0 };
let spherical = { theta: -0.55, phi: Math.PI * 0.43 };
let targetSph = { theta: -0.55, phi: Math.PI * 0.43 };

function computeInitialZoom() {
  return 18;
}

let zoomDist  = computeInitialZoom();
let targetZoom = zoomDist;

const cv = renderer.domElement;

cv.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = { x: e.clientX, y: e.clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
});
cv.addEventListener('wheel', e => {
  targetZoom = Math.max(1, Math.min(50, targetZoom + e.deltaY * 0.04));
}, { passive: true });

cv.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
window.addEventListener('touchend', () => { isDragging = false; });
window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
}, { passive: true });

let pinchStart = null, pinchZoomStart = null;
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStart = Math.hypot(dx, dy);
    pinchZoomStart = targetZoom;
  }
}, { passive: true });
cv.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStart) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    targetZoom = Math.max(1, Math.min(50, pinchZoomStart * (pinchStart / dist)));
  }
}, { passive: true });
cv.addEventListener('touchend', e => { if (e.touches.length < 2) pinchStart = null; }, { passive: true });

function updateCamera() {
  spherical.theta += (targetSph.theta - spherical.theta) * 0.1;
  spherical.phi   += (targetSph.phi   - spherical.phi  ) * 0.1;
  zoomDist        += (targetZoom      - zoomDist        ) * 0.1;
  camera.position.set(
    zoomDist * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    zoomDist * Math.cos(spherical.phi),
    zoomDist * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, -2, -3);
}

// ═══════════════════════════════════════════════════════════════
//  CLICK -> TOOLTIP
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
cv.addEventListener('click', e => {
  mouse2d.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse2d.y = (e.clientY / window.innerHeight) * -2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(networkGroup.children);
  let found = null;
  for (const h of hits) {
    const idx = h.object.userData.neuronIdx;
    if (idx !== undefined) { found = idx; break; }
  }
  if (found !== null) {
    const n = neurons[found];
    const lobeDef = LOBE_DEFS.find(l => l.name === n.lobe);
    document.getElementById('tt-title').textContent = n.id;
    document.getElementById('tt-body').innerHTML =
      `Lobe: <span style="color:${n.lobeColor}">${lobeDef.label}</span><br>` +
      `Type: <span style="color:${n.inhibitory ? '#ff4422' : '#2fffa0'}">${n.inhibitory ? '⊖ Inhibitory' : '⊕ Excitatory'}</span><br>` +
      `Task: ${n.task}<br>` +
      `NT: <span style="color:${n.inhibitory ? '#ff8866' : '#aaffcc'}">${n.neurotransmitter}</span><br>` +
      `Input sum: ${n.inputSum.toFixed(3)}<br>` +
      `Threshold: ${n.threshold.toFixed(3)}<br>` +
      `Synapses: ${n.connections.length}` +
      (n.camWeight > 0 ? `<br>Cam weight: ${n.camWeight.toFixed(3)}` : '');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.style.display = 'block';
  } else {
    tooltip.style.display = 'none';
  }
});

// ═══════════════════════════════════════════════════════════════
//  CAMERA B&W FEED -> OCCIPITAL INPUT
// ═══════════════════════════════════════════════════════════════
const camPromptEl  = document.getElementById('cam-prompt');
const camContainer = document.getElementById('cam-container');
const camCanvas    = document.getElementById('cam-canvas');
const camVideo     = document.getElementById('cam-video');
const camCtx       = camCanvas.getContext('2d');

camCanvas.width  = camRes;
camCanvas.height = camRes;

camPromptEl.addEventListener('click', async () => {
  const txt = document.getElementById('cam-prompt-text');

  if (camActive) {
    camActive = false;
    if (camVideo.srcObject) {
      camVideo.srcObject.getTracks().forEach(t => t.stop());
      camVideo.srcObject = null;
    }
    pixelValues.fill(0);
    camContainer.style.display = 'none';
    txt.textContent = 'Enable Vision';
    camPromptEl.style.borderColor   = 'rgba(86,180,233,0.3)';
    camPromptEl.style.background    = 'rgba(86,180,233,0.06)';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    camVideo.srcObject = stream;
    await camVideo.play();
    camActive = true;
    camContainer.style.display = 'block';
    txt.textContent = 'Disable Vision';
    camPromptEl.style.borderColor = 'rgba(86,180,233,0.7)';
    camPromptEl.style.background  = 'rgba(86,180,233,0.15)';
    drawBW();
  } catch (err) {
    txt.textContent = err.name === 'NotAllowedError' ? 'Denied' : 'N/A';
  }
});

function drawBW() {
  if (!camActive) return;
  if (camVideo.readyState >= 2) {
    camCtx.drawImage(camVideo, 0, 0, camRes, camRes);
    const img = camCtx.getImageData(0, 0, camRes, camRes);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = grey;
      pixelValues[i >> 2] = grey / 255;
    }
    camCtx.putImageData(img, 0, 0);
  }
  requestAnimationFrame(drawBW);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════
let lastTime = 0;
let simTickMs = 0;
const SIM_INTERVAL_MS = 60;
let animFrameId = null;

function animate(time) {
  animFrameId = requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (!isDragging && autoRotate) targetSph.theta += dt * 0.06;
  updateCamera();

  if (simRunning) {
    simTickMs += dt * 1000 * simSpeed;
    while (simTickMs >= SIM_INTERVAL_MS) {
      simTick();
      simTickMs -= SIM_INTERVAL_MS;
    }
  }

  updateVisuals(dt);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
//  UI BINDINGS
// ═══════════════════════════════════════════════════════════════
document.getElementById('sl-speed').addEventListener('input', function() {
  simSpeed = parseInt(this.value);
  document.getElementById('vb-speed').textContent = simSpeed;
});
document.getElementById('sl-thresh').addEventListener('input', function() {
  fireThresh = parseInt(this.value) / 100;
  document.getElementById('vb-thresh').textContent = fireThresh.toFixed(2);
  neurons.forEach(n => { n.threshold = fireThresh + (Math.random() - 0.5) * 0.1; });
});
document.getElementById('sl-noise').addEventListener('input', function() {
  applyNoiseLevel(parseInt(this.value) / 100);
  document.getElementById('vb-noise').textContent = parseInt(this.value);
});
document.getElementById('sl-scale').addEventListener('input', function() {
  const scale = parseInt(this.value);
  document.getElementById('vb-scale').textContent = scale;
  applyNeuronScale(scale);
  rebuildBrain();
});

document.getElementById('btn-pause').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.textContent = autoRotate ? 'Pause Rotation' : 'Resume Rotation';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  tickCount = 0;
  simTickMs = 0;
  lastTime = 0;
  pixelValues = new Float32Array(camRes * camRes);
  buildBrain();
  const newZoom = computeInitialZoom();
  zoomDist = newZoom;
  targetZoom = newZoom;
  animate(0);
});

function rebuildBrain() {
  if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  tickCount = 0;
  simTickMs = 0;
  lastTime  = 0;
  pixelValues = new Float32Array(camRes * camRes);
  buildBrain();
  const newZoom = computeInitialZoom();
  zoomDist   = newZoom;
  targetZoom = newZoom;
  animate(0);
}
function applyResolution() {
  pixelValues = new Float32Array(camRes * camRes);
  camCanvas.width  = camRes;
  camCanvas.height = camRes;
  document.getElementById('vb-res').textContent = camRes;

  const toRemove = networkGroup.children.filter(
    o => o.userData && (o.userData.isCamNode || o.userData.isCamEdge)
  );
  toRemove.forEach(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) o.material.dispose();
    networkGroup.remove(o);
  });

  buildCamInputLayer(occipitalIdxs);
}

document.getElementById('sl-res').addEventListener('input', function() {
  camRes = parseInt(this.value);
  applyResolution();
});

document.getElementById('vb-res').textContent = camRes;

cv.addEventListener('touchstart', () => {
  if (window.innerWidth < 640) document.getElementById('panel').hidden = true;
}, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  const newZoom = computeInitialZoom();
  zoomDist  = newZoom;
  targetZoom = newZoom;
});

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildBrain();
animate(0);
</script>
