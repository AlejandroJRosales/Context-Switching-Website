<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>gpuverse</title>
<style>
  html,body{margin:0;height:100%;background:#05070a;overflow:hidden;font:13px 'Courier New',monospace;color:#9aa5b1;
    touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  #hud{position:fixed;top:8px;left:10px;white-space:pre;pointer-events:none;text-shadow:0 1px 2px #000}
  #err{position:fixed;inset:0;display:none;place-items:center;color:#f38ba8;padding:24px;text-align:center}
  #scale{position:fixed;top:8px;right:10px;display:flex;align-items:center;gap:6px;pointer-events:auto}
  #scale button{width:28px;height:28px;background:#11161d;color:#9aa5b1;border:1px solid #2a3340;
    border-radius:4px;font:14px/1 'Courier New',monospace;cursor:pointer}
  #scale button:hover{background:#1a212b;color:#fff}
  #scale span{min-width:46px;text-align:center;text-shadow:0 1px 2px #000}
  #resetSeed{width:auto;padding:0 10px;margin-left:6px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="scale">
  <button id="scaleDown" title="Scale down (-)">-</button>
  <span id="scaleLabel">1.0</span>
  <button id="scaleUp" title="Scale up (+)">+</button>
  <button id="resetSeed" title="Roll a new seed and rebuild the world">RESET</button>
</div>
<div id="err"></div>
<script type="module">
import { createRenderer } from "./renderer.js";
import { createPlayer } from "./player.js";
import { createSky } from "./sky.js";
import { MOVE } from "./world_wgsl.js";
import { ortho, lookAt, mul } from "./mat.js";

const canvas = document.getElementById("c");
const hud = document.getElementById("hud");
const errEl = document.getElementById("err");
const fail = (m)=>{errEl.style.display="grid";errEl.textContent=m;throw new Error(m);};

const adapter = await navigator.gpu?.requestAdapter();
const device  = await adapter?.requestDevice();
if(!device) fail("WebGPU unavailable: use Chrome/Edge 113+ or Safari 18+ over https/localhost.");

const ctx = canvas.getContext("webgpu");
const format = navigator.gpu.getPreferredCanvasFormat();
ctx.configure({ device, format, alphaMode:"opaque" });

// Tier 1.4: deterministic seeding
// mulberry32: tiny deterministic PRNG. Same seed -> same float stream -> reproducible
// world (entity init here; terrain/biomes seed through TerrainParams.seed on the GPU).
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// Seeds are plain ints (HUD/URL readable), hashed into 32-bit state so sequential
// seeds still decorrelate.
function seedToState(seed) {
  let h = 1779033703 ^ seed;
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}
// The GPU stores the seed in an f32 (TerrainParams.seed), which only holds
// integers up to ~2^24 exactly. A large user seed (e.g. RESET picks up to 1e9)
// would round, and worse, dominate the noise coordinates (uv*6 + seed) so badly
// that every vertex samples the same point -> flat terrain + drifting water level.
// Map any seed through the 32-bit hash into a small, well-distributed float
// (0..1000 with a fractional part) that f32 represents exactly. The HUD/URL seed
// stays the big readable int; only this GPU-facing value is bounded.
function seedToGpuFloat(seed) {
  const s = seedToState(seed);                 // decorrelated 32-bit
  return (s >>> 8) / 16777216 * 1000;          // 0..1000, ~16 fractional bits
}

const params = new URLSearchParams(location.search);
let seed = params.has("seed") ? (parseInt(params.get("seed"), 10) || 0) : 7;

// world config (base values; actual N/world/amplitude scale with the +/- control)
const BASE_N = 1000;                        // creature count at scale 1.0
const BASE_WORLD = [10000, 10000];          // world X/Z extent at scale 1.0
const BASE_AMPLITUDE = 500;                 // terrain height at scale 1.0
const worldMin = [0,0,0];

const SCALE_STEPS = [0.5,1,2,3,3.5];
let scaleIdx = SCALE_STEPS.indexOf(2);

// day/night cycle
const DAY_LENGTH = 500;
// Start the sky clock at midday: timeOfDay 0=midnight, 0.5=noon, so offset half a day.
const SKY_TIME_OFFSET = DAY_LENGTH * 0.5;
const sky = createSky({ dayLengthSeconds: DAY_LENGTH });

let N, worldMax, amplitude, positions, moveParams, moveBGL, moveBG, movePipe, renderer, player;
let speciesHeading;   // per-instance (species:0|1, heading:radians) buffer, vec2 stride 8
let curShadowRes = 2048;   // mirrors renderer's shadowRes; updated in buildWorld, read by fitLightMatrix

function buildWorld(scale){
  N = Math.max(1, Math.round(BASE_N * scale));
  worldMax = [BASE_WORLD[0]*scale, 0, BASE_WORLD[1]*scale];
  amplitude = BASE_AMPLITUDE * scale;

  // positions buffer (the one the renderer reads as instance data)
  // Seeded RNG (1.4): same seed -> same initial scatter of entities, every run.
  const rng = mulberry32(seedToState(seed));
  positions = device.createBuffer({
    size: N*16, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST });
  {
    const init = new Float32Array(N*4);
    for(let i=0;i<N;i++){
      init[i*4]   = worldMin[0]+rng()*(worldMax[0]-worldMin[0]);
      init[i*4+2] = worldMin[2]+rng()*(worldMax[2]-worldMin[2]);
      init[i*4+1] = amplitude; // will be snapped to ground on first move step
    }
    device.queue.writeBuffer(positions,0,init);
  }

  // Per-instance (species, heading). Species assigned once here (~55% deer / 45% wolf via
  // the same seeded RNG so it's reproducible); heading is seeded random and then driven by
  // the move pass each frame. vec2 per instance -> stride 8 bytes.
  speciesHeading = device.createBuffer({
    size: N*8, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST });
  {
    const sh = new Float32Array(N*2);
    for(let i=0;i<N;i++){
      sh[i*2]   = rng() < 0.55 ? 0 : 1;         // 0 deer, 1 wolf
      sh[i*2+1] = rng() * Math.PI * 2;          // initial heading
    }
    device.queue.writeBuffer(speciesHeading,0,sh);
  }

  // Shadow map shrinks as the world grows: a fixed texel budget over a bigger
  // visible region would just blur, so trade resolution for coverage at high scale.
  const shadowRes = scale <= 1 ? 2048 : scale <= 3 ? 1024 : 512;
  curShadowRes = shadowRes;

  renderer = createRenderer(device, ctx, format, {
    worldMin, worldMax, gridN:256, amplitude, seed:seedToGpuFloat(seed), creatureRadius:8.0,
    shadowResolution: shadowRes });

  // player walks the SAME baked heightfield the renderer draws. Read it back once
  // (async) and hand it to the player; this matches the rendered ground exactly,
  // unlike recomputing fp32 GPU noise on the fp64 CPU.
  if (player) renderer.readHeights().then(({data, gridN})=>{
    player.setTerrain({ heights:data, gridN,
      worldMin:[worldMin[0], worldMin[2]], worldMax:[worldMax[0], worldMax[2]] });
  });

  // movement pipeline (shares terrainParams so heights match exactly)
  moveParams = device.createBuffer({ size:16, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  moveBGL = device.createBindGroupLayout({entries:[
    {binding:0,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:"uniform"}},
    {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
    {binding:3,visibility:GPUShaderStage.COMPUTE,buffer:{type:"storage"}},
  ]});
  moveBG = device.createBindGroup({layout:moveBGL,entries:[
    {binding:0,resource:{buffer:moveParams}},
    {binding:1,resource:{buffer:renderer.terrainParams}},
    {binding:2,resource:{buffer:positions}},
    {binding:3,resource:{buffer:speciesHeading}},
  ]});
  movePipe = device.createComputePipeline({
    layout: device.createPipelineLayout({bindGroupLayouts:[moveBGL]}),
    compute:{module:device.createShaderModule({code:MOVE}),entryPoint:"main"},
  });
}

// player: WASD+space (keyboard) and on-screen joystick+jump (touch), both always on
// Created before the first buildWorld so the first heightfield readback finds it.
// Terrain (the baked heightfield) is supplied asynchronously by buildWorld via setTerrain.
player = createPlayer(canvas, {
  eyeHeight: 5, moveSpeed: 150, jumpSpeed: 125, gravity: 300,
});

buildWorld(SCALE_STEPS[scaleIdx]);

const scaleLabel = document.getElementById("scaleLabel");
function updateScaleLabel(){ scaleLabel.textContent = `${SCALE_STEPS[scaleIdx]}x`; }
updateScaleLabel();

function setScale(newIdx){
  newIdx = Math.max(0, Math.min(SCALE_STEPS.length-1, newIdx));
  if(newIdx === scaleIdx) return;
  scaleIdx = newIdx;
  updateScaleLabel();
  buildWorld(SCALE_STEPS[scaleIdx]);
}
document.getElementById("scaleUp").addEventListener("click", ()=>setScale(scaleIdx+1));
document.getElementById("scaleDown").addEventListener("click", ()=>setScale(scaleIdx-1));
addEventListener("keydown", e=>{
  if(e.key==="+"||e.key==="=") setScale(scaleIdx+1);
  if(e.key==="-"||e.key==="_") setScale(scaleIdx-1);
});

// new seed and rebuild (terrain, biomes, scatter, water all re-derive).
document.getElementById("resetSeed").addEventListener("click", ()=>{
  seed = Math.floor(Math.random()*1e9);
  const url = new URL(location.href);
  url.searchParams.set("seed", seed);
  history.replaceState(null, "", url);
  buildWorld(SCALE_STEPS[scaleIdx]);
});

// --- Shadow light fit ------------------------------------------------------
// Build a sun-view orthographic viewProj that tightly covers the region the player
// can see, then texel-snap it so shadow edges don't crawl while walking.
//
// Strategy: take a sphere of radius `coverage` centered a bit ahead of the camera.
// A sphere bound makes the ortho extents rotation-invariant, so as you turn, the box
// size is constant and ONLY its center moves -> texel-snapping fully kills shimmer.
const SHADOW_UP_FALLBACK = [0, 0, 1];   // if sun is near-vertical, lookAt up must not be parallel
function fitLightMatrix(sunDir, camEye, camForward, coverage, depthRange) {
  // center the cover sphere slightly ahead of the eye along the ground-projected forward
  const fwd = [camForward[0], 0, camForward[2]];
  const fl = Math.hypot(fwd[0], fwd[2]) || 1;
  const center = [
    camEye[0] + fwd[0] / fl * coverage * 0.5,
    camEye[1],
    camEye[2] + fwd[2] / fl * coverage * 0.5,
  ];

  // light "position": back off from center along the sun direction far enough to
  // bound all terrain depth within [near,far].
  const D = depthRange;
  const lightPos = [
    center[0] + sunDir[0] * D,
    center[1] + sunDir[1] * D,
    center[2] + sunDir[2] * D,
  ];
  // pick an up vector not parallel to the light direction
  const up = Math.abs(sunDir[1]) > 0.99 ? SHADOW_UP_FALLBACK : [0, 1, 0];
  const lightView = lookAt(lightPos, center, up);

  // ortho half-extent is the cover radius; symmetric box. near/far span 2*D so terrain
  // in front of and behind center is captured.
  const r = coverage;
  // texel-snap: quantize the center in light space to whole-texel steps.
  // transform center into light space, round its xy to texel grid, transform back via
  // the inverse — but since the box is axis-aligned in light space, we can snap the
  // projection offset directly. texelWorld = (2*r) / shadowRes.
  const lp = [
    lightView[0]*center[0] + lightView[4]*center[1] + lightView[8]*center[2]  + lightView[12],
    lightView[1]*center[0] + lightView[5]*center[1] + lightView[9]*center[2]  + lightView[13],
  ];
  const texelWorld = (2 * r) / curShadowRes;
  const snappedX = Math.round(lp[0] / texelWorld) * texelWorld;
  const snappedY = Math.round(lp[1] / texelWorld) * texelWorld;
  // shift the ortho bounds by the snap delta so the frozen grid aligns to texels
  const dx = lp[0] - snappedX, dy = lp[1] - snappedY;

  const proj = ortho(-r + dx, r + dx, -r + dy, r + dy, 0.1, 2 * D);
  return mul(proj, lightView);
}
// --- end Shadow light fit --------------------------------------------------

// camera is driven by the player (player.js): drag to look, WASD/joystick to move
function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr);
}
addEventListener("resize",resize); resize();

function handleHud(time, dt, lastHud) {
  // day/night + fog, recomputed on CPU per frame. fogDist scales with world size.
  const skyState = sky.update(time + SKY_TIME_OFFSET);
  renderer.setSky(skyState);
  const fogDist = Math.max(worldMax[0], worldMax[2]) * 0.55;
  renderer.setFog(skyState.fogColor, fogDist);

  const enc=device.createCommandEncoder();
  { const p=enc.beginComputePass(); p.setPipeline(movePipe); p.setBindGroup(0,moveBG);
    p.dispatchWorkgroups(Math.ceil(N/64)); p.end(); }

  // Fit + upload the sun-view light frustum, then bake the shadow depth map. The
  // coverage radius is tied to fog distance (no point shadowing past the fog wall),
  // clamped so it never tries to cover the whole giant world at high scale.
  // 5x5 PCF (radius 2) at scale 1.0 per the chosen default.
  {
    const cam = player.getCamera(canvas.width/canvas.height);
    const fwd = [cam.target[0]-cam.eye[0], cam.target[1]-cam.eye[1], cam.target[2]-cam.eye[2]];
    const coverage = Math.min(fogDist * 0.6, Math.max(worldMax[0], worldMax[2]) * 0.5);
    // depth range must clear the tallest terrain the box can contain
    const depthRange = coverage + amplitude * 2;
    const lightVP = fitLightMatrix(skyState.sunDir, cam.eye, fwd, coverage, depthRange);
    renderer.setShadow(lightVP, { pcfRadius: 2.0, bias: 0.0015, strength: 0.85 });
  }
  renderer.bakeShadow(enc);

  renderer.render(enc, positions, N, speciesHeading, canvas.width, canvas.height, time);
  device.queue.submit([enc.finish()]);

  facc+=dt; frames++; frameCount++;
  if(facc>=0.5){ fps=Math.round(frames/facc); frames=0; facc=0; }

  // Touch the DOM only every HUD_EVERY frames and only when text changed (avoids
  // per-frame layout/paint).
  if(frameCount%HUD_EVERY===0){
    const tod = (skyState.timeOfDay*24).toFixed(1); // already offset via sky.update
    const hudText=`3.0.0  seed ${seed}  fps ${fps}\nentities ${N.toLocaleString()}\nworld ${Math.round(worldMax[0])}x${Math.round(worldMax[2])}\ntime ${tod}h  ${player.flying?"  [FLYING]":""}\n`;
    if(hudText!==lastHud){ hud.textContent=hudText; lastHud=hudText; }
  }
}

// Reused per-frame scratch (avoids per-frame typed-array allocation). Float fields and the
// u32 N share one ArrayBuffer so the 16-byte MoveParams uploads in one writeBuffer.
const moveScratch = new Float32Array(4);          // [time, dt, speed, _]
const moveScratchU = new Uint32Array(moveScratch.buffer); // same 16 bytes, u32 view for N at index 3
let t0 = performance.now(), last = t0, frames = 0, fps = 0, facc = 0, frameCount = 0;
let lastHud = "";
const HUD_EVERY = 60;   // refresh HUD text once every 60 frames
function frame(now){
  const dt = Math.min(0.05,(now-last)/1000); 
  last = now; 
  const time = (now-t0)/1000;

  moveScratch[0]=time; moveScratch[1]=dt; moveScratch[2]=18.0; moveScratchU[3]=N;
  device.queue.writeBuffer(moveParams,0,moveScratch);

  player.update(dt);
  renderer.setCamera(player.getCamera(canvas.width/canvas.height));

  lastHud = handleHud(time, dt, lastHud);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
