<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Simulation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #04060f;
    --panel:   rgba(6, 10, 22, 0.93);
    --border:  rgba(80, 200, 160, 0.15);
    --accent:  #2fffa0;
    --accent2: #a06fff;
    --accent3: #ff6fa0;
    --warn:    #ffaa33;
    --text:    #b8d8c8;
    --dim:     #406050;
    --tap:     44px;

    /* Lobe palette */
    --col-prefrontal:  #2fffa0;
    --col-motor:       #ff6fa0;
    --col-occipital:   #56b4e9;
    --col-temporal:    #e6a020;
    --col-parietal:    #a06fff;
    --col-thalamus:    #ffffff;
    --col-brainstem:   #ff4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body.dragging { cursor: grabbing; }

  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }

  /* TITLE */
  #title {
    position: fixed;
    top: 20px; left: 20px;
    pointer-events: none;
    z-index: 10;
  }
  #title h1 {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }
  #title h1 span { color: var(--accent); }
  #title p {
    font-size: 0.48rem;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* GEN/TICK LABEL */
  #gen-label {
    position: fixed;
    top: 20px; right: 20px;
    font-size: 0.44rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* FEED ROW — holds cam + audio side by side, never overlapping */
  #feed-row {
    position: fixed;
    top: 118px; left: 20px;
    z-index: 20;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 6px;
    pointer-events: none; /* children re-enable as needed */
  }
  @media (min-width: 640px) {
    #feed-row { top: 144px; left: 32px; }
  }

  /* CAM COLUMN — feed box + optional switch button stacked vertically */
  #cam-col {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 4px;
    pointer-events: auto;
  }

  /* CAMERA FEED */
  #cam-container {
    position: relative;
    width: 68px; height: 68px;
    border: 1px solid rgba(86,180,233,0.4);
    border-radius: 10px; overflow: hidden;
    background: #000; display: none;
  }
  #cam-canvas {
    display: block; width: 68px; height: 68px;
    image-rendering: pixelated;
  }
  #cam-label {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center; font-size: 0.36rem;
    letter-spacing: 0.1em; color: #56b4e9;
    text-transform: uppercase; pointer-events: none; opacity: 0.7;
  }
  #cam-active-dot {
    position: absolute; top: 5px; right: 5px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #56b4e9;
    box-shadow: 0 0 6px #56b4e9;
    animation: blink 1.2s ease-in-out infinite;
  }
  @media (min-width: 640px) {
    #cam-container { width: 80px; height: 80px; }
    #cam-canvas    { width: 80px; height: 80px; }
  }

  /* AUDIO FEED */
  #audio-container {
    position: relative;
    width: 68px; height: 68px;
    border: 1px solid rgba(86,180,233,0.4);
    border-radius: 10px; overflow: hidden;
    background: #000; display: none;
    pointer-events: auto;
  }
  #audio-canvas {
    display: block; width: 68px; height: 68px;
    image-rendering: pixelated;
  }
  #audio-label {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center; font-size: 0.36rem;
    letter-spacing: 0.1em; color: #56b4e9;
    text-transform: uppercase; pointer-events: none; opacity: 0.7;
  }
  #audio-active-dot {
    position: absolute; top: 5px; right: 5px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #56b4e9;
    box-shadow: 0 0 6px #56b4e9;
    animation: blink 1.2s ease-in-out infinite;
  }
  @media (min-width: 640px) {
    #audio-container { width: 80px; height: 80px; }
    #audio-canvas    { width: 80px; height: 80px; }
  }

  @media (min-width: 640px) {
    #title { top: 28px; left: 32px; }
    #title h1 { font-size: 1.8rem; }
    #gen-label { top: 28px; right: 32px; }
  }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.5rem;
    line-height: 1.9;
    color: var(--text);
    backdrop-filter: blur(12px);
    z-index: 50;
    display: none;
    white-space: nowrap;
  }
  #tooltip .tt-title { color: #fff; font-size: 0.55rem; margin-bottom: 3px; }

  /* PANEL TOGGLE */
  #panel-toggle {
    position: fixed;
    top: 14px; right: 14px;
    z-index: 100;
    width: 36px; height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }
  #panel-toggle:hover { border-color: var(--accent); }
  #panel-toggle.panel-open { color: var(--accent3); border-color: var(--accent3); }

  /* SIDE PANEL */
  #panel {
    position: fixed;
    top: 58px; right: 14px;
    z-index: 99;
    width: 200px;
    max-height: calc(100dvh - 72px);
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    backdrop-filter: blur(16px);
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }
  #panel::-webkit-scrollbar { width: 3px; }
  #panel::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  /* LOBE LEGEND */
  #lobe-legend strong {
    display: block;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 0.48rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 7px;
  }
  #lobe-legend div {
    font-size: 0.47rem;
    letter-spacing: 0.05em;
    line-height: 1.9;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* DIVIDER */
  .panel-divider {
    height: 1px;
    background: var(--border);
    margin: 10px -12px;
  }

  /* BUTTONS */
  #panel button {
    width: 100%;
    padding: 7px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.44rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    margin-bottom: 6px;
  }
  #panel button:hover {
    border-color: var(--accent);
    background: rgba(47, 255, 160, 0.07);
  }
  #panel button:last-child { margin-bottom: 0; }

  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 0;
  }
  .btn-row button {
    flex: 1;
    margin-bottom: 0;
  }
  .btn-row button:hover {
    border-color: var(--accent2);
    background: rgba(160, 111, 255, 0.07);
    color: var(--accent2);
  }

  /* SLIDERS */
  .slider-group { display: flex; flex-direction: column; gap: 8px; }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }
  .slider-name {
    font-size: 0.42rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .slider-val {
    font-size: 0.46rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    min-width: 28px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(80, 200, 160, 0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 6px var(--accent);
    transition: box-shadow 0.15s;
  }
  input[type=range]::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 6px var(--accent);
  }
  input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 10px var(--accent); }

  /* STATS */
  #stats { display: flex; flex-direction: column; gap: 3px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .stat-key {
    font-size: 0.41rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .stat-val {
    font-size: 0.46rem;
    color: var(--text);
    letter-spacing: 0.06em;
  }

  /* GEN LABEL */
  #gen-label { font-size: 0.48rem; }

  @media (max-width: 639px) {
    #panel { width: 180px; }
  }

  /* FEED BUTTONS — live inside #feed-row flex layout, not fixed-positioned */
  /* Button row above the feed panels */
  #feed-btn-row {
    position: fixed;
    top: 72px; left: 20px;
    z-index: 21;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
  }
  @media (min-width: 640px) {
    #feed-btn-row { top: 96px; left: 32px; }
  }

  .feed-btn {
    position: relative; /* no longer fixed */
    background: rgba(6, 10, 22, 0.75);
    border: 1px solid rgba(86,180,233,0.55);
    border-radius: 8px;
    color: #7dd8f0;
    cursor: pointer;
    padding: 6px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    backdrop-filter: blur(6px);
    flex-shrink: 0;
  }
  .feed-btn svg {
    width: 20px;
    height: 20px;
    display: block;
    stroke-width: 2.2;
  }
  .feed-btn .icon-slash { display: none; }
  .feed-btn--off .icon-slash {
    display: block;
    stroke: rgba(86,180,233,0.7);
    stroke-width: 2.2;
  }
  .feed-btn--off {
    color: rgba(86,180,233,0.45);
    border-color: rgba(86,180,233,0.25);
    background: rgba(6, 10, 22, 0.6);
  }
  .feed-btn:hover {
    border-color: rgba(86,180,233,0.9);
    background: rgba(86,180,233,0.15);
    color: #aeeeff;
  }

  /* Switch button sits below the cam feed box, inside #cam-col */
  .feed-btn--switch {
    width: 100%;
    height: auto;
    padding: 4px 0;
    font-size: 0.34rem;
    font-family: 'Courier New', Courier, monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">
  <h1>MAT</h1>
  <h5>Modular-Network of Adaptive Topologies</h5>
</div>

<!-- ── Feed toggle button row ─────────────────────────────────── -->
<div id="feed-btn-row">
  <!-- Vision toggle -->
  <button id="cam-prompt" class="feed-btn feed-btn--vision feed-btn--off" title="Toggle camera vision -> feeds Occipital lobe">
    <svg id="cam-prompt-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="12" rx="9" ry="5.5"/>
      <circle cx="12" cy="12" r="2.5"/>
      <line class="icon-slash" x1="3" y1="3" x2="21" y2="21"/>
    </svg>
  </button>
  <!-- Hearing toggle -->
  <button id="audio-prompt" class="feed-btn feed-btn--hearing feed-btn--off" title="Toggle microphone audio -> feeds Temporal lobe">
    <svg id="audio-prompt-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9a6 6 0 1 1 12 0c0 4-3 5-3 8H9"/>
      <path d="M9 17a3 3 0 0 0 6 0"/>
      <path d="M12 9a2 2 0 0 0-2 2c0 1.5 2 2 2 4"/>
      <line class="icon-slash" x1="3" y1="3" x2="21" y2="21"/>
    </svg>
  </button>
</div>

<!-- ── Live feed panels row ───────────────────────────────────── -->
<div id="feed-row">
  <!-- Camera column: feed box + optional switch button -->
  <div id="cam-col">
    <div id="cam-container">
      <canvas id="cam-canvas" width="10" height="10"></canvas>
      <div id="cam-label">eye</div>
      <div id="cam-active-dot"></div>
    </div>
    <button id="cam-switch" class="feed-btn feed-btn--switch" title="Cycle to next camera" style="display:none;">
      <span id="cam-switch-text">Switch Cam</span>
    </button>
  </div>

  <!-- Audio visualizer -->
  <div id="audio-container">
    <canvas id="audio-canvas" width="34" height="34"></canvas>
    <div id="audio-label">ear</div>
    <div id="audio-active-dot"></div>
  </div>
</div>

<video id="cam-video" playsinline autoplay muted style="display:none;position:fixed;width:0;height:0;"></video>

<!-- panel toggle -->
<button id="panel-toggle" aria-label="Toggle controls" onclick="var p=document.getElementById('panel');p.hidden=!p.hidden;this.classList.toggle('panel-open',!p.hidden)">&#9776;</button>

<div id="panel" hidden>
  <h6><a style="color:white" class="sp-link-gradient" href="https://www.contextswitching.org/neuro/mat">Click here to read about this simulation</a></h6>
  <br>

  <!-- lobe legend populated by JS -->
  <div id="lobe-legend"></div>

  <div class="panel-divider"></div>

  <div class="btn-row">
    <button id="btn-pause">Pause Rotation</button>
    <button id="btn-reset">Reset</button>
  </div>

  <div class="btn-row">
  <button id="btn-kill">Kill Brain Function</button>
</div>

  <div class="panel-divider"></div>

  <div class="slider-group">
    <label class="slider-label">
      <span class="slider-name">Speed</span>
      <span class="slider-val" id="vb-speed">5</span>
    </label>
    <input type="range" id="sl-speed" min="1" max="20" value="5">

    <label class="slider-label">
      <span class="slider-name">Fire Thresh</span>
      <span class="slider-val" id="vb-thresh">0.20</span>
    </label>
    <input type="range" id="sl-thresh" min="10" max="90" value="20">

    <label class="slider-label">
      <span class="slider-name">Synaptic Failure</span>
      <span class="slider-val" id="vb-syn">7%</span>
    </label>
    <input type="range" id="sl-syn" min="0" max="90" value="7">

    <label class="slider-label">
      <span class="slider-name">Membrane Noise</span>
      <span class="slider-val" id="vb-mem">0.024</span>
    </label>
    <input type="range" id="sl-mem" min="0" max="120" value="24">

    <label class="slider-label">
      <span class="slider-name">Spontaneous Firing</span>
      <span class="slider-val" id="vb-spont">0.002</span>
    </label>
    <input type="range" id="sl-spont" min="0" max="100" value="11">

    <label class="slider-label">
      <span class="slider-name">Scale</span>
      <span class="slider-val" id="vb-scale">5</span>
    </label>
    <input type="range" id="sl-scale" min="2" max="8" step="1" value="5">

    <label class="slider-label">
      <span class="slider-name">Resolution</span>
      <span class="slider-val" id="vb-res">20</span>
    </label>
    <input type="range" id="sl-res" min="10" max="50" step="5" value="20">
  </div>

  <div class="panel-divider"></div>

  <div id="stats">
    <div class="stat-row"><span class="stat-key">Lobes</span><span class="stat-val" id="st-lobes">-</span></div>
    <div class="stat-row"><span class="stat-key">Neurons</span><span class="stat-val" id="st-neurons">-</span></div>
    <div class="stat-row"><span class="stat-key">Synapses</span><span class="stat-val" id="st-conns">-</span></div>
    <div class="stat-row"><span class="stat-key">Active</span><span class="stat-val" id="st-active">-</span></div>
    <div class="stat-row"><span class="stat-key">Tick</span><span class="stat-val" id="tick-num">0</span></div>
    <div class="stat-row"><span class="stat-key">Firings/tick</span><span class="stat-val" id="st-fires">-</span></div>
  </div>

  <br>
  <h5>v0.0.4</h5>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title">-</div>
  <div id="tt-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  MAT BRAIN CONFIG mirrors yaml structure
// ═══════════════════════════════════════════════════════════════
// Anatomically-motivated layout (Y=up, Z=anterior/front, X=right)
// Brain sits with anterior (front/forehead) toward +Z, posterior (back/occipital) toward -Z
// Superior (top) = +Y, inferior (bottom) = -Y
// Lobes are spread to fill the jar (radius ~3.6 usable) without clipping the glass
const LOBE_DEFS = [
  // Prefrontal Cortex — anterior, superior; large frontal mass, slightly left-right symmetric
  { name: 'prefrontal',  label: 'Prefrontal Cortex',   task: 'planning / decision',      neurons: 18, connP: 0.25, crossP: 0.12, color: '#2fffa0', pos: [ 0,    1.5,  2.0 ] },
  // Motor Cortex — precentral gyrus; just posterior to prefrontal, still superior
  { name: 'motor',       label: 'Motor Cortex',         task: 'action control',           neurons: 14, connP: 0.20, crossP: 0.10, color: '#ff6fa0', pos: [ 0,    1.6,  0.4 ] },
  // Parietal Lobe — superior, posterior to motor (post-central gyrus and beyond)
  { name: 'parietal',    label: 'Parietal Lobe',        task: 'sensory integration',      neurons: 12, connP: 0.18, crossP: 0.09, color: '#a06fff', pos: [ 0,    1.5, -1.2 ] },
  // Occipital Lobe — most posterior, inferior-superior mid; visual cortex at the very back
  { name: 'occipital',   label: 'Occipital Lobe',       task: 'visual processing',        neurons: 16, connP: 0.22, crossP: 0.08, color: '#56b4e9', pos: [ 0,    0.5, -2.6 ] },
  // Temporal Lobe — lateral & inferior, mid-height; flanks both hemispheres (averaged to one center)
  // Sits below and lateral to parietal, anterior of occipital
  { name: 'temporal',    label: 'Temporal Lobe',        task: 'auditory / memory',        neurons: 14, connP: 0.20, crossP: 0.10, color: '#e6a020', pos: [ 2.0, -0.4, -0.2 ] },
  // Thalamus — deep midline, central relay; slightly superior to brainstem
  { name: 'thalamus',    label: 'Thalamus',             task: 'inter-lobe routing',       neurons:  8, connP: 0.30, crossP: 0.25, color: '#e8e8e8', pos: [ 0,    0.0,  0.0 ] },
  // Brainstem — inferior, posterior; connects spinal cord, below thalamus
  { name: 'brainstem',   label: 'Brainstem',            task: 'reflex / survival drives', neurons: 12, connP: 0.35, crossP: 0.18, color: '#ff4444', pos: [ 0,   -2.2, -0.6 ] },
];

// Store initial neuron counts for scale calculations
const LOBE_BASE_NEURONS = Object.fromEntries(LOBE_DEFS.map(l => [l.name, l.neurons]));
let neuronScale = 5.0;

const LOBE_SPREAD_BASE = 0.85; // base scatter radius — tighter per-lobe clouds for cleaner anatomy
let LOBE_SPREAD = LOBE_SPREAD_BASE; // updated by applyNeuronScale; cube-root of scale keeps density constant

function applyNeuronScale(scale) {
  neuronScale = scale;
  // Spread grows as cube-root of scale so the volume (and density) stays roughly constant
  LOBE_SPREAD = LOBE_SPREAD_BASE * Math.cbrt(scale);
  for (const lobe of LOBE_DEFS) {
    // Brainstem is fixed at 12 — one neuron per joint, regardless of scale
    if (lobe.name === 'brainstem') { lobe.neurons = 12; continue; }
    lobe.neurons = Math.max(1, Math.round(LOBE_BASE_NEURONS[lobe.name] * scale));
  }
}
const ORBIT_RADIUS = 10;
const NODE_R = 0.09;
const MAX_CROSS_EDGES_DRAWN = 50;
const MAX_INTRA_EDGES_DRAWN = 50;

// ~20% of cortical neurons are inhibitory interneurons (GABAergic)
// Brainstem/thalamus get slightly lower inhibitory fractions
const INHIB_FRACTION = 0.20;

// NEUROTRANSMITTER PROFILES
// ntGain       : multiplier on synaptic weight contribution to inputSum
// refractoryMod: added ticks to base REFRACTORY_TICKS (kinetics speed)
// spontBoost   : extra spontaneous-fire probability beyond global NOISE_SPONT_P
// color        : THREE.js hex for neuron mesh (overrides lobe color for NT-specific cells)
// inhibitory   : whether this NT is sign-negative on targets
const NT_PROFILES = {
  // Fast amino acids
  glutamate: {
    gain: 1.00,         // reference excitatory; dominant in cortex (~80-90% excit. synapses)
    refractoryMod: 0,   // fast kinetics
    spontBoost: 0.000,
    color: '#2fffa0',   // green (lobe color, no override needed for most lobes)
    inhibitory: false,
  },
  GABA: {
    gain: 1.10,         // slightly stronger per synapse (well-coupled Cl⁻ channels)
    refractoryMod: 1,   // slightly prolonged silence after inhibition
    spontBoost: 0.000,
    color: '#ff6fa0',   // pink-red
    inhibitory: true,
  },
  // Cholinergic
  acetylcholine: {
    gain: 0.75,         // modulatory; slower nicotinic/muscarinic kinetics
    refractoryMod: 1,
    spontBoost: 0.002,  // thalamus drives spontaneous rhythms
    color: '#e6a020',   // amber
    inhibitory: false,
  },
  // Monoamines
  dopamine: {
    gain: 0.55,         // neuromodulatory; slow volume transmission
    refractoryMod: 2,   // slow firing rate (VTA/SNc neurons ~4 Hz baseline)
    spontBoost: 0.004,  // tonic dopamine drive
    color: '#c084fc',   // violet
    inhibitory: false,
  },
  serotonin: {
    gain: 0.45,         // broad inhibitory-modulatory effect; slow autoreceptor feedback
    refractoryMod: 3,   // raphe neurons very slow (~1-3 Hz)
    spontBoost: 0.003,
    color: '#f97316',   // orange
    inhibitory: false,
  },
  norepinephrine: {
    gain: 0.65,         // locus coeruleus: arousal and signal-to-noise amplification
    refractoryMod: 2,

    color: '#ff4444',   // red (brainstem color, kept)
    inhibitory: false,
  },
};

// PER-LOBE NT ASSIGNMENT RULES
// Each entry: array of { nt, fraction }; must sum to 1.0 across excitatory slots.
// Inhibitory neurons always get GABA regardless.
// fractions here apply only to the excitatory (non-inhibitory) pool.
const LOBE_NT_DIST = {
  // Cortex: ~glutamate dominant; small dopaminergic/serotonergic projection terminals
  prefrontal: [
    { nt: 'glutamate',      frac: 0.82 },
    { nt: 'dopamine',       frac: 0.10 }, // PFC richly innervated by VTA dopamine
    { nt: 'serotonin',      frac: 0.08 }, // raphe projections
  ],
  motor: [
    { nt: 'glutamate',      frac: 0.88 },
    { nt: 'dopamine',       frac: 0.08 }, // striatal motor loop
    { nt: 'norepinephrine', frac: 0.04 }, // LC arousal
  ],
  occipital: [
    { nt: 'glutamate',      frac: 0.92 }, // heavily glutamatergic visual cortex
    { nt: 'serotonin',      frac: 0.05 }, // 5-HT2A modulates visual processing
    { nt: 'norepinephrine', frac: 0.03 },
  ],
  temporal: [
    { nt: 'glutamate',      frac: 0.84 },
    { nt: 'serotonin',      frac: 0.10 }, // auditory/memory modulation
    { nt: 'dopamine',       frac: 0.06 },
  ],
  parietal: [
    { nt: 'glutamate',      frac: 0.86 },
    { nt: 'serotonin',      frac: 0.08 },
    { nt: 'acetylcholine',  frac: 0.06 }, // cholinergic memory routing
  ],
  // Subcortical
  thalamus: [
    { nt: 'acetylcholine',  frac: 0.60 }, // basal forebrain cholinergic projection hub
    { nt: 'glutamate',      frac: 0.30 }, // thalamocortical relay neurons
    { nt: 'norepinephrine', frac: 0.10 }, // LC modulation of thalamic gating
  ],
  brainstem: [
    { nt: 'norepinephrine', frac: 0.50 }, // locus coeruleus
    { nt: 'serotonin',      frac: 0.30 }, // raphe nuclei
    { nt: 'dopamine',       frac: 0.10 }, // VTA / SNc
    { nt: 'acetylcholine',  frac: 0.10 }, // pedunculopontine nucleus
  ],
};

// Pick NT for an excitatory neuron in a lobe using weighted random draw
function pickNT(lobeName) {
  const dist = LOBE_NT_DIST[lobeName] || [{ nt: 'glutamate', frac: 1.0 }];
  const r = Math.random();
  let cum = 0;
  for (const { nt, frac } of dist) {
    cum += frac;
    if (r < cum) return nt;
  }
  return dist[dist.length - 1].nt;
}

(function buildSkull() {
  const skullGroup = new THREE.Group();
  // Brain networkGroup is offset by y=-0.9, so skull is centered at y=-0.9 in scene
  skullGroup.position.y = -0.9;

  // Shared skull material — bone-white, semi-transparent so brain shows through
  const skullMat = new THREE.MeshPhongMaterial({
    color: 0xd4c8aa,
    emissive: 0x1a1510,
    emissiveIntensity: 0.15,
    shininess: 30,
    transparent: true,
    opacity: 0.22,
    side: THREE.FrontSide,
    depthWrite: false,
  });
  // Slightly more opaque mat for outer shell edges
  const skullMatSolid = new THREE.MeshPhongMaterial({
    color: 0xc8ba98,
    emissive: 0x100e08,
    emissiveIntensity: 0.1,
    shininess: 20,
    transparent: true,
    opacity: 0.38,
    side: THREE.BackSide,
    depthWrite: false,
  });

  // ── CRANIUM (upper skull dome) ────────────────────────────────
  // Ellipsoid approximated with scaled sphere
  const craniumGeo = new THREE.SphereGeometry(3.5, 48, 32, 0, Math.PI * 2, 0, Math.PI * 0.62);
  const cranium = new THREE.Mesh(craniumGeo, skullMat);
  cranium.scale.set(1.0, 1.05, 1.12);
  cranium.position.set(0, 0.55, -0.1);
  skullGroup.add(cranium);

  const craniumB = new THREE.Mesh(craniumGeo, skullMatSolid);
  craniumB.scale.set(1.0, 1.05, 1.12);
  craniumB.position.set(0, 0.55, -0.1);
  skullGroup.add(craniumB);

  // ── OCCIPITAL BASE (back-bottom of skull) ─────────────────────
  const occGeo = new THREE.SphereGeometry(2.8, 32, 16, 0, Math.PI * 2, Math.PI * 0.55, Math.PI * 0.5);
  const occ = new THREE.Mesh(occGeo, skullMat);
  occ.scale.set(1.0, 0.9, 1.05);
  occ.position.set(0, 0.55, -0.1);
  skullGroup.add(occ);

  // ── FRONTAL BONE (forehead) ───────────────────────────────────
  const frontalGeo = new THREE.SphereGeometry(2.6, 32, 24, -0.5, Math.PI * 1.0, 0, Math.PI * 0.5);
  const frontal = new THREE.Mesh(frontalGeo, skullMat);
  frontal.scale.set(1.0, 1.1, 0.88);
  frontal.position.set(0, 0.4, 1.4);
  frontal.rotation.x = 0.18;
  skullGroup.add(frontal);

  // ── ZYGOMATIC ARCHES (cheekbones, left & right) ───────────────
  for (const side of [-1, 1]) {
    const zygGeo = new THREE.TorusGeometry(1.55, 0.18, 8, 24, Math.PI * 0.55);
    const zyg = new THREE.Mesh(zygGeo, skullMat);
    zyg.position.set(side * 2.55, -0.85, 0.55);
    zyg.rotation.set(0.35, side * 0.55, side * 0.28);
    skullGroup.add(zyg);
  }

  // ── ORBITAL RIMS (eye sockets — just the bony rim rings) ──────
  for (const side of [-1, 1]) {
    const orbGeo = new THREE.TorusGeometry(0.72, 0.14, 8, 28);
    const orb = new THREE.Mesh(orbGeo, skullMat);
    orb.position.set(side * 1.22, 0.28, 2.42);
    orb.rotation.set(0.32, side * 0.18, 0);
    orb.scale.set(1.0, 0.72, 0.5);
    skullGroup.add(orb);
  }

  // ── NASAL APERTURE (pyriform — simplified as a small arch) ────
  const nasalGeo = new THREE.TorusGeometry(0.42, 0.10, 8, 20, Math.PI);
  const nasal = new THREE.Mesh(nasalGeo, skullMat);
  nasal.position.set(0, -0.22, 2.68);
  nasal.rotation.set(-0.2, 0, 0);
  nasal.scale.set(1.0, 1.3, 0.5);
  skullGroup.add(nasal);

  // ── TEMPORAL PLATES (side walls of skull, left & right) ───────
  for (const side of [-1, 1]) {
    const tempGeo = new THREE.SphereGeometry(2.3, 24, 16, 0, Math.PI * 2, 0.2, Math.PI * 0.65);
    const temp = new THREE.Mesh(tempGeo, skullMat);
    temp.scale.set(0.22, 0.80, 0.75);
    temp.position.set(side * 3.18, 0.0, -0.15);
    skullGroup.add(temp);
  }

  // ── MAXILLA / UPPER JAW (lower face) ─────────────────────────
  const maxGeo = new THREE.SphereGeometry(2.0, 24, 16, 0, Math.PI * 2, Math.PI * 0.3, Math.PI * 0.4);
  const max = new THREE.Mesh(maxGeo, skullMat);
  max.scale.set(1.0, 0.65, 0.78);
  max.position.set(0, -1.05, 1.65);
  max.rotation.x = -0.3;
  skullGroup.add(max);

  // ── MANDIBLE (lower jaw — separate bone, slightly detached) ───
  const mandGeo = new THREE.SphereGeometry(1.85, 24, 12, 0, Math.PI * 2, Math.PI * 0.52, Math.PI * 0.28);
  const mand = new THREE.Mesh(mandGeo, skullMat);
  mand.scale.set(1.0, 0.55, 0.75);
  mand.position.set(0, -1.72, 1.35);
  mand.rotation.x = -0.15;
  skullGroup.add(mand);

  // ── TOOTH ROW HINT (upper) ────────────────────────────────────
  const toothMat = new THREE.MeshPhongMaterial({
    color: 0xeeeedd, emissive: 0x111108, shininess: 60,
    transparent: true, opacity: 0.32, depthWrite: false
  });
  for (let t = -4; t <= 4; t++) {
    if (t === 0) continue;
    const tGeo = new THREE.BoxGeometry(0.17, 0.26, 0.14);
    const tooth = new THREE.Mesh(tGeo, toothMat);
    tooth.position.set(t * 0.20, -1.30, 2.35 - Math.abs(t) * 0.04);
    tooth.rotation.x = 0.12;
    skullGroup.add(tooth);
  }

  // ── CRANIAL SUTURE LINES (cosmetic wireframe arcs on top) ─────
  const sutureMat = new THREE.LineBasicMaterial({
    color: 0x8a7d5a, transparent: true, opacity: 0.18
  });
  // Sagittal suture — front to back along midline
  {
    const pts = [];
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      const phi = Math.PI * 0.08 + t * Math.PI * 0.5;
      pts.push(new THREE.Vector3(
        (Math.random() - 0.5) * 0.06,
        0.55 + 3.5 * 1.05 * Math.cos(phi),
        -0.1 + 3.5 * 1.12 * Math.sin(phi) * 0.5
      ));
    }
    const sg = new THREE.BufferGeometry().setFromPoints(pts);
    skullGroup.add(new THREE.Line(sg, sutureMat));
  }
  // Coronal suture — across top
  {
    const pts = [];
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      const theta = -Math.PI * 0.5 + t * Math.PI;
      pts.push(new THREE.Vector3(
        3.45 * Math.cos(theta),
        0.55 + 1.8 + (Math.random() - 0.5) * 0.08,
        0.85
      ));
    }
    const cg = new THREE.BufferGeometry().setFromPoints(pts);
    skullGroup.add(new THREE.Line(cg, sutureMat));
  }

  scene.add(skullGroup);
})();

// ═══════════════════════════════════════════════════════════════

// Pivot groups keyed by joint id — rotated by the animation system
const limbPivots = {};

(function buildBody() {
  const bodyGroup = new THREE.Group();
  bodyGroup.position.y = -0.9;
  scene.add(bodyGroup);

  const boneMat = new THREE.MeshPhongMaterial({
    color: 0xcfc0a0, emissive: 0x181410, emissiveIntensity: 0.12,
    shininess: 25, transparent: true, opacity: 0.28,
    side: THREE.FrontSide, depthWrite: false,
  });
  const boneMatBack = new THREE.MeshPhongMaterial({
    color: 0xb8aa88, emissive: 0x100e08, emissiveIntensity: 0.08,
    shininess: 15, transparent: true, opacity: 0.40,
    side: THREE.BackSide, depthWrite: false,
  });
  const cartMat = new THREE.MeshPhongMaterial({
    color: 0x8abecc, emissive: 0x050a0c, emissiveIntensity: 0.1,
    shininess: 55, transparent: true, opacity: 0.22, depthWrite: false,
  });

  // Add a bone mesh (both faces) to a target group, with local-space position
  function bone(parent, geo, px, py, pz, rx=0, ry=0, rz=0, sx=1, sy=1, sz=1) {
    [boneMat, boneMatBack].forEach(m => {
      const mesh = new THREE.Mesh(geo, m);
      mesh.position.set(px, py, pz);
      mesh.rotation.set(rx, ry, rz);
      mesh.scale.set(sx, sy, sz);
      parent.add(mesh);
    });
  }

  // Make a pivot group at world position (px,py,pz) inside bodyGroup
  function pivot(px, py, pz) {
    const g = new THREE.Group();
    g.position.set(px, py, pz);
    bodyGroup.add(g);
    return g;
  }

  // ── CERVICAL SPINE (neck vertebrae) ───────────────────────────
  for (let i = 0; i < 7; i++) {
    const vy = -2.25 - i * 0.34;
    bone(bodyGroup, new THREE.CylinderGeometry(0.30, 0.33, 0.26, 12), 0, vy, 0);
    bone(bodyGroup, new THREE.BoxGeometry(0.12, 0.18, 0.32), 0, vy, -0.38);
  }

  // ── THORACIC SPINE (12 vertebrae) ────────────────────────────
  for (let i = 0; i < 12; i++) {
    const vy = -4.65 - i * 0.42;
    const r = 0.38 + i * 0.012;
    bone(bodyGroup, new THREE.CylinderGeometry(r, r + 0.02, 0.30, 12), 0, vy, 0);
    bone(bodyGroup, new THREE.BoxGeometry(0.13, 0.22, 0.48 + i * 0.02), 0, vy, -0.52 - i * 0.02);
    for (const side of [-1, 1]) {
      bone(bodyGroup, new THREE.CylinderGeometry(0.07, 0.05, 0.55, 8), side * 0.62, vy, -0.1, 0, 0, Math.PI / 2);
    }
  }

  // ── LUMBAR SPINE (5 vertebrae) ────────────────────────────────
  for (let i = 0; i < 5; i++) {
    const vy = -9.7 - i * 0.50;
    bone(bodyGroup, new THREE.CylinderGeometry(0.52, 0.54, 0.38, 12), 0, vy, 0);
    bone(bodyGroup, new THREE.BoxGeometry(0.17, 0.28, 0.55), 0, vy, -0.62);
  }

  // ── SACRUM + COCCYX ───────────────────────────────────────────
  bone(bodyGroup, new THREE.SphereGeometry(0.72, 16, 12, 0, Math.PI*2, 0, Math.PI*0.6), 0, -12.3, 0, 0.3, 0, 0, 1.0, 0.8, 0.7);
  bone(bodyGroup, new THREE.CylinderGeometry(0.14, 0.06, 0.55, 8), 0, -13.0, 0, 0.4);

  // ── RIBCAGE ───────────────────────────────────────────────────
  const RIB_DATA = [
    { y: -4.70, w: 1.6, drop: 0.30, fwd: 2.0, tube: 0.095 },
    { y: -5.10, w: 2.1, drop: 0.35, fwd: 2.2, tube: 0.100 },
    { y: -5.50, w: 2.5, drop: 0.40, fwd: 2.4, tube: 0.105 },
    { y: -5.90, w: 2.8, drop: 0.45, fwd: 2.5, tube: 0.108 },
    { y: -6.30, w: 2.9, drop: 0.50, fwd: 2.55, tube: 0.110 },
    { y: -6.70, w: 2.9, drop: 0.55, fwd: 2.5, tube: 0.110 },
    { y: -7.10, w: 2.8, drop: 0.60, fwd: 2.4, tube: 0.108 },
    { y: -7.50, w: 2.6, drop: 0.65, fwd: 2.2, tube: 0.105 },
    { y: -7.90, w: 2.35, drop: 0.70, fwd: 1.9, tube: 0.098 },
    { y: -8.25, w: 2.05, drop: 0.72, fwd: 1.5, tube: 0.090 },
    { y: -8.55, w: 1.75, drop: 0.70, fwd: 1.0, tube: 0.082 },
    { y: -8.80, w: 1.45, drop: 0.65, fwd: 0.5, tube: 0.074 },
  ];
  RIB_DATA.forEach(({ y, w, drop, fwd, tube }, ri) => {
    const isFloating = ri >= 10;
    for (const side of [-1, 1]) {
      const pts = [
        new THREE.Vector3(side * 0.28, y, -0.28),
        new THREE.Vector3(side * w * 0.55, y - drop * 0.3, 0.2),
        new THREE.Vector3(side * w, y - drop, 0.8),
        new THREE.Vector3(side * w * 0.7, y - drop * 1.1, fwd * 0.65),
        new THREE.Vector3(side * (isFloating ? w * 0.4 : 0.35), y - drop * 1.05, isFloating ? fwd * 0.9 : fwd),
      ];
      const ribGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 20, tube, 7, false);
      [boneMat, boneMatBack].forEach(m => {
        bodyGroup.add(Object.assign(new THREE.Mesh(ribGeo, m)));
      });
    }
  });

  // ── STERNUM ───────────────────────────────────────────────────
  bone(bodyGroup, new THREE.BoxGeometry(0.50, 4.0, 0.35), 0, -6.55, 2.45, -0.08);
  bone(bodyGroup, new THREE.ConeGeometry(0.15, 0.50, 8), 0, -8.72, 2.40, Math.PI, 0, 0);

  // ── CLAVICLES ─────────────────────────────────────────────────
  // S-curved clavicles running from sternum (x~±0.3) to shoulder (x~±3.4)
  for (const side of [-1, 1]) {
    const clavPts = [
      new THREE.Vector3(side * 0.32, -4.30, 1.80),   // medial end at sternum
      new THREE.Vector3(side * 1.20, -4.22, 1.50),   // medial curve
      new THREE.Vector3(side * 2.30, -4.28, 0.90),   // mid-shaft
      new THREE.Vector3(side * 3.10, -4.45, 0.40),   // lateral, sweeps back
      new THREE.Vector3(side * 3.52, -4.62, -0.10),  // acromial end at shoulder
    ];
    const clavGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(clavPts), 20, 0.13, 8, false);
    [boneMat, boneMatBack].forEach(m => bodyGroup.add(new THREE.Mesh(clavGeo, m)));
  }

  // ── SCAPULAE ──────────────────────────────────────────────────
  for (const side of [-1, 1]) {
    bone(bodyGroup, new THREE.SphereGeometry(1.12, 16, 12, 0, Math.PI*2, 0, Math.PI*0.55), side * 3.05, -5.8, -1.0, 0.22, side * 0.18, 0, 0.65, 1.0, 0.38);
  }

  // ── PELVIS ────────────────────────────────────────────────────
  for (const side of [-1, 1]) {
    bone(bodyGroup, new THREE.SphereGeometry(1.85, 20, 14, 0, Math.PI*2, 0, Math.PI*0.58), side * 1.55, -11.55, 0.25, -0.12, side * 0.30, side * 0.20, 0.75, 0.82, 0.55);
  }
  bone(bodyGroup, new THREE.SphereGeometry(0.72, 14, 10), 0, -12.15, 1.45, 0, 0, 0, 1.0, 0.55, 0.60);
  for (const side of [-1, 1]) {
    bone(bodyGroup, new THREE.SphereGeometry(0.85, 12, 10), side * 1.22, -12.55, -0.35, 0, 0, 0, 0.85, 0.70, 0.75);
  }

  // ── ARMS (hierarchical) ───────────────────────────────────────
  // Flex axis: X (lateral). Flex = negative X rotation (arm raises forward).
  // shoulder pivot → upper arm + elbow pivot
  //   elbow pivot  → forearm + wrist pivot
  //     wrist pivot  → hand
  for (const side of [-1, 1]) {
    const sKey = side > 0 ? 'L' : 'R';
    const ax = side * 3.55; // resting X of arm centre

    // — SHOULDER PIVOT at humeral head position —
    const shoulderPiv = pivot(ax - side * 0.22, -4.88, -0.18);
    limbPivots[`shoulder_${sKey}`] = shoulderPiv;

    // Upper arm (humerus) — local: centre is 2.4 units below the pivot
    bone(shoulderPiv, new THREE.CylinderGeometry(0.30, 0.24, 4.8, 12), side * 0.22, -2.32, 0.18, 0, 0, side * 0.18);
    // Humeral head stays at pivot origin (visual knob)
    bone(shoulderPiv, new THREE.SphereGeometry(0.52, 14, 10), 0, 0, 0);

    // — ELBOW PIVOT — local pos relative to shoulder pivot
    // Elbow is ~4.7 below humeral head
    const elbowPiv = new THREE.Group();
    elbowPiv.position.set(side * 0.22, -4.70, 0.18);
    shoulderPiv.add(elbowPiv);
    limbPivots[`elbow_${sKey}`] = elbowPiv;

    // Elbow knob at pivot origin
    bone(elbowPiv, new THREE.SphereGeometry(0.36, 10, 8), 0, 0, 0);
    // Olecranon nub
    bone(elbowPiv, new THREE.SphereGeometry(0.22, 8, 8), -side * 0.18, 0, -0.42);

    // Forearm bones — local: 1.8 below elbow pivot
    bone(elbowPiv, new THREE.CylinderGeometry(0.17, 0.20, 3.6, 10),  side * 0.28, -1.82, 0, 0, 0, side * 0.08);
    bone(elbowPiv, new THREE.CylinderGeometry(0.14, 0.10, 3.7, 10), -side * 0.18, -1.87, -0.1, 0, 0, side * 0.05);

    // — WRIST PIVOT — local pos relative to elbow pivot
    // Wrist is ~3.77 below elbow
    const wristPiv = new THREE.Group();
    wristPiv.position.set(0, -3.77, 0);
    elbowPiv.add(wristPiv);
    limbPivots[`wrist_${sKey}`] = wristPiv;

    // Carpal cluster at pivot origin
    for (let ci = 0; ci < 5; ci++) {
      bone(wristPiv, new THREE.SphereGeometry(0.14, 8, 6), (ci - 2) * 0.20, 0, (ci % 2) * 0.08 - 0.04);
    }

    // Hand — metacarpals + phalanges, local below wrist pivot
    for (let fi = 0; fi < 5; fi++) {
      const fx = (fi - 2) * 0.32;
      bone(wristPiv, new THREE.CylinderGeometry(0.09, 0.09, 0.85, 8), fx, -0.75, 0, 0, 0, (fi - 2) * 0.06);
      bone(wristPiv, new THREE.CylinderGeometry(0.08, 0.07, 0.55, 8), fx, -1.47, 0);
      if (fi > 0) {
        bone(wristPiv, new THREE.CylinderGeometry(0.07, 0.06, 0.40, 8), fx, -1.93, 0);
        bone(wristPiv, new THREE.CylinderGeometry(0.06, 0.04, 0.32, 8), fx, -2.28, 0);
      }
    }
  }

  // ── LEGS (hierarchical) ───────────────────────────────────────
  // Flex axis: X. Hip flex = negative X (leg raises forward).
  // hip pivot → femur + knee pivot
  //   knee pivot → tibia/fibula + ankle pivot
  //     ankle pivot → foot
  for (const side of [-1, 1]) {
    const sKey = side > 0 ? 'L' : 'R';
    const lx = side * 1.28;

    // — HIP PIVOT at femoral head —
    const hipPiv = pivot(lx + side * 0.45, -12.85, 0.12);
    limbPivots[`hip_${sKey}`] = hipPiv;

    // Femoral head knob at pivot origin
    bone(hipPiv, new THREE.SphereGeometry(0.68, 14, 10), 0, 0, 0);

    // Femur shaft — local: centre 3.6 below pivot, slight lateral offset back
    bone(hipPiv, new THREE.CylinderGeometry(0.44, 0.38, 7.2, 14), -side * 0.45, -3.50, -0.12, 0, 0, side * 0.07);

    // Femoral condyles — local: ~7.0 below pivot
    bone(hipPiv, new THREE.SphereGeometry(0.52, 12, 10, 0, Math.PI*2, 0, Math.PI*0.6), -side * 0.45, -7.05, -0.12, 0, 0, 0, 1.2, 0.75, 0.90);

    // Patella — local: ~7.2 below pivot, slightly forward
    bone(hipPiv, new THREE.SphereGeometry(0.38, 10, 8), -side * 0.45, -7.25, 0.60, 0, 0, 0, 1.0, 0.80, 0.55);

    // — KNEE PIVOT — local relative to hip pivot (~7.15 below)
    const kneePiv = new THREE.Group();
    kneePiv.position.set(-side * 0.45, -7.15, -0.12);
    hipPiv.add(kneePiv);
    limbPivots[`knee_${sKey}`] = kneePiv;

    // Tibia — local: 3.2 below knee pivot
    bone(kneePiv, new THREE.CylinderGeometry(0.32, 0.22, 6.4, 12), 0, -3.20, 0);
    // Tibial tuberosity
    bone(kneePiv, new THREE.SphereGeometry(0.24, 8, 6), 0, -0.35, 0.58);
    // Fibula
    bone(kneePiv, new THREE.CylinderGeometry(0.10, 0.09, 6.2, 8), side * 0.52, -3.15, -0.1);

    // — ANKLE PIVOT — local relative to knee pivot (~6.4 below)
    const anklePiv = new THREE.Group();
    anklePiv.position.set(0, -6.40, 0);
    kneePiv.add(anklePiv);
    limbPivots[`ankle_${sKey}`] = anklePiv;

    // Talus + calcaneus at pivot origin
    bone(anklePiv, new THREE.SphereGeometry(0.42, 10, 8), 0, 0, 0.10);
    bone(anklePiv, new THREE.SphereGeometry(0.52, 10, 8, 0, Math.PI*2, 0, Math.PI*0.7), 0, -0.15, -0.50, -0.3, 0, 0, 0.85, 0.75, 1.10);

    // Foot — metatarsals + toes, local below ankle pivot
    for (let fi = 0; fi < 5; fi++) {
      const fz = 0.55 + fi * 0.28;
      bone(anklePiv, new THREE.CylinderGeometry(0.09, 0.08, 1.05, 8), (fi - 2) * 0.22, -0.40, fz, Math.PI*0.5, 0, (fi-2)*0.04);
      bone(anklePiv, new THREE.CylinderGeometry(0.07, 0.05, 0.55, 6), (fi - 2) * 0.22, -0.40, fz + 0.80, Math.PI*0.5);
    }
  }

  // ── CARTILAGE RINGS on trachea ────────────────────────────────
  for (let i = 0; i < 6; i++) {
    const trachGeo = new THREE.TorusGeometry(0.32, 0.07, 6, 16, Math.PI * 1.5);
    const trach = new THREE.Mesh(trachGeo, cartMat);
    trach.position.set(0, -2.62 - i * 0.36, 0.48);
    trach.rotation.set(0.2, 0, 0);
    bodyGroup.add(trach);
  }
})();

// Stored for future wiring; populated after buildBrain runs
const jointNeurons = [];

function buildJointNeurons() {
  // Clear any previously built joint neurons from scene
  for (const jn of jointNeurons) {
    if (jn.mesh) {
      if (jn.mesh.geometry) jn.mesh.geometry.dispose();
      if (jn.mesh.material) jn.mesh.material.dispose();
      networkGroup.remove(jn.mesh);
    }
    if (jn.edgeLine) {
      if (jn.edgeLine.geometry) jn.edgeLine.geometry.dispose();
      if (jn.edgeLine.material) jn.edgeLine.material.dispose();
      networkGroup.remove(jn.edgeLine);
    }
  }
  jointNeurons.length = 0;

  const jGeo = new THREE.SphereGeometry(0.28, 14, 10);

  // Collect brainstem neurons in order
  const brainstemNeurons = neurons.filter(n => n.lobe === 'brainstem');

  for (let ji = 0; ji < JOINT_DEFS.length; ji++) {
    const def = JOINT_DEFS[ji];
    const col = new THREE.Color(def.color);
    const mat = new THREE.MeshPhongMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.35,
      shininess: 120,
      transparent: true,
      opacity: 0.75,
    });
    const mesh = new THREE.Mesh(jGeo, mat);
    mesh.position.set(def.x, def.y, def.z);
    mesh.userData = { isJointNeuron: true, jointId: def.id };
    networkGroup.add(mesh);

    // Wire brainstem neuron ji → this joint neuron
    const bsn = brainstemNeurons[ji];
    let edgeLine = null;
    if (bsn) {
      const jointWorldPos = new THREE.Vector3(def.x, def.y, def.z);
      const bsnPos = bsn.pos; // already in networkGroup local space

      const edgeGeo = new THREE.BufferGeometry().setFromPoints([bsnPos, jointWorldPos]);
      const bsCol = new THREE.Color('#ff4444');
      const colors = new Float32Array([
        bsCol.r, bsCol.g, bsCol.b,
        col.r, col.g, col.b,
      ]);
      edgeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const edgeMat = new THREE.LineBasicMaterial({
        vertexColors: true, transparent: true, opacity: 0.30,
      });
      edgeLine = new THREE.Line(edgeGeo, edgeMat);
      edgeLine.userData = { isJointEdge: true };
      networkGroup.add(edgeLine);
    }

    jointNeurons.push({ id: def.id, mesh, mat, col: col.clone(), bsNeuron: bsn || null, edgeLine });
  }
}

// Stochastic noise parameters (each controlled independently)
let NOISE_MEMBRANE   = 0.024;  // std-dev of per-tick Gaussian membrane noise
let NOISE_SPONT_P    = 0.002;  // probability of spontaneous spike per neuron per tick
let NOISE_SYN_FAIL_P = 0.07;   // probability a synapse silently fails to transmit
const REFRACTORY_TICKS = 2; // ticks a neuron cannot fire after spiking

// Box-Muller Gaussian sample (mean 0, std 1)
function randGauss() {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// Audio/hearing input
// Frequency bands (Hz ranges) mapped to rows in the audio input layer
const AUDIO_BANDS = [
  { name: 'RMS',      lo: 0,    hi: 20000, color: '#ffffff' }, // overall energy row
  { name: 'Sub-bass', lo: 20,   hi: 80,    color: '#ff4444' },

// ═══════════════════════════════════════════════════════════════
//  BUILD BRAIN
// ═══════════════════════════════════════════════════════════════
function buildBrain() {
  if (networkGroup) {
    scene.remove(networkGroup);
    networkGroup.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
      }
    });
  }
  networkGroup = new THREE.Group();
  networkGroup.position.y = -0.9; // shift brain down so it's centered inside skull cranium
  scene.add(networkGroup);
  neurons = [];
  edgeLines = [];

  // Spawn neurons per lobe
  const lobeNeuronMap = {}; // lobeName -> array of neuron indices

  for (const lobe of LOBE_DEFS) {
    const lobeCenter = new THREE.Vector3(...lobe.pos);
    const idxs = [];
    for (let i = 0; i < lobe.neurons; i++) {
      // Scatter inside sphere of radius LOBE_SPREAD
      const r = LOBE_SPREAD * Math.cbrt(Math.random());
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const offset = new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
      const pos = lobeCenter.clone().add(offset);
      const nid = neurons.length;

      // Inhibitory interneurons: ~20% of each lobe (GABAergic)
      // Brainstem and thalamus use neuromodulators, lower inhib fraction
      const inhibFrac = (lobe.name === 'brainstem' || lobe.name === 'thalamus') ? 0.10 : INHIB_FRACTION;
      const isInhibitory = Math.random() < inhibFrac;

      // Neurotransmitter: inhibitory -> always GABA; excitatory -> lobe NT distribution
      const nt = isInhibitory ? 'GABA' : pickNT(lobe.name);
      const ntProfile = NT_PROFILES[nt];

      // Color: always use lobe color regardless of inhibitory/excitatory type
      const baseCol = new THREE.Color(lobe.color);
      const col = baseCol.clone();

      // Core mesh
      const mat = new THREE.MeshPhongMaterial({
        color: col, emissive: col,
        emissiveIntensity: 0.2,
        shininess: 100,
        transparent: true, opacity: 0.5
      });
      const mesh = new THREE.Mesh(nodeGeo, mat);
      mesh.position.copy(pos);
      mesh.userData = { neuronIdx: nid };
      networkGroup.add(mesh);

      // Refractory: base ticks + NT-specific kinetic modifier
      const ntRefractory = REFRACTORY_TICKS + ntProfile.refractoryMod;

      neurons.push({
        id: `${lobe.name}_${i}`,
        lobe: lobe.name,
        lobeColor: lobe.color,
        inhibColor: '#ff4422',
        task: lobe.task,
        inputSum: 0,  // weighted sum of inputs this tick
        smoothInput: 0,  // EMA for visuals
        threshold: fireThresh + (Math.random() - 0.5) * 0.1,
        neurotransmitter: nt,
        ntGain: ntProfile.gain,  // synaptic strength multiplier
        ntRefractory,  // kinetics-adjusted refractory length
        ntSpontBoost: ntProfile.spontBoost, // per-NT spontaneous drive
        inhibitory: isInhibitory,
        connections: [],  // indices of target neurons
        weights: [],  // corresponding synaptic weights
        camWeight: lobe.name === 'occipital' ? (Math.random() * 0.6 + 0.2) : 0,
        refractoryLeft: 0,  // ticks remaining in absolute refractory period
        mesh,
        mat,
        pos,
        fired: false,
      });
      idxs.push(nid);
    }
    lobeNeuronMap[lobe.name] = idxs;
  }

  // Intra-lobe connections
  let totalConns = 0;
  for (const lobe of LOBE_DEFS) {
    const idxs = lobeNeuronMap[lobe.name];
    for (const src of idxs) {
      for (const tgt of idxs) {
        if (src !== tgt && Math.random() < lobe.connP) {
          // Inhibitory neurons release GABA -> negative weight
          const sign = neurons[src].inhibitory ? -1 : 1;
          const w = sign * (Math.random() * 0.5 + 0.05);
          neurons[src].connections.push(tgt);
          neurons[src].weights.push(w);
          totalConns++;
        }
      }
    }
  }

  // Cross-lobe connections so every lobe pair is guaranteed some connections
  const MIN_CROSS_PER_PAIR = 20;
  for (const lobe of LOBE_DEFS) {
    const srcIdxs = lobeNeuronMap[lobe.name];
    const otherLobes = LOBE_DEFS.filter(l => l.name !== lobe.name);
    for (const targetLobe of otherLobes) {
      const targetIdxs = lobeNeuronMap[targetLobe.name];
      let pairConns = 0;
      for (const src of srcIdxs) {
        if (Math.random() < lobe.crossP) {
          const tgt = targetIdxs[Math.floor(Math.random() * targetIdxs.length)];
          const sign = neurons[src].inhibitory ? -1 : 1;
          const w = sign * (Math.random() * 0.5 + 0.05);
          neurons[src].connections.push(tgt);
          neurons[src].weights.push(w);
          totalConns++;
          pairConns++;
        }
      }
      // Guarantee minimum connections for this pair
      while (pairConns < MIN_CROSS_PER_PAIR) {
        const src = srcIdxs[Math.floor(Math.random() * srcIdxs.length)];
        const tgt = targetIdxs[Math.floor(Math.random() * targetIdxs.length)];
        const sign = neurons[src].inhibitory ? -1 : 1;
        const w = sign * (Math.random() * 0.5 + 0.05);
        neurons[src].connections.push(tgt);
        neurons[src].weights.push(w);
        totalConns++;
        pairConns++;
      }
    }
  }

  // Draw intra-lobe edges
  for (const lobe of LOBE_DEFS) {
    const col = new THREE.Color(lobe.color);
    const inhibCol = new THREE.Color('#ff3311');
    const idxs = lobeNeuronMap[lobe.name];
    let drawn = 0;
    for (const src of idxs) {
      for (let ci = 0; ci < neurons[src].connections.length; ci++) {
        const tgt = neurons[src].connections[ci];
        if (!lobeNeuronMap[lobe.name].includes(tgt)) continue;
        if (drawn >= MAX_INTRA_EDGES_DRAWN) break;
        const srcCol = neurons[src].inhibitory ? inhibCol : col;
        addEdgeLine(neurons[src].pos, neurons[tgt].pos, srcCol, col, neurons[src].inhibitory ? 0.09 : 0.06, src, tgt);
        drawn++;
      }
    }
  }

  // Draw cross-lobe edges (sampled per-lobe so every lobe gets representation)
  const inhibCrossCol = new THREE.Color('#ff3311');
  const MAX_CROSS_PER_LOBE = Math.ceil(MAX_CROSS_EDGES_DRAWN / LOBE_DEFS.length);
  for (const lobe of LOBE_DEFS) {
    const lobeCrossEdges = [];
    for (const ni of lobeNeuronMap[lobe.name]) {
      const n = neurons[ni];
      for (let ci = 0; ci < n.connections.length; ci++) {
        const tgt = n.connections[ci];
        if (neurons[tgt].lobe !== n.lobe) {
          lobeCrossEdges.push({ src: ni, tgt, w: n.weights[ci], inhib: n.inhibitory });
        }
      }
    }
    shuffle(lobeCrossEdges);
    for (let i = 0; i < Math.min(lobeCrossEdges.length, MAX_CROSS_PER_LOBE); i++) {
      const e = lobeCrossEdges[i];
      const cA = e.inhib ? inhibCrossCol.clone() : new THREE.Color(neurons[e.src].lobeColor);
      const cB = new THREE.Color(neurons[e.tgt].lobeColor);
      addEdgeLine(neurons[e.src].pos, neurons[e.tgt].pos, cA, cB, e.inhib ? 0.07 : 0.04, e.src, e.tgt);
    }
  }

  // Stats
  document.getElementById('st-lobes').textContent   = LOBE_DEFS.length;
  document.getElementById('st-neurons').textContent = neurons.length;
  document.getElementById('st-conns').textContent   = totalConns;

  buildLobeLegend(lobeNeuronMap);

  // Store occipital indices for camera injection
  occipitalIdxs = lobeNeuronMap['occipital'] || [];

  // Store temporal indices for audio injection
  temporalIdxs = lobeNeuronMap['temporal'] || [];

  buildJointNeurons();
}

// edgeLines: flat array of { mat, srcIdx, tgtIdx, baseOpacity, colA, colB }
let edgeLines = [];

function addEdgeLine(pA, pB, colA, colB, baseOpacity, srcIdx, tgtIdx) {
  const geo = new THREE.BufferGeometry().setFromPoints([pA, pB]);
  const colors = new Float32Array([colA.r, colA.g, colA.b, colB.r, colB.g, colB.b]);
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: baseOpacity });
  const line = new THREE.Line(geo, mat);
  line.userData.isEdge = true;
  networkGroup.add(line);
  edgeLines.push({ mat, srcIdx, tgtIdx, baseOpacity, colA: colA.clone(), colB: colB.clone(), geo });
}

// Sample AnalyserNode -> audioValues every animation frame when active
function pollAudio() {
  if (!audioActive || !audioAnalyser) return;

  audioAnalyser.getByteFrequencyData(audioFFTBuf);
  const binCount   = audioAnalyser.frequencyBinCount;
  const sampleRate = audioCtx.sampleRate;
  const binHz      = sampleRate / (binCount * 2); // Hz per bin

  const numBands = AUDIO_BANDS.length;

  // Band 0: RMS; compute from full FFT magnitude
  let sumSq = 0;
  for (let i = 0; i < binCount; i++) sumSq += (audioFFTBuf[i] / 255) ** 2;
  const rms = Math.sqrt(sumSq / binCount);
  // RMS row: all AUDIO_COLS nodes get same value (uniform energy indicator)
  for (let c = 0; c < AUDIO_COLS; c++) audioValues[c] = rms;

  // Bands 1-N: spectral bands
  for (let b = 1; b < numBands; b++) {
    const { lo, hi } = AUDIO_BANDS[b];
    const binLo = Math.max(0,         Math.floor(lo / binHz));
    const binHi = Math.min(binCount - 1, Math.ceil(hi / binHz));
    const count = Math.max(1, binHi - binLo + 1);

    // Split band bins across AUDIO_COLS nodes
    const step = count / AUDIO_COLS;
    for (let c = 0; c < AUDIO_COLS; c++) {
      const start = Math.floor(binLo + c * step);
      const end   = Math.min(binCount - 1, Math.floor(binLo + (c + 1) * step));
      let sum = 0, n = 0;
      for (let i = start; i <= end; i++) { sum += audioFFTBuf[i] / 255; n++; }
      audioValues[b * AUDIO_COLS + c] = n > 0 ? sum / n : 0;
    }
  }
}

// Draw mini spectrum visualizer in the audio container canvas
function drawAudioViz() {
  if (!audioActive) return;
  const canvas = document.getElementById('audio-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const numBands = AUDIO_BANDS.length;
  const barW     = Math.floor(W / AUDIO_COLS);
  // Draw each band as a row of mini-bars, top = high freq, bottom = RMS
  const rowH = H / numBands;

  for (let b = 0; b < numBands; b++) {
    const y = b * rowH;
    for (let c = 0; c < AUDIO_COLS; c++) {
      const v   = audioValues[b * AUDIO_COLS + c];
      ctx.fillStyle = '#56b4e9';
      ctx.globalAlpha = 0.15 + v * 0.85;
      ctx.fillRect(c * barW, y + 1, barW - 1, rowH - 2);
    }
  }
  ctx.globalAlpha = 1;
}

  for (const lobe of LOBE_DEFS) {

    el.appendChild(row);
  }

  // NT COUNT SUMMARY
  const NT_DISPLAY_ORDER = ['glutamate','GABA','acetylcholine','dopamine','serotonin','norepinephrine'];

  const ntTotals = {};
  for (const n of neurons) {
    ntTotals[n.neurotransmitter] = (ntTotals[n.neurotransmitter] || 0) + 1;
  }

  const divider = document.createElement('div');
  divider.style.cssText = 'height:1px;background:rgba(80,200,160,0.15);margin:8px -12px 8px';

  header.textContent = 'Neurotransmitters';
  el.appendChild(header);

  for (const nt of NT_DISPLAY_ORDER) {

    row.style.cssText = 'font-size:0.47rem;letter-spacing:0.05em;line-height:1.9;display:flex;justify-content:space-between;align-items:baseline;gap:4px';

    el.appendChild(row);
  }
}

// ═══════════════════════════════════════════════════════════════
//  SIMULATION TICK
// ═══════════════════════════════════════════════════════════════
function simTick() {
  firesThisTick = 0;

  // Step 1: reset inputSum, tick down refractory counters
  for (let ni = 0; ni < neurons.length; ni++) {
    neurons[ni].inputSum = 0;
    if (neurons[ni].refractoryLeft > 0) neurons[ni].refractoryLeft--;
  }

  // Camera injection: camWeight * pixel brightness = occipital inputSum
  if (camActive) {
    const occCount = occipitalIdxs.length;
    const pixCount = camRes * camRes;
    for (let i = 0; i < occCount; i++) {
      const ni = occipitalIdxs[i];
      const pi = i % pixCount;
      neurons[ni].inputSum += neurons[ni].camWeight * pixelValues[pi];
    }
  }

  // Audio injection: band energy drives temporal lobe neurons
  if (audioActive) {
    pollAudio();
    const tempCount = temporalIdxs.length;
    const numBands  = AUDIO_BANDS.length;
    for (let i = 0; i < tempCount; i++) {
      const ni  = temporalIdxs[i];
      // Map each temporal neuron to an audio node index (round-robin across all nodes)
      const ani = i % (numBands * AUDIO_COLS);
      const v   = audioValues[ani];
      neurons[ni].inputSum += v * 0.6; // 0.6 weight similar to camWeight range
    }
  }

  // Membrane noise: Gaussian thermal fluctuation on every neuron's inputSum
  if (NOISE_MEMBRANE > 0) {
    for (let ni = 0; ni < neurons.length; ni++) {
      neurons[ni].inputSum += randGauss() * NOISE_MEMBRANE;
    }
  }

  // Spontaneous firing: rare depolarisation without synaptic input
  // Each neuron also gets its NT-specific spontaneous drive on top of global noise
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (n.refractoryLeft > 0) continue;
    const p = NOISE_SPONT_P + n.ntSpontBoost;
    if (p > 0 && Math.random() < p) {
      n.inputSum += n.threshold * 1.05; // just over threshold
    }
  }

  // Step 2: fire if inputSum meets threshold and not refractory
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (n.refractoryLeft > 0) {
      n.fired = false;
      continue;
    }
    n.fired = n.inputSum >= n.threshold;
    if (n.fired) {
      firesThisTick++;
      n.refractoryLeft = n.ntRefractory; // NT-specific kinetics
    }
  }

  // Step 3: propagate fired outputs; weight scaled by sender's ntGain; synaptic release failure applied here
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    if (!n.fired) continue;
    for (let ci = 0; ci < n.connections.length; ci++) {
      // Synaptic vesicle release failure (probabilistic)
      if (NOISE_SYN_FAIL_P > 0 && Math.random() < NOISE_SYN_FAIL_P) continue;
      neurons[n.connections[ci]].inputSum += n.weights[ci] * n.ntGain;
    }
  }

  tickCount++;

  // Update stats
  document.getElementById('tick-num').textContent  = tickCount;
  document.getElementById('st-active').textContent =
    neurons.filter(n => n.inputSum > 0).length;
  document.getElementById('st-fires').textContent  = firesThisTick;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER UPDATE
// ═══════════════════════════════════════════════════════════════
function updateVisuals(dt) {
if (brainDead) return;
  for (let ni = 0; ni < neurons.length; ni++) {
    const n = neurons[ni];
    n.smoothInput += (n.inputSum - n.smoothInput) * 0.25;
    // For inhibitory neurons, use the magnitude of inputSum for visual intensity
    const v = Math.min(Math.abs(n.smoothInput) / n.threshold, 1.0);
    const fired = n.fired;

    if (n.inhibitory) {
      // Inhibitory: fire pulse is a cold red-orange dim flash, not a bright glow
      n.mat.emissiveIntensity = fired ? 1.4 : 0.10 + v * 0.6;
      n.mat.opacity           = fired ? 0.85 : 0.30 + v * 0.45;
    } else {
      n.mat.emissiveIntensity = fired ? 2.2 : 0.08 + v * 1.2;
      n.mat.opacity           = fired ? 1.0 : 0.2 + v * 0.75;
    }

    const s = fired ? 1.5 : 1.0 + v * 0.15;
    n.mesh.scale.setScalar(s);
  }

  // Light up edges based on whether either endpoint neuron is active/fired
  for (let ei = 0; ei < edgeLines.length; ei++) {
    const e = edgeLines[ei];
    const nSrc = neurons[e.srcIdx];
    const nTgt = neurons[e.tgtIdx];
    const srcFired = nSrc && nSrc.fired;
    const tgtFired = nTgt && nTgt.fired;
    const srcV = nSrc ? Math.min(nSrc.smoothInput / nSrc.threshold, 1.0) : 0;
    const tgtV = nTgt ? Math.min(nTgt.smoothInput / nTgt.threshold, 1.0) : 0;
    const activity = Math.max(srcV, tgtV);
    const anyFired = srcFired || tgtFired;

    // Opacity: ramp from base when active, spike when a node fires
    e.mat.opacity = anyFired
      ? Math.min(e.baseOpacity * 10, 0.95)
      : e.baseOpacity + activity * (e.baseOpacity * 5);

    // Tint the vertex colors brighter on activity
    if (anyFired || activity > 0.1) {
      const boost = anyFired ? 1.0 : activity;
      const colArr = e.geo.attributes.color.array;
      colArr[0] = Math.min(e.colA.r + boost * (1.0 - e.colA.r) * 0.9, 1);
      colArr[1] = Math.min(e.colA.g + boost * (1.0 - e.colA.g) * 0.9, 1);
      colArr[2] = Math.min(e.colA.b + boost * (1.0 - e.colA.b) * 0.9, 1);
      colArr[3] = Math.min(e.colB.r + boost * (1.0 - e.colB.r) * 0.9, 1);
      colArr[4] = Math.min(e.colB.g + boost * (1.0 - e.colB.g) * 0.9, 1);
      colArr[5] = Math.min(e.colB.b + boost * (1.0 - e.colB.b) * 0.9, 1);
      e.geo.attributes.color.needsUpdate = true;
    } else {
      const colArr = e.geo.attributes.color.array;
      colArr[0] = e.colA.r; colArr[1] = e.colA.g; colArr[2] = e.colA.b;
      colArr[3] = e.colB.r; colArr[4] = e.colB.g; colArr[5] = e.colB.b;
      e.geo.attributes.color.needsUpdate = true;
    }
  }

  updateCamInputVisuals();
  updateAudioInputVisuals();
  drawAudioViz();

  // Joint neuron idle pulse + flex/ext driven by brainstem firing
  const t = performance.now() * 0.001;

  // Flex target angles (radians) when fired vs resting — negative X = forward flex
  const FLEX_ANGLES = {
    shoulder_L: -1.2, shoulder_R: -1.2,  // arm swings forward ~70°
    elbow_L:    -1.4, elbow_R:    -1.4,  // forearm curls up ~80°
    wrist_L:    -0.6, wrist_R:    -0.6,  // wrist curls ~35°
    hip_L:      -0.9, hip_R:      -0.9,  // leg raises forward ~52°
    knee_L:      1.5, knee_R:      1.5,  // knee bends backward ~86° (positive X)
    ankle_L:    -0.5, ankle_R:    -0.5,  // dorsiflexion ~29°
  };
  const LERP_SPEED = 0.5; // smoothing factor per frame

  for (let ji = 0; ji < jointNeurons.length; ji++) {
    const jn = jointNeurons[ji];
    const bsn = jn.bsNeuron;
    const fired = bsn && bsn.fired;
    const activity = bsn ? Math.min(Math.abs(bsn.smoothInput) / bsn.threshold, 1.0) : 0;
    const pulse = 0.5 + 0.5 * Math.sin(t * 1.2 + ji * 0.55);

    // Visual glow
    if (fired) {
      jn.mat.emissiveIntensity = 2.4;
      jn.mat.opacity = 1.0;
      jn.mesh.scale.setScalar(1.5);
    } else if (activity > 0.05) {
      jn.mat.emissiveIntensity = 0.30 + activity * 1.2;
      jn.mat.opacity = 0.65 + activity * 0.35;
      jn.mesh.scale.setScalar(1.0 + activity * 0.3);
    } else {
      jn.mat.emissiveIntensity = 0.20 + pulse * 0.40;
      jn.mat.opacity = 0.55 + pulse * 0.25;
      jn.mesh.scale.setScalar(0.92 + pulse * 0.16);
    }

    // Edge pulse
    if (jn.edgeLine) {
      jn.edgeLine.material.opacity = fired
        ? 0.90
        : 0.12 + activity * 0.45 + pulse * 0.08;
    }

    // Flex/ext: drive pivot rotation toward target or zero
    const piv = limbPivots[jn.id];
    if (piv) {
      const targetAngle = fired ? (FLEX_ANGLES[jn.id] || 0) : 0;
      piv.rotation.x += (targetAngle - piv.rotation.x) * LERP_SPEED;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  ORBIT CAMERA
// ═══════════════════════════════════════════════════════════════
let isDragging = false, autoRotate = true;
let lastMouse = { x: 0, y: 0 };
let spherical = { theta: 0.1, phi: Math.PI * 0.40 };
let targetSph = { theta: 0.1, phi: Math.PI * 0.40 };

// Compute initial zoom so the entire brain + input layer fits in view,
// scaled proportionally to screen pixel count.
function computeInitialZoom() {
  const sceneHalfW = 4.8 + Math.max((camRes / 2) * 0.22, AUDIO_COLS / 2 * 0.22) + 0.5;
  const sceneHalfH = 3.2;
  const fovRad = camera.fov * Math.PI / 180;
  const aspect  = window.innerWidth / window.innerHeight;
  const distForH = sceneHalfH / Math.tan(fovRad / 2);
  const distForW = sceneHalfW / (Math.tan(fovRad / 2) * aspect);
  const baseDist = Math.max(distForH, distForW) * 1.15;
  // Scale by pixel density: larger screens get proportionally more zoom-out
  // so relative scene size stays consistent. Reference is 1920x1080.
  const refPixels = 1920 * 1080;
  const curPixels = window.innerWidth * window.innerHeight;
  const densityScale = Math.sqrt(curPixels / refPixels);
  return Math.max(8, Math.min(200, baseDist * densityScale * 2 * 1.20));
}

let zoomDist  = computeInitialZoom();
let targetZoom = zoomDist;

const cv = renderer.domElement;

cv.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = { x: e.clientX, y: e.clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
});
cv.addEventListener('wheel', e => {
  targetZoom = Math.max(5, Math.min(200, targetZoom + e.deltaY * 0.04));
}, { passive: true });

// Touch orbit
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
window.addEventListener('touchend', () => { isDragging = false; });
window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  targetSph.theta -= dx * 0.007;
  targetSph.phi = Math.max(0.12, Math.min(Math.PI - 0.12, targetSph.phi - dy * 0.007));
}, { passive: true });

// Pinch zoom
let pinchStart = null, pinchZoomStart = null;
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStart = Math.hypot(dx, dy);
    pinchZoomStart = targetZoom;
  }
}, { passive: true });
cv.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStart) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    targetZoom = Math.max(5, Math.min(200, pinchZoomStart * (pinchStart / dist)));
  }
}, { passive: true });
cv.addEventListener('touchend', e => { if (e.touches.length < 2) pinchStart = null; }, { passive: true });

function updateCamera() {
  spherical.theta += (targetSph.theta - spherical.theta) * 0.1;
  spherical.phi   += (targetSph.phi   - spherical.phi  ) * 0.1;
  zoomDist        += (targetZoom      - zoomDist        ) * 0.1;
  camera.position.set(
    zoomDist * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    zoomDist * Math.cos(spherical.phi),
    zoomDist * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA B&W FEED
// ═══════════════════════════════════════════════════════════════
const camPromptEl  = document.getElementById('cam-prompt');
const camSwitchEl  = document.getElementById('cam-switch');
const camContainer = document.getElementById('cam-container');
const camCanvas    = document.getElementById('cam-canvas');
const camVideo     = document.getElementById('cam-video');
const camCtx       = camCanvas.getContext('2d');

camCanvas.width  = camRes;
camCanvas.height = camRes;

// Multi-camera state
let videoDevices   = [];   // MediaDeviceInfo list
let currentDeviceIdx = 0;  // index into videoDevices

async function enumerateVideoDevices() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    videoDevices = devices.filter(d => d.kind === 'videoinput');
  } catch (_) {
    videoDevices = [];
  }
}

async function startCamera(deviceId) {
  // Stop any existing stream
  if (camVideo.srcObject) {
    camVideo.srcObject.getTracks().forEach(t => t.stop());
    camVideo.srcObject = null;
  }
  const constraints = {
    video: deviceId ? { deviceId: { exact: deviceId } } : true,
    audio: false,
  };
  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  camVideo.srcObject = stream;
  await camVideo.play();
}

function updateSwitchButton() {
  // Show switch button only when camera is active and more than one camera available
  camSwitchEl.style.display = (camActive && videoDevices.length > 1) ? '' : 'none';
  if (videoDevices.length > 1) {
    const next = videoDevices[(currentDeviceIdx + 1) % videoDevices.length];
    const label = next.label || `Camera ${(currentDeviceIdx + 1) % videoDevices.length + 1}`;
    // Trim long labels
    const short = label.length > 20 ? label.slice(0, 18) + '…' : label;
    document.getElementById('cam-switch-text').textContent = `→ ${short}`;
  }
}

camPromptEl.addEventListener('click', async () => {
  // If camera is active, toggle off
  if (camActive) {
    camActive = false;
    if (camVideo.srcObject) {
      camVideo.srcObject.getTracks().forEach(t => t.stop());
      camVideo.srcObject = null;
    }
    pixelValues.fill(0);
    camContainer.style.display = 'none';
    camPromptEl.classList.add('feed-btn--off');
    camPromptEl.style.borderColor = '';
    camPromptEl.style.background  = '';
    updateSwitchButton();
    return;
  }

  // Otherwise, request camera and turn on
  try {
    // First call without deviceId to trigger permission prompt, then enumerate
    await startCamera(null);
    await enumerateVideoDevices();
    currentDeviceIdx = 0;

    camActive = true;
    camContainer.style.display = 'block';
    camPromptEl.classList.remove('feed-btn--off');
    camPromptEl.style.borderColor = '';
    camPromptEl.style.background  = '';
    updateSwitchButton();
    drawBW();
  } catch (err) {
    camPromptEl.classList.add('feed-btn--off');
    camPromptEl.title = err.name === 'NotAllowedError' ? 'Permission denied' : 'Not available';
  }
});

camSwitchEl.addEventListener('click', async () => {
  if (!camActive || videoDevices.length < 2) return;
  currentDeviceIdx = (currentDeviceIdx + 1) % videoDevices.length;
  const device = videoDevices[currentDeviceIdx];
  try {
    await startCamera(device.deviceId);
    updateSwitchButton();
    // drawBW loop is already running; it will pick up the new srcObject
  } catch (err) {
    console.warn('Camera switch failed:', err);
  }
});

function drawBW() {
  if (!camActive) return;
  if (camVideo.readyState >= 2) {
    camCtx.drawImage(camVideo, 0, 0, camRes, camRes);
    const img = camCtx.getImageData(0, 0, camRes, camRes);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const grey = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = grey;
      pixelValues[i >> 2] = grey / 255;
    }
    camCtx.putImageData(img, 0, 0);
  }
  requestAnimationFrame(drawBW);
}

// ═══════════════════════════════════════════════════════════════
//  MICROPHONE AUDIO FEED
// ═══════════════════════════════════════════════════════════════
const audioPromptEl  = document.getElementById('audio-prompt');
const audioContainer = document.getElementById('audio-container');

// Init the audio canvas size
const audioVizCanvas = document.getElementById('audio-canvas');
audioVizCanvas.width  = 34;
audioVizCanvas.height = 34;

audioPromptEl.addEventListener('click', async () => {
  // Toggle off
  if (audioActive) {
    audioActive = false;
    if (audioStream) {
      audioStream.getTracks().forEach(t => t.stop());
      audioStream = null;
    }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    audioAnalyser = null;
    audioFFTBuf   = null;
    audioValues.fill(0);
    audioContainer.style.display = 'none';
    audioPromptEl.classList.add('feed-btn--off');
    audioPromptEl.style.borderColor = '';
    audioPromptEl.style.background  = '';
    return;
  }

  // Toggle on
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
    audioAnalyser = audioCtx.createAnalyser();
    audioAnalyser.fftSize = 4096;
    audioAnalyser.smoothingTimeConstant = 0.8;
    audioFFTBuf = new Uint8Array(audioAnalyser.frequencyBinCount);

    const src = audioCtx.createMediaStreamSource(audioStream);
    src.connect(audioAnalyser);
    // Do NOT connect to destination; avoids mic feedback

    audioActive = true;
    audioContainer.style.display = 'block';
    audioPromptEl.classList.remove('feed-btn--off');
    audioPromptEl.style.borderColor = '';
    audioPromptEl.style.background  = '';
  } catch (err) {
    audioPromptEl.classList.add('feed-btn--off');
    audioPromptEl.title = err.name === 'NotAllowedError' ? 'Permission denied' : 'Not available';
  }
});

// ═══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════
let lastTime = 0;
let simTickMs = 0;
const SIM_INTERVAL_MS = 60; // base tick interval
let animFrameId = null;

// Frame rate cap — 30 fps saves significant battery vs uncapped 120 Hz
const TARGET_FPS = 30;
const FRAME_MS   = 1000 / TARGET_FPS;
let lastFrameTime = 0;

// Visibility pause — stop rendering when tab is hidden
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  } else {
    if (animFrameId === null) { lastTime = 0; lastFrameTime = 0; animate(performance.now()); }
  }
});

function animate(time) {
  animFrameId = requestAnimationFrame(animate);

  // Skip frame if not enough time has elapsed (frame rate cap)
  if (time - lastFrameTime < FRAME_MS) return;
  lastFrameTime = time;

  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (!isDragging && autoRotate) targetSph.theta += dt * 0.06;
  updateCamera();

  // Sim ticks gated by speed
  if (simRunning) {
    simTickMs += dt * 1000 * simSpeed;
    while (simTickMs >= SIM_INTERVAL_MS) {
      simTick();
      simTickMs -= SIM_INTERVAL_MS;
    }
  }

  updateVisuals(dt);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
//  UI BINDINGS
// ═══════════════════════════════════════════════════════════════
document.getElementById('sl-speed').addEventListener('input', function() {
  simSpeed = parseInt(this.value);
  document.getElementById('vb-speed').textContent = simSpeed;
});
document.getElementById('sl-thresh').addEventListener('input', function() {
  fireThresh = parseInt(this.value) / 100;
  document.getElementById('vb-thresh').textContent = fireThresh.toFixed(2);
  neurons.forEach(n => { n.threshold = fireThresh + (Math.random() - 0.5) * 0.1; });
});
document.getElementById('sl-syn').addEventListener('input', function() {
  NOISE_SYN_FAIL_P = parseInt(this.value) / 100;
  document.getElementById('vb-syn').textContent = parseInt(this.value) + '%';
});
document.getElementById('sl-mem').addEventListener('input', function() {
  NOISE_MEMBRANE = parseInt(this.value) / 1000;
  document.getElementById('vb-mem').textContent = NOISE_MEMBRANE.toFixed(3);
});
document.getElementById('sl-spont').addEventListener('input', function() {
  // Quadratic mapping: 0..100 -> 0..0.018, matching original curve
  const v = parseInt(this.value) / 100;
  NOISE_SPONT_P = v * v * 0.018;
  document.getElementById('vb-spont').textContent = NOISE_SPONT_P.toFixed(4);
});
document.getElementById('sl-scale').addEventListener('input', function() {
  const scale = parseInt(this.value);
  document.getElementById('vb-scale').textContent = scale;
  applyNeuronScale(scale);
  rebuildBrain();
});

document.getElementById('btn-pause').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.textContent = autoRotate ? 'Pause Rotation' : 'Resume Rotation';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  tickCount = 0;
  simTickMs = 0;
  lastTime = 0;
  pixelValues = new Float32Array(camRes * camRes);
  audioValues = new Float32Array(AUDIO_BANDS.length * AUDIO_COLS);
  buildBrain();
  const newZoom = computeInitialZoom();
  zoomDist = newZoom;
  targetZoom = newZoom;
  animate(0);
});

// Brain death state
let brainDead = false;

document.getElementById("btn-kill").addEventListener("click", () => {
  brainDead = true;

  // Stop spontaneous firing
  NOISE_SPONT_P = 0;

  // Silence neurons
  neurons.forEach(n => {
    n.fire = false;
    n.inputSum = -9999;
    n.refractory = 999999;

    // Dim neuron visuals
    if (n.mesh) {
      n.mesh.material.emissiveIntensity = 0;
      n.mesh.material.opacity = 0.08;
    }
  });

  // Fade synapses
  intraLines.forEach(l => {
    l.material.opacity = 0.02;
  });

  crossLines.forEach(l => {
    l.material.opacity = 0.02;
  });

  // Update title
  document.querySelector("#title h1").innerHTML = "MAT <span style='color:#ff4444'>DECEASED</span>";
});

function rebuildBrain() {
  if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  tickCount = 0;
  simTickMs = 0;
  lastTime  = 0;
  pixelValues = new Float32Array(camRes * camRes);
  audioValues = new Float32Array(AUDIO_BANDS.length * AUDIO_COLS);
  buildBrain();
  const newZoom = computeInitialZoom();
  zoomDist   = newZoom;
  targetZoom = newZoom;
  animate(0);
}

// Input resolution slider
function applyResolution() {
  pixelValues = new Float32Array(camRes * camRes);
  camCanvas.width  = camRes;
  camCanvas.height = camRes;
  document.getElementById('vb-res').textContent = camRes;
  // No visual layer to rebuild — cam input injected directly into occipital neurons
}

document.getElementById('sl-res').addEventListener('input', function() {
  camRes = parseInt(this.value);
  applyResolution();
});

// Set initial badge
document.getElementById('vb-res').textContent = camRes;

// panel toggle handled inline via onclick attribute
cv.addEventListener('touchstart', () => {
  if (window.innerWidth < 640) document.getElementById('panel').hidden = true;
}, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // Refit zoom to new screen size
  const newZoom = computeInitialZoom();
  zoomDist  = newZoom;
  targetZoom = newZoom;
});

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
applyNeuronScale(5);
buildBrain();
animate(0);
</script>
